<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Men in Black: Sector Database</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary: #06b6d4; /* Neuralyzer Cyber Blue */
      --alien-green: #10b981; /* Bio-Alien Neon Green */
      --agency-black: #05080f; /* Pitch Black Suit */
      --card-bg: #0e1524; /* High-Tech Console Gray */
      --muted: #9CA3AF;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #05080f 0%, #0c1322 50%, #05080f 100%);
      color: #e5e7eb;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .tech-font {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.08em;
    }
    
    .movie-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(6, 182, 212, 0.05);
    }
    
    .movie-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 15px 30px rgba(6, 182, 212, 0.25);
      border-color: rgba(6, 182, 212, 0.4);
    }
    
    .movie-poster {
      aspect-ratio: 2/3;
      transition: transform 0.5s ease;
    }
    
    .movie-card:hover .movie-poster {
      transform: scale(1.04);
    }
    
    /* Cyber Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #05080f;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--alien-green);
    }
    
    /* Animation Framework */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s ease forwards;
    }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    
    /* Illumination Responsive Modal */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(3, 5, 10, 0.94); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
      padding: 0;
      backdrop-filter: blur(5px);
    }
    .modal-backdrop.active { display:flex; }
    
    .modal-card { 
      width: 100%;
      height: 100%;
      max-width: 1000px;
      max-height: 100vh;
      border-radius: 0;
      overflow-y: auto;
      background: #090e1a;
      border: 1px solid rgba(6, 182, 212, 0.15);
      box-shadow: 0 30px 70px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
    }
    
    .player-wrapper { 
      position: relative;
      flex: 1;
      min-height: 42vh;
      background: #000;
    }
    
    #topCloseBtn { 
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 50;
      background: rgba(6, 182, 212, 0.8);
      color: white;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    #topCloseBtn:hover {
      background: #06b6d4;
      transform: scale(1.1);
    }
    
    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
      color: #e5e7eb;
      background: #090e1a;
      border-top: 2px solid rgba(6, 182, 212, 0.25);
    }
    
    .player-meta h3 { 
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffffff;
    }
    .player-meta p { 
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    /* Elegant Alien & Agent Button Themes */
    .btn {
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      flex: 1;
      min-width: calc(33.33% - 6px);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-nav { background: #1e293b; color: #cbd5e1; border: 1px solid #334155; }
    .btn-nav:hover { background: #334155; color: #fff; }
    
    .btn-play { background: #06b6d4; color: #05080f; border: 1px solid #22d3ee; font-weight: 700; }
    .btn-play:hover { background: #0891b2; color: #fff; }
    
    .btn-expand { background: #4b5563; color: #f9fafb; border: 1px solid #6b7280; }
    .btn-expand:hover { background: #374151; }
    
    .btn-volume { background: #8b5cf6; color: #ffffff; border: 1px solid #a78bfa; }
    .btn-volume:hover { background: #7c3aed; }
    
    .btn-dismiss { background: #111827; color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-dismiss:hover { background: #ef4444; color: #ffffff; }

    /* Desktop View Adaptations */
    @media (min-width: 768px) {
      .modal-card {
        width: 88%;
        height: auto;
        border-radius: 10px;
        max-height: 88vh;
        overflow: hidden;
      }
      .player-wrapper {
        padding-bottom: 53.5%;
        height: 0;
        flex: none;
      }
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
      }
      .player-meta .meta-left {
        max-width: 55%;
      }
      .controls-row {
        width: auto;
        flex-wrap: nowrap;
        justify-content: flex-end;
        gap: 8px;
      }
      .btn {
        flex: none;
        min-width: 95px;
        padding: 10px 14px;
      }
      #topCloseBtn {
        opacity: 0.6;
      }
      .player-wrapper:hover #topCloseBtn {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .btn {
        padding: 12px 6px;
        font-size: 11px;
      }
    }

    /* Fullscreen Core Constraints */
    video:fullscreen,
    video:-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      object-fit: contain !important;
      background-color: black;
    }
    @media (min-aspect-ratio: 16/9) {
      video:fullscreen,
      video:-webkit-full-screen {
        object-fit: cover !important;
      }
    }
</style>
</head>
<body>

<!-- Dynamic Cyber Matrix Grid Overlay -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none opacity-10">
  <div class="absolute inset-0 bg-[linear-gradient(rgba(6,182,212,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(6,182,212,0.05)_1px,transparent_1px)] [background-size:20px_20px]"></div>
</div>

<div class="container mx-auto px-4 py-6 max-w-7xl">

  <!-- Cinematic Header Section -->
  <div class="relative w-full h-[220px] sm:h-[320px] md:h-[450px] rounded-2xl overflow-hidden mb-8 shadow-2xl border border-slate-900">
    <!-- Embedded Dynamic YouTube Trailer Loop -->
    <iframe 
      src="https://www.youtube.com/embed/iX2rBomAWa0?autoplay=1&mute=1&loop=1&playlist=S_HGiJVAVsA&controls=0&modestbranding=1&rel=0&showinfo=0"
      frameborder="0" 
      allow="autoplay; fullscreen" 
      class="absolute top-0 left-0 w-full h-full object-cover scale-105 pointer-events-none select-none">
    </iframe>

    <!-- Gradient Shadows -->
    <div class="absolute inset-0 bg-gradient-to-t from-[#05080f] via-[#05080f]/40 to-transparent"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-[#05080f] via-transparent to-transparent"></div>

    <!-- Agent Logo Display Panel -->
    <div class="absolute bottom-6 left-6 md:left-10 z-10 flex flex-col items-start max-w-md">
      <h1 class="text-3xl sm:text-5xl font-extrabold tech-font text-white uppercase drop-shadow-[0_0_15px_rgba(6,182,212,0.6)] tracking-tighter">
        MEN IN <span class="text-cyan-400">BLACK</span>
      </h1>
      <p class="mt-2 text-[10px] sm:text-xs font-bold tracking-widest text-emerald-400 bg-slate-950/80 px-3 py-1 rounded border border-emerald-900/50 uppercase">
        <i class="fas fa-shield-alt mr-1.5 text-xs"></i> Restricted Agency Database
      </p>
    </div>
  </div>

  <!-- Component Category Block Header -->
  <div class="flex items-center gap-3 mb-6 border-b border-slate-800 pb-3">
    <div class="w-2 h-6 bg-cyan-500 rounded-sm shadow-[0_0_8px_#06b6d4]"></div>
    <h2 class="text-lg sm:text-xl font-bold tech-font text-white uppercase">Mission Archives</h2>
  </div>

  <!-- Movies Grid: Strict 2 columns for mobile viewports -->
  <div class="mb-12">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-4 xl:grid-cols-4 gap-4 sm:gap-6" id="movies"></div>
  </div>

  <!-- Agency Terminal Footer Platform -->
  <div class="border-t border-slate-800 mt-12 pt-6 text-center text-slate-500 text-xs sm:text-sm">
    <p class="mb-4 text-slate-400">Secure Node Communications</p>
    <div class="flex justify-center gap-6 text-lg mb-6">
      <a href="#" class="text-slate-400 hover:text-cyan-400 transition-colors"><i class="fab fa-facebook-f"></i></a>
      <a href="#" class="text-slate-400 hover:text-cyan-400 transition-colors"><i class="fab fa-twitter"></i></a>
      <a href="https://www.instagram.com/stark_4152/reels" class="text-slate-400 hover:text-cyan-400 transition-colors"><i class="fab fa-instagram"></i></a>
      <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="text-slate-400 hover:text-cyan-400 transition-colors"><i class="fab fa-youtube"></i></a>
    </div>
    <p class="text-[11px] text-slate-600">&copy; 2026 MIB Interstellar Headquarters. Authorized Agent Logins Only.</p>
  </div>
</div>

<!-- Refined System Modal Video Stream Module -->
<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" title="Deactivate Neuralyzer Feed">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="player-meta">
      <div class="meta-left">
        <h3 id="modalTitle">File Meta</h3>
        <p id="modalDesc"></p>
      </div>
      <div class="controls-row">
        <button id="prevBtn" class="btn btn-nav"><i class="fas fa-step-backward"></i><span>Prev</span></button>
        <button id="playPauseBtn" class="btn btn-play"><i class="fas fa-play"></i><span>Play</span></button>
        <button id="nextBtn" class="btn btn-nav"><span>Next</span><i class="fas fa-step-forward"></i></button>
        <button id="fullscreenBtn" class="btn btn-expand"><i class="fas fa-expand"></i><span>View</span></button>
        <button id="muteBtn" class="btn btn-volume"><i class="fas fa-volume-up"></i><span>Audio</span></button>
        <button id="closeBtn" class="btn btn-dismiss"><i class="fas fa-power-off"></i><span>Close</span></button>
      </div>
    </div>
  </div>
</div>

<script>
    /******************************
     * Movies Database Array[cite: 2]
     ******************************/
    const movies = [
      { 
        title: "Men in Black", 
        video: "https://mega.nz/embed/p65w1QQL#pckEtpEVJg-UKsvUrW5o0LbmqF4OwTErADMF4x-_DCk", 
        image: "https://i.ebayimg.com/images/g/hZwAAOSw4DJYlf9S/s-l400.jpg", 
        year: 1997,
        duration: "98 min",
        description: "A streetwise NYPD detective joins a secret organization that monitors extraterrestrial activity on Earth."
      },
      { 
        title: "Men in Black II", 
        video: "https://mega.nz/embed/MrJzxDCI#JuZxCDJrUOJsPL6mZ5A3lUMtyGsxy9JHpta-qlLbxsE", 
        image: "https://image.tmdb.org/t/p/original/enA22EPyzc2WQ1VVyY7zxresQQr.jpg", 
        year: 2002,
        duration: "88 min",
        description: "Agent J needs help resolving a cosmic crisis, requiring him to restore the memories of his retired former partner, Agent K."
      },
      { 
        title: "Men in Black 3", 
        video: "https://mega.nz/embed/x7pm2CRA#q5etjijRNy9rg84br6aUJjOpBcvb9ze-jr4jYaKWhQc", 
        image: "https://cdn.kinocheck.com/i/w=1200/8ihiis7t99.jpg", 
        year: 2012,
        duration: "106 min",
        description: "Agent J travels back in time to 1969 to stop an alien assassin from altering history and killing a young Agent K."
      },
      { 
        title: "Men in Black: International", 
        video: "https://mega.nz/embed/4nJlCJZR#sYlbXH_wWrQRQIEP9q89c7HFphVP5W8mNnvlgKVPsRg", 
        image: "https://images.squarespace-cdn.com/content/v1/537007efe4b074eafa50d65c/1566080724075-75X7QCFOWYKMF5H7DJXD/men-in-black-international-spanish-movie-poster-39-1560646358.jpg", 
        year: 2019,
        duration: "114 min",
        description: "The Men in Black tackle their biggest, most global threat to date: a mole within the organization."
      }
    ];

    /******************************
     * Core Element Selectors[cite: 2]
     ******************************/
    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    /******************************
     * Stream Validation Routers[cite: 2]
     ******************************/
    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    /******************************
     * Player Initialization Pipeline[cite: 2]
     ******************************/
    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) return;
      
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];
      if (!movie) return;

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || '';

      resetPlayerContainer();
      showModal();

      let src = (typeof movie.video === 'object' && movie.video !== null) 
        ? (movie.video.high || movie.video.medium || movie.video.low || Object.values(movie.video)[0]) 
        : movie.video;

      if (!src) {
        setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=`, 400);
        return;
      }

      const lc = src.toLowerCase();

      // Premium Cloud Hosting check
      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('mega.nz') || lc.includes('openload') || lc.includes('drive.google.com')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
        return;
      }

      // YouTube Media Wrapper
      if (isYouTube(src)) {
        let embed = src;
        try {
          if (src.includes('watch') && src.includes('v=')) {
            const v = new URLSearchParams(src.split('?')[1]).get('v');
            if (v) embed = `https://www.youtube.com/embed/${v}`;
          } else if (src.includes('youtu.be/')) {
            const p = src.split('youtu.be/')[1].split(/[?&]/)[0];
            if (p) embed = `https://www.youtube.com/embed/${p}`;
          }
        } catch (e) {}
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
        return;
      }

      // Live Stream Architecture Core (HLS)
      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) return;
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          try {
            currentHls.loadSource(src);
            currentHls.attachMedia(v);
          } catch (e) { console.warn('HLS attachment warning', e); }
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
          });
          currentHls.on(Hls.Events.ERROR, function(event, data) {
            if (data && data.fatal) {
              try { currentHls.destroy(); } catch(e){}
              currentHls = null;
              setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 500);
            }
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
        } else {
          window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`;
        }
        return;
      }

      // Native MP4 Core Fallback
      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) return;
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
        return;
      }

      window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`;
    }

    /******************************
     * Control Event Logic[cite: 2]
     ******************************/
    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play mr-2"></i><span>Play</span>';
      }
    }
    function playNext() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return;
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
    }
    function playPrev() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return;
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
    }
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=>{});
      } else {
        document.exitFullscreen();
      }
    }
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i><span>Muted</span>' : '<i class="fas fa-volume-up"></i><span>Audio</span>';
    }

    function closeModalHandler() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      const v = document.getElementById(modalVideoId);
      if (v) {
        try { v.pause(); } catch(e){}
      }
      resetPlayerContainer();
      hideModal();
      currentIndex = null;
      currentFiltered = [];
      playPauseBtn.innerHTML = '<i class="fas fa-play mr-2"></i><span>Play</span>';
    }

    /******************************
     * Wire Up Observers[cite: 2]
     ******************************/
    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);

    playbackModal.addEventListener('click', function(e){
      if (e.target === playbackModal) closeModalHandler();
    });

    document.addEventListener('keydown', (e) => {
      if (!playbackModal.classList.contains('active')) return;
      switch (e.key.toLowerCase()) {
        case 'escape': closeModalHandler(); break;
        case ' ': e.preventDefault(); togglePlayPause(); break;
        case 'f': toggleFullscreen(); break;
        case 'm': toggleMute(); break;
      }
    });

    /******************************
     * Grid Content Processor[cite: 2]
     ******************************/
    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 4) * 100}`;

        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-xl overflow-hidden bg-[#0e1524] cursor-pointer relative group flex flex-col justify-between`;
        div.innerHTML = `
          <div class="relative overflow-hidden bg-black aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center p-2">
              <button class="bg-cyan-500 hover:bg-cyan-600 text-black font-bold text-xs sm:text-sm py-2 px-4 rounded shadow-lg transition transform translate-y-2 group-hover:translate-y-0 duration-300 uppercase tracking-wider tech-font">
                <i class="fas fa-bolt mr-1.5"></i> Access
              </button>
            </div>
          </div>
          <div class="p-3 sm:p-4 bg-[#0e1524]">
            <h3 class="font-bold text-sm sm:text-base tracking-wide text-white truncate">${movie.title}</h3>
            <div class="flex justify-between items-center mt-1.5 text-[11px] sm:text-xs text-slate-400">
              <span class="bg-slate-900 border border-slate-800 px-2 py-0.5 rounded text-cyan-400 font-semibold tech-font">${movie.year}</span>
              <span class="text-slate-500"><i class="far fa-clock mr-1 text-[10px]"></i>${movie.duration}</span>
            </div>
          </div>
        `;

        div.addEventListener('click', () => {
          openPlayer(moviesToRender, index);
        });

        container.appendChild(div);
      });
    }

    renderMovies(movies);
</script>

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>
