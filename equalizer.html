<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>The Equalizer Collection</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Oswald:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap');
    
    :root {
      --primary: #ef4444; /* Tactical Crimson Red */
      --secondary: #080a0f; /* Pitch Dark Void */
      --accent: #94a3b8; /* Steel Grey Muted */
      --muted: #64748b;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #080a0f 0%, #111521 100%);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .tech-font {
      font-family: 'Oswald', sans-serif;
      letter-spacing: 0.04em;
    }
    
    .brand-font {
      font-family: 'Cinzel', serif;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .movie-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(239, 68, 68, 0.05);
    }
    
    .movie-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 25px -5px rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }
    
    .movie-poster {
      aspect-ratio: 2/3;
      transition: transform 0.5s ease;
    }
    
    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #080a0f;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #ef4444;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #ffffff;
    }
    
    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.6s ease forwards;
    }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    
    /* Fixed structural layout architecture explicitly retained */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(0,0,0,0.96); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
      padding: 0;
      backdrop-filter: blur(5px);
    }
    .modal-backdrop.active { display:flex; }
    
    .modal-card { 
      width: 100%;
      height: 100%;
      max-width: 980px;
      max-height: 100vh;
      border-radius: 0;
      overflow: hidden;
      background: #0f121d;
      border: 1px solid rgba(239, 68, 68, 0.2);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
    }
    
    .player-wrapper { 
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
      width: 100%;
    }
    
    #topCloseBtn { 
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: all 0.2s ease;
    }
    #topCloseBtn:hover {
      background: #ef4444;
      transform: scale(1.1);
    }
    
    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      color: #cbd5e1;
      background: #0f121d;
      border-top: 2px solid rgba(239, 68, 68, 0.3);
      flex-shrink: 0; /* Ensures control panel stays securely locked within view bounds */
    }
    .player-meta .meta-left { 
      width: 100%;
    }
    .player-meta h3 { 
      margin: 0;
      font-size: 1.125rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
    }
    .player-meta p { 
      margin: 6px 0 0 0;
      color: #94a3b8;
      font-size: 0.92rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* Premium Theme Interactive Buttons Framework */
    .btn {
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      min-width: 60px;
      flex: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-transform: uppercase;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    
    .btn-nav {
      border: 1px solid #1e293b !important;
      color: #94a3b8 !important;
      background: #0f172a !important;
    }
    .btn-nav:hover {
      background: #1e293b !important;
      color: #fff !important;
    }
    
    .btn-play {
      border: 1px solid #f87171 !important;
      color: #ffffff !important;
      background: #ef4444 !important;
      font-weight: 700 !important;
    }
    .btn-play:hover {
      background: #b91c1c !important;
    }
    
    .btn-expand {
      border: 1px solid #475569 !important;
      color: #f8fafc !important;
      background: #334155 !important;
    }
    .btn-expand:hover {
      background: #475569 !important;
    }
    
    .btn-volume {
      border: 1px solid #64748b !important;
      color: #ffffff !important;
      background: #475569 !important;
    }
    .btn-volume:hover {
      background: #334155 !important;
    }
    
    .btn-dismiss {
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
      color: #ffffff !important;
      background: #020617 !important;
    }
    .btn-dismiss:hover {
      background: #ef4444 !important;
      border-color: #ef4444 !important;
    }

    .btn i {
      font-size: 1rem;
    }

    /* Desktop View Constraint Layer */
    @media (min-width: 768px) {
      .modal-card {
        width: 90%;
        height: 90vh; /* Prevents dimensional overflow to guarantee buttons stay visible */
        border-radius: 12px;
      }
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .player-meta .meta-left {
        max-width: 45%;
      }
      .controls-row {
        flex-wrap: nowrap;
        justify-content: flex-end;
        width: auto;
        flex: 1;
      }
      .btn {
        flex: 0 1 auto;
        min-width: auto;
        padding: 8px 14px;
        white-space: nowrap;
      }
      #topCloseBtn {
        opacity: 0;
      }
      .player-wrapper:hover #topCloseBtn {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .btn {
        padding: 8px;
      }
      .btn span {
        display: none;
      }
      .btn i {
        font-size: 1rem;
        margin: 0 !important;
      }
    }

    video:fullscreen,
    video:-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
      object-fit: contain !important;
      background-color: black;
    }
</style>
</head>
<body class="relative">

<!-- Subtle tactical radar/scope overlay grid -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none opacity-5">
  <div class="absolute inset-0 bg-[linear-gradient(rgba(239,68,68,0.06)_1px,transparent_1px),linear-gradient(90deg,rgba(239,68,68,0.06)_1px,transparent_1px)] [background-size:50px_50px]"></div>
</div>

<div class="container mx-auto px-4 py-8 max-w-7xl">

  <!-- Full-Width Tactical Video Header Frame -->
  <div class="relative w-full h-[240px] md:h-[450px] overflow-hidden rounded-2xl mb-8 shadow-2xl border border-slate-900">
    <iframe 
      src="https://www.youtube.com/embed/jAI7r15WwU0?autoplay=1&mute=1&loop=1&playlist=OEBGy4OFrAA&controls=0&modestbranding=1&rel=0"
      frameborder="0" 
      allow="autoplay; fullscreen" 
      class="absolute top-0 left-0 w-full h-full pointer-events-none scale-105">

<!-- Modal Module Player Layout -->
<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" class="absolute top-4 right-4 z-10 bg-black/70 hover:bg-black/90 text-white rounded-full w-10 h-10 flex items-center justify-center transition">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <div class="player-meta">
      <div class="meta-left">
        <h3 id="modalTitle">Title</h3>
        <p id="modalDesc" class="text-sm"></p>
      </div>
      <div class="controls-row">
        <button id="prevBtn" class="btn btn-nav"><i class="fas fa-step-backward"></i><span>Prev</span></button>
        <button id="playPauseBtn" class="btn btn-play"><i class="fas fa-play"></i><span>Play</span></button>
        <button id="nextBtn" class="btn btn-nav"><span>Next</span><i class="fas fa-step-forward"></i></button>
        <button id="fullscreenBtn" class="btn btn-expand"><i class="fas fa-expand"></i><span>View</span></button>
        <button id="muteBtn" class="btn btn-volume"><i class="fas fa-volume-up"></i><span>Audio</span></button>
        <button id="closeBtn" class="btn btn-dismiss"><i class="fas fa-power-off"></i><span>Close</span></button>
      </div>
    </div>
  </div>
</div>

<script>
    const movies = [
      { 
        title: "The Equalizer", 
        video: "cc", 
        image: "https://occ-0-90-92.1.nflxso.net/dnm/api/v6/mAcAr9TxZIVbINe88xb3Teg5_OA/AAAABQBmAQmHSvV2zD2f2QNhWsVDaJtxm8yFs4F4sAn6yiR84b3PFxa183FzGiZAYrSMUBKJKaHI5TZ7-756TWthA64zmOIygs3sZl6p.jpg?r=442", 
        year: 2014,
        duration: "132 min",
        description: "A man who believes he has put his mysterious past behind him cannot stand idly by when he meets a young girl under the control of ultra-violent Russian gangsters."
      },
      { 
        title: "The Equalizer 2", 
        video: "cc", 
        image: "https://occ-0-76-92.1.nflxso.net/dnm/api/v6/mAcAr9TxZIVbINe88xb3Teg5_OA/AAAABZ2EJdPmJg82HVzO2JPezMYAREiKtAPdebnDNHVv4Yb-jFjPYRDtOvD_KFPvj4HpEEaJ36hVUIL3ydFcEfYlr5m-iu4nHxAG_Rlw.jpg?r=6fa", 
        year: 2018,
        duration: "121 min",
        description: "Robert McCall serves unflinching justice for the exploited and oppressed, but how far will he go when that mission targets someone he loves?"
      },
      { 
        title: "The Equalizer 3", 
        video: "cc", 
        image: "https://images.plex.tv/photo?size=large-1920&scale=1&url=https%3A%2F%2Fimage.tmdb.org%2Ft%2Fp%2Foriginal%2F9kfTUY3zJKX2rSfgSJJUuxGE3DN.jpg", 
        year: 2023,
        duration: "109 min",
        description: "Robert McCall finds himself at home in Southern Italy but discovers his new friends are under the control of local crime bosses. As events turn deadly, McCall knows what he has to do."
      }
    ];

    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) return;
      
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];
      if (!movie) return;

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || (movie.title || '');

      resetPlayerContainer();
      showModal();

      let src = (typeof movie.video === 'object' && movie.video !== null) 
        ? (movie.video.high || movie.video.medium || movie.video.low || Object.values(movie.video)[0]) 
        : movie.video;

      if (!src) {
        setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=`, 500);
        return;
      }

      const lc = src.toLowerCase();

      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('mega.nz') || lc.includes('openload') || lc.includes('drive.google.com')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isYouTube(src)) {
        let embed = src;
        try {
          if (src.includes('watch') && src.includes('v=')) {
            const v = new URLSearchParams(src.split('?')[1]).get('v');
            if (v) embed = `https://www.youtube.com/embed/${v}`;
          } else if (src.includes('youtu.be/')) {
            const p = src.split('youtu.be/')[1].split(/[?&]/)[0];
            if (p) embed = `https://www.youtube.com/embed/${p}`;
          }
        } catch (e) {}
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) return;
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          try {
            currentHls.loadSource(src);
            currentHls.attachMedia(v);
          } catch (e) { console.warn('HLS attach error', e); }
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
          });
          currentHls.on(Hls.Events.ERROR, function(event, data) {
            if (data && data.fatal) {
              try { currentHls.destroy(); } catch(e){}
              currentHls = null;
              setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 700);
            }
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        } else {
          setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 700);
        }
        return;
      }

      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) return;
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`;
    }

    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      const isIframe = playerWrapper.querySelector('iframe') !== null;
      
      if (playPauseBtn.innerHTML.includes('Play')) {
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        if(v && !isIframe) v.play().catch(()=>{});
      } else {
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
        if(v && !isIframe) v.pause();
      }
    }
    function playNext() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return;
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
    }
    function playPrev() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return;
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
    }
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=>{});
      } else {
        document.exitFullscreen();
      }
    }
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i><span>Muted</span>' : '<i class="fas fa-volume-up"></i><span>Audio</span>';
    }

    function closeModalHandler() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      const v = document.getElementById(modalVideoId);
      if (v) {
        try { v.pause(); } catch(e){}
        try { v.removeAttribute('src'); v.load(); } catch(e){}
      }
      resetPlayerContainer();
      hideModal();
      currentIndex = null;
      currentFiltered = [];
      playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);

    playbackModal.addEventListener('click', function(e){
      if (e.target === playbackModal) closeModalHandler();
    });

    document.addEventListener('keydown', (e) => {
      if (!playbackModal.classList.contains('active')) return;
      switch (e.key.toLowerCase()) {
        case 'escape': closeModalHandler(); break;
        case ' ': e.preventDefault(); togglePlayPause(); break;
        case 'f': toggleFullscreen(); break;
        case 'm': toggleMute(); break;
      }
    });

    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 3) * 100}`;

        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-xl overflow-hidden bg-slate-900 cursor-pointer relative group flex flex-col justify-between`;
        div.innerHTML = `
          <div class="relative overflow-hidden aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center p-2">
              <button class="bg-red-600 hover:bg-red-700 text-white font-bold text-xs sm:text-sm py-2 px-5 rounded shadow-lg transition transform translate-y-2 group-hover:translate-y-0 duration-300 uppercase tracking-wider tech-font">
                <i class="fas fa-eye mr-1.5"></i> ENGAGE
              </button>
            </div>
          </div>
          <div class="p-4 bg-[#0f121d] border-t border-slate-900">
            <h3 class="font-bold text-sm sm:text-base tracking-wide text-white truncate font-sans">${movie.title}</h3>
            <div class="flex justify-between items-center mt-2 text-xs text-slate-400">
              <span class="bg-slate-950 border border-slate-800 px-2 py-0.5 rounded text-red-500 tech-font">${movie.year}</span>
              <span class="text-slate-500">${movie.duration}</span>
            </div>
          </div>
        `;

        div.addEventListener('click', () => {
          openPlayer(moviesToRender, index);
        });

        container.appendChild(div);
      });
    }

    renderMovies(movies);
</script>

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>
