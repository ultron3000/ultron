<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Rush Hour: The Complete Trilogy</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap');
    
    :root {
      --primary: #f59e0b; /* Police Badge Gold */
      --secondary: #0d0c1d; /* Midnight Black Blue */
      --accent: #ef4444; /* Hong Kong Crimson Red */
      --muted: #9CA3AF;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #07070f 0%, #150909 100%);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .movie-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
    }
    
    .movie-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 25px -5px rgba(239, 68, 68, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
    }
    
    .header-glow {
      text-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
    }
    
    .movie-poster {
      aspect-ratio: 2/3;
      transition: transform 0.5s ease;
    }
    
    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }

    /* === EXACT CHARACTER OVERLAY POPUP SYSTEM === */
    /* Base styling matching your structure */
    .character-lee {
      position: absolute;
      bottom: -150px; /* Tucked away out of bounds initially */
      left: 4%;
      height: 140px;
      z-index: 25;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none; /* Allows cursor to pass through to the banner */
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7));
    }

    .character-carter {
      position: absolute;
      bottom: -150px; /* Tucked away out of bounds initially */
      right: 4%;
      height: 140px;
      z-index: 25;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none; /* Allows cursor to pass through to the banner */
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7));
    }

    /* Trigger popups when CURSOR IS OVER THE PARENT BANNER */
    .video-banner-container:hover .character-lee {
      bottom: 10px; /* Pop up into the banner view */
      transform: scale(1.15) rotate(-3deg);
    }

    .video-banner-container:hover .character-carter {
      bottom: 10px; /* Pop up into the banner view */
      transform: scale(1.15) rotate(3deg);
    }

    /* Responsive sizing for characters */
    @media (min-width: 640px) {
      .character-lee, .character-carter {
        height: 180px;
        bottom: -200px;
      }
      .video-banner-container:hover .character-lee {
        bottom: 15px;
      }
      .video-banner-container:hover .character-carter {
        bottom: 15px;
      }
    }

    @media (min-width: 768px) {
      .character-lee, .character-carter {
        height: 240px;
        bottom: -260px;
      }
      .video-banner-container:hover .character-lee {
        bottom: 20px;
      }
      .video-banner-container:hover .character-carter {
        bottom: 20px;
      }
    }

    @media (min-width: 1024px) {
      .character-lee, .character-carter {
        height: 300px;
        bottom: -320px;
      }
      .video-banner-container:hover .character-lee {
        bottom: 25px;
      }
      .video-banner-container:hover .character-carter {
        bottom: 25px;
      }
    }

    /* Logo pulse animation rules */
    @keyframes pulseLogo {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .animate-logo {
      animation: pulseLogo 3s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #0f0b0b;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #f59e0b;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #ef4444;
    }
    
    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.6s ease forwards;
    }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    
    /* Rush Hour Player Modal styles */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(0,0,0,0.95); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
      padding: 0;
    }
    .modal-backdrop.active { display:flex; }
    .modal-card { 
      width: 100%;
      height: 100%;
      max-width: 980px;
      max-height: 90vh;
      border-radius: 0;
      overflow: hidden;
      background: #0a0505;
      box-shadow: 0 30px 80px rgba(239, 68, 68, 0.1);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .player-wrapper { 
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }
    #topCloseBtn { 
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: all 0.2s ease;
    }
    #topCloseBtn:hover {
      background: var(--primary);
      color: #0a0505;
      transform: scale(1.1);
    }
    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      color: #ddd;
      background: #0a0505;
      border-top: 1px solid rgba(239, 68, 68, 0.2);
    }
    .player-meta .meta-left { 
      width: 100%;
    }
    .player-meta h3 { 
      margin: 0;
      font-size: 1.125rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: white;
    }
    .player-meta p { 
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    /* Upgraded Modern Tactical Buttons */
    .btn {
      background: rgba(245, 158, 11, 0.03);
      border: 1px solid rgba(245, 158, 11, 0.4);
      color: #f59e0b;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      min-width: 60px;
      flex: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover { 
      background: var(--primary); 
      color: #0a0505;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.35);
      transform: translateY(-1px);
    }
    .btn i {
      font-size: 0.95rem;
      transition: transform 0.2s ease;
    }
    .btn:hover i {
      transform: scale(1.1);
    }

    /* Responsive adjustments */
    @media (min-width: 768px) {
      .modal-card {
        width: 92%;
        height: auto;
        border-radius: 12px;
        max-height: 80vh;
      }
      .player-wrapper {
        padding-bottom: 56.25%;
        height: 0;
      }
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
      }
      .player-meta .meta-left {
        max-width: 65%;
      }
      .controls-row {
        flex-wrap: nowrap;
        justify-content: flex-end;
      }
      .btn {
        flex: 0;
        min-width: auto;
        padding: 8px 14px;
      }
      #topCloseBtn {
        opacity: 0;
      }
      .player-wrapper:hover #topCloseBtn {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .btn {
        padding: 10px;
        font-size: 0;
      }
      .btn i {
        font-size: 1.1rem;
        margin: 0 !important;
      }
    }

    /* DESKTOP FIX */
    @media (min-width: 768px) {
      .player-wrapper {
        padding-bottom: 0 !important;
        height: auto !important;
        max-height: 60vh !important;
        position: relative !important;
      }
      .player-wrapper video,
      .player-wrapper iframe {
        height: 100% !important;
        max-height: 60vh !important;
        position: relative !important;
      }
      .player-meta {
        position: relative !important;
        z-index: 100 !important;
        background: #0a0505 !important;
        padding-top: 10px !important;
      }
      .controls-row {
        display: flex !important;
        flex-wrap: wrap !important;
        justify-content: center !important;
        gap: 12px !important;
      }
      .btn {
        min-width: 105px !important;
        padding: 10px 18px !important;
        flex: unset !important;
      }
      .modal-card {
        max-height: 85vh !important;
        overflow: visible !important;
      }
    }
</style>
</head>
<body class="relative">

<!-- Background layer -->
<div class="fixed inset-0 overflow-hidden -z-10">
  <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/95"></div>
  <div class="stars"></div>
</div>

<div class="container mx-auto px-4 py-8 max-w-7xl">

  <!-- Interactive Buddy-Cop Video Banner Container -->
  <div class="video-banner-container relative w-full h-[280px] sm:h-[350px] md:h-[400px] lg:h-[480px] overflow-hidden rounded-2xl border border-gray-800 shadow-2xl mb-12">
    
    <!-- Video Player Feed -->
    <iframe 
      src="https://www.youtube.com/embed/wogrp3GNUM8?autoplay=1&mute=1&loop=1&playlist=OofNBvo-ABU&controls=0&modestbranding=1"
      frameborder="0" 
      allow="autoplay; fullscreen" 
      class="absolute top-0 left-0 w-full h-full scale-105 pointer-events-none object-cover">
    </iframe>
    
    <!-- Dark Vignette Overlay to highlight action elements -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent pointer-events-none"></div>

    <!-- Official Rush Hour SVG Logo -->
    <div class="absolute top-4 left-4 z-20">
      <img 
        src="https://i.pinimg.com/736x/f4/5f/76/f45f76d2e5e0abf363e5ac7069d55f1b.jpg" 
        alt="Rush Hour Logo" 
        class="h-12 sm:h-18 md:h-22 lg:h-26 animate-logo filter brightness-110"
        onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/5/51/Toy_Story_logo.jpg'"
      />
    </div>

    <!-- Interactive Character Elements (Pop Up on hover) -->
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQfRIWqAv8yXxreemybjFhiXBGzzTPrAfwjZfPdIS8v1YCipcQER-IsR_U&s=10" class="character-lee rounded-xl border border-red-500/30 shadow-2xl" alt="Lee">
    <img src="https://i.pinimg.com/474x/db/a3/c1/dba3c1118c2652c56ab7a322ccf1e433.jpg" class="character-carter rounded-xl border border-yellow-500/30 shadow-2xl" alt="Carter">

  </div>

  <!-- Movies Grid -->
  <div class="mb-12">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 justify-center" id="movies"></div>
  </div>

  <!-- Footer / Social Links -->
  <div class="border-t border-gray-800 mt-8 pt-6 text-center text-gray-500">
    <a href="#" class="text-gray-400 hover:text-[#f59e0b] transition px-3"><i class="fab fa-facebook-f"></i></a>
    <a href="#" class="text-gray-400 hover:text-[#f59e0b] transition px-3"><i class="fab fa-twitter"></i></a>
    <a href="https://www.instagram.com/stark_4152/reels" class="text-gray-400 hover:text-[#f59e0b] transition px-3"><i class="fab fa-instagram"></i></a>
    <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="text-gray-400 hover:text-[#f59e0b] transition px-3"><i class="fab fa-youtube"></i></a>
  </div>
</div>

<!-- === Rush Hour Media Player Modal === -->
<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <!-- Media Engine Injection Window -->
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" class="absolute top-4 right-4 z-10 bg-black/70 hover:bg-[#f59e0b] text-white rounded-full w-10 h-10 flex items-center justify-center transition">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <div class="player-meta">
      <div class="meta-left">
        <h3 id="modalTitle">Secure Stream Access</h3>
        <p id="modalDesc" class="text-sm"></p>
      </div>
      <div class="controls-row">
        <button id="prevBtn" class="btn"><i class="fas fa-arrow-left-long"></i>Prev</button>
        <button id="playPauseBtn" class="btn"><i class="fas fa-play-circle"></i>Play</button>
        <button id="nextBtn" class="btn">Next<i class="fas fa-arrow-right-long"></i></button>
        <button id="fullscreenBtn" class="btn"><i class="fas fa-compress-arrows-alt"></i>Expand</button>
        <button id="muteBtn" class="btn"><i class="fas fa-volume-high"></i>Audio</button>
        <button id="closeBtn" class="btn"><i class="fas fa-rectangle-xmark text-red-400"></i>Exit</button>
      </div>
    </div>
  </div>
</div>

<script>
    /******************************
     * Rush Hour Trilogy Array
     ******************************/
    const movies = [
        { 
          title: "Rush Hour", 
          video: "https://mega.nz/embed/H7xGjZTQ#ugJNBgtEKXOxGnDT40TW9FTAezJdICkQ9ewtHmOewtg", 
          image: "https://image.tmdb.org/t/p/w500/we7wOLVFgxhzLzUt0qNe50xdIQZ.jpg?apiKey=978d4147c43f5efc5cb62dd5740f2873&language_key=da-DK&append_to_response=images&include_image_language=da", 
          category: "other", 
          year: 1998,
          description: "A fast-talking LAPD detective and a dedicated Hong Kong police inspector team up in Los Angeles to rescue the kidnapped young daughter of a Chinese diplomat, clashing over culture and jurisdiction along the way."
        },
        { 
          title: "Rush Hour 2", 
          video: "https://mega.nz/embed/LzZBkQDA#Ait9IsouC6JibGfAgxCSWwfOi7gKWNwq5mD7jke7QiU", 
          image: "https://webservice.mymovies.dk/Posters/d6789f44-635e-4712-b7fc-4d25278cc577.jpg", 
          category: "other", 
          year: 2001,
          description: "Inspector Lee and Detective Carter vacation in Hong Kong, but are quickly drawn into a massive counterfeiting conspiracy involving a local Triad crime lord and a treacherous American socialite."
        },
        { 
          title: "Rush Hour 3", 
          video: "https://mega.nz/embed/OzpgwRba#hyWS06zHz_s7TZaEcxI_0h7yjPRsqQZNI51s2Ie7L10", 
          image: "https://e0.pxfuel.com/wallpapers/622/964/desktop-wallpaper-rush-hour-3-movie-hq-rush-hour-3-2019-thumbnail.jpg", 
          category: "other", 
          year: 2007,
          description: "After an assassination attempt on Ambassador Han in Los Angeles, the mismatched duo travels to Paris to protect a French woman who holds key secrets to defeating the deadly Chinese Triads."
        }
    ];

    /******************************
     * DOM elements setup
     ******************************/
    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    /******************************
     * Core Player Mechanics
     ******************************/
    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || url.includes('manifest');
    }
    function isYouTube(url) {
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) return;
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || '';

      resetPlayerContainer();
      showModal();

      let src = movie.video;
      const lc = (src || '').toLowerCase();

      if (lc.includes('mega.nz') || lc.includes('drive.google.com') || lc.includes('ok.ru') || lc.includes('streamtape')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause-circle"></i>Pause';
        return;
      }

      if (isYouTube(src)) {
        playerWrapper.innerHTML = `<iframe src="${src}?autoplay=1&modestbranding=1" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause-circle"></i>Pause';
        return;
      }

      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(src);
          currentHls.attachMedia(v);
          currentHls.on(Hls.Events.MANIFEST_PARSED, () => { v.play().catch(()=>{}); });
        }
        return;
      }

      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        v.src = src;
        v.play().catch(()=>{});
        return;
      }
    }

    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v || !v.src) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause-circle"></i>Pause';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play-circle"></i>Play';
      }
    }
    function playNext() {
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
    }
    function playPrev() {
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
    }
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el);
        fullscreenBtn.innerHTML = '<i class="fas fa-compress-arrows-alt"></i>Shrink';
      } else {
        document.exitFullscreen();
        fullscreenBtn.innerHTML = '<i class="fas fa-compress-arrows-alt"></i>Expand';
      }
    }
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-xmark text-red-400"></i>Muted' : '<i class="fas fa-volume-high"></i>Audio';
    }

    function closeModalHandler() {
      resetPlayerContainer();
      hideModal();
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);
    playbackModal.addEventListener('click', (e) => { if (e.target === playbackModal) closeModalHandler(); });

    /******************************
     * UI Grid Engine Rendering
     ******************************/
    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index + 1) * 100}`;
        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-xl overflow-hidden bg-gray-900 border border-gray-800 hover:border-[#f59e0b] cursor-pointer relative group w-full max-w-[200px] mx-auto`;
        div.innerHTML = `
          <div class="relative overflow-hidden aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
              <button class="bg-[#f59e0b] hover:bg-[#ef4444] text-gray-950 font-bold py-2 px-4 rounded-lg w-full text-sm tracking-wide uppercase transition transform hover:scale-105 shadow-lg shadow-gold">
                <i class="fas fa-play mr-2 text-xs"></i> Stream
              </button>
            </div>
          </div>
          <div class="p-3 bg-gradient-to-b from-gray-900 to-black">

        container.appendChild(star);

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>
