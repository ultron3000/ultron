name: Refresh FOX FIFA Streaming Token

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-link:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Content
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Puppeteer Module Dependencies
      run: npm install puppeteer

    - name: Run Token Browser Scraper
      run: node update_fox.js

    - name: Check for Modifications
      id: git-check
      run: |
        git diff --exit-code channels.json || echo "modified=true" >> $GITHUB_OUTPUT

    - name: Commit and Push Updated Link
      if: steps.git-check.outputs.modified == 'true'
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add channels.json
        git commit -m "Automated Sync: Updated FOX FIFA stream token via Browser Automation"
        git push
