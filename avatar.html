<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Avatar Universe</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

:root{
  --primary:#00e5ff;
  --secondary:#08131f;
  --accent:#7cf7ff;
  --text:#e6f7ff;
  --muted:#8ca3b3;

  --glass:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.12);

  --pandora-blue:#00d9ff;
  --pandora-purple:#8b5cf6;
  --pandora-green:#00ffbf;

  --card-bg:rgba(8,19,31,.72);
}

*{
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;

  background:
    radial-gradient(circle at top left, rgba(0,229,255,.12), transparent 30%),
    radial-gradient(circle at top right, rgba(139,92,246,.12), transparent 30%),
    linear-gradient(135deg,#020617 0%,#071120 45%,#020617 100%);

  color:var(--text);

  min-height:100vh;

  overflow-x:hidden;

  position:relative;

  margin:0;
}

body::before{
  content:"";
  position:fixed;
  inset:0;

  background:url("https://www.transparenttextures.com/patterns/stardust.png");

  opacity:.12;

  animation:spaceMove 80s linear infinite;

  pointer-events:none;

  z-index:-1;
}

@keyframes spaceMove{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(-1000px);
  }
}

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:#071120;
}

::-webkit-scrollbar-thumb{
  background:#00d9ff;
  border-radius:20px;
}

.container-main{
  width:100%;
  max-width:1500px;
  margin:auto;
  padding:24px;
}

/* HERO */

.hero{
  position:relative;

  width:100%;
  height:680px;

  overflow:hidden;

  border-radius:34px;

  border:1px solid rgba(0,229,255,.18);

  box-shadow:
    0 0 60px rgba(0,229,255,.08),
    0 30px 80px rgba(0,0,0,.55);
}

.hero iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  transform:scale(1.22);
  pointer-events:none;
}

.hero-overlay{
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(2,6,23,1),
      rgba(2,6,23,.4),
      rgba(2,6,23,.2)
    );

  z-index:2;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;

  background:
    radial-gradient(circle at center, rgba(0,229,255,.18), transparent 40%);

  z-index:1;

  animation:pulseGlow 5s ease infinite;
}

@keyframes pulseGlow{
  0%,100%{
    opacity:.5;
  }
  50%{
    opacity:1;
  }
}

.hero-content{
  position:absolute;
  bottom:70px;
  left:60px;
  z-index:5;
  max-width:700px;
}

.hero-title{
  font-size:5rem;
  font-weight:900;
  line-height:1;
  color:white;

  text-shadow:
    0 0 15px rgba(0,229,255,.55),
    0 0 40px rgba(0,229,255,.25);
}

.hero-text{
  margin-top:20px;

  color:#d7f9ff;

  font-size:1.05rem;

  line-height:1.8;
}

.hero-buttons{
  display:flex;
  gap:16px;
  margin-top:30px;
  flex-wrap:wrap;
}

.hero-btn{
  padding:14px 28px;

  border-radius:999px;

  border:none;

  cursor:pointer;

  transition:.35s ease;

  font-weight:700;

  font-size:1rem;
}

.hero-btn.primary{
  background:#00d9ff;
  color:black;

  box-shadow:
    0 0 25px rgba(0,229,255,.55);
}

.hero-btn.primary:hover{
  transform:translateY(-4px) scale(1.03);
}

.hero-btn.secondary{
  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.14);

  color:white;

  backdrop-filter:blur(16px);
}

.hero-btn.secondary:hover{
  background:rgba(0,229,255,.15);
}

/* LOGO */

.logo{
  position:absolute;
  top:35px;
  left:40px;
  z-index:5;
  height:90px;

  animation:
    floatLogo 4s ease-in-out infinite,
    glowLogo 3s ease-in-out infinite alternate;
}

@keyframes floatLogo{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-10px);
  }
}

@keyframes glowLogo{
  from{
    filter:
      drop-shadow(0 0 10px rgba(0,229,255,.4));
  }
  to{
    filter:
      drop-shadow(0 0 30px rgba(0,229,255,.95));
  }
}

/* GRID */

.movies-grid{
  display:grid;

  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

  gap:28px;

  margin-top:45px;
}

/* MOVIE CARD */

.movie-card{
  position:relative;

  overflow:hidden;

  border-radius:24px;

  background:var(--card-bg);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(18px);

  transition:all .45s cubic-bezier(.2,.8,.2,1);

  cursor:pointer;

  box-shadow:
    0 12px 30px rgba(0,0,0,.4);
}

.movie-card::before{
  content:"";
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      135deg,
      rgba(0,229,255,.14),
      transparent 40%,
      rgba(139,92,246,.14)
    );

  opacity:0;

  transition:.45s;

  z-index:1;
}

.movie-card:hover::before{
  opacity:1;
}

.movie-card:hover{
  transform:
    translateY(-14px)
    scale(1.03);

  border-color:rgba(0,229,255,.35);

  box-shadow:
    0 0 40px rgba(0,229,255,.18),
    0 30px 60px rgba(0,0,0,.55);
}

.poster-wrap{
  position:relative;
  overflow:hidden;
}

.movie-poster{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;

  transition:transform .8s ease;
}

.movie-card:hover .movie-poster{
  transform:scale(1.08);
}

.poster-overlay{
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to top,
      rgba(2,6,23,1),
      transparent 55%
    );
}

.play-overlay{
  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;

  transition:.4s ease;

  z-index:5;
}

.movie-card:hover .play-overlay{
  opacity:1;
}

.play-btn{
  width:70px;
  height:70px;

  border-radius:50%;

  border:none;

  background:#00d9ff;

  color:black;

  font-size:1.4rem;

  cursor:pointer;

  box-shadow:
    0 0 30px rgba(0,229,255,.8);

  transition:.3s ease;
}

.play-btn:hover{
  transform:scale(1.1);
}

.movie-year{
  position:absolute;
  top:14px;
  right:14px;

  z-index:5;

  padding:6px 12px;

  border-radius:999px;

  background:rgba(0,0,0,.45);

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,.12);

  font-size:.8rem;
}

.movie-info{
  padding:18px;
  position:relative;
  z-index:3;
}

.movie-title{
  font-size:1.05rem;
  font-weight:700;
  color:white;
}

.movie-meta{
  display:flex;
  justify-content:space-between;
  margin-top:12px;

  color:#89eaff;

  font-size:.9rem;
}

/* MODAL */

.modal-backdrop{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.88);

  display:none;

  align-items:center;
  justify-content:center;

  z-index:9999;

  padding:20px;
}

.modal-backdrop.active{
  display:flex;
}

.modal-card{
  width:95%;
  max-width:1400px;

  background:
    linear-gradient(
      145deg,
      rgba(6,15,25,.96),
      rgba(10,20,35,.92)
    );

  border:1px solid rgba(0,229,255,.16);

  backdrop-filter:blur(24px);

  border-radius:28px;

  overflow:hidden;

  box-shadow:
    0 0 50px rgba(0,229,255,.16),
    0 30px 80px rgba(0,0,0,.75);
}

.player-wrapper{
  position:relative;
  width:100%;
  background:black;
}

.player-wrapper video,
.player-wrapper iframe{
  width:100%;
  height:70vh;
  border:none;
  background:black;
}

.player-meta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  padding:22px;
  flex-wrap:wrap;
}

.player-meta h3{
  margin:0;
  font-size:1.5rem;
  color:white;
}

.player-meta p{
  margin-top:10px;
  color:#98b3c5;
  line-height:1.6;
}

.controls-row{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  position:relative;

  background:
    linear-gradient(
      145deg,
      rgba(0,229,255,.08),
      rgba(255,255,255,.03)
    );

  border:1px solid rgba(0,229,255,.25);

  color:#dffcff;

  padding:12px 18px;

  border-radius:14px;

  cursor:pointer;

  transition:.35s ease;

  backdrop-filter:blur(12px);

  overflow:hidden;

  font-weight:600;
}

.btn::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,.15),
      transparent
    );

  transform:translateX(-100%);

  transition:.6s;
}

.btn:hover::before{
  transform:translateX(100%);
}

.btn:hover{
  transform:translateY(-2px);

  border-color:rgba(0,229,255,.6);

  box-shadow:
    0 0 20px rgba(0,229,255,.22);
}

#topCloseBtn{
  position:absolute;
  top:14px;
  right:14px;

  z-index:10;

  width:48px;
  height:48px;

  border:none;

  border-radius:50%;

  background:rgba(0,0,0,.55);

  color:white;

  cursor:pointer;

  transition:.3s ease;
}

#topCloseBtn:hover{
  background:black;
  transform:scale(1.08);
}

/* FOOTER */

.footer{
  margin-top:70px;
  text-align:center;
  padding-bottom:40px;
}

.footer a{
  color:#9fb6c5;
  margin:0 10px;
  font-size:1.2rem;
  transition:.3s ease;
}

.footer a:hover{
  color:#00d9ff;
}

/* RESPONSIVE */

@media(max-width:900px){

  .hero{
    height:540px;
  }

  .hero-title{
    font-size:3.5rem;
  }

  .hero-content{
    left:30px;
    bottom:40px;
  }

  .logo{
    height:70px;
  }

  .player-wrapper video,
  .player-wrapper iframe{
    height:50vh;
  }
}

@media(max-width:640px){

  .container-main{
    padding:16px;
  }

  .hero{
    height:450px;
    border-radius:24px;
  }

  .hero-title{
    font-size:2.5rem;
  }

  .hero-content{
    left:20px;
    right:20px;
    bottom:24px;
  }

  .hero-text{
    font-size:.95rem;
  }

  .logo{
    top:18px;
    left:18px;
    height:54px;
  }

  .movies-grid{
    grid-template-columns:repeat(2,1fr);
    gap:18px;
  }

  .player-wrapper video,
  .player-wrapper iframe{
    height:35vh;
  }

  .btn{
    flex:1;
    justify-content:center;
  }

  .controls-row{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container-main">

  <!-- HERO -->
  <div class="hero">

    <div class="hero-overlay"></div>

    <iframe
      src="https://www.youtube.com/embed/nb_fFj_0rq8?autoplay=1&mute=1&loop=1&playlist=nb_fFj_0rq8&controls=0&modestbranding=1"
      allow="autoplay; fullscreen">
    </iframe>

    <img
      src="https://images.squarespace-cdn.com/content/v1/5552f5d9e4b098f713cf5ef2/488146c8-4da2-4a2f-9099-b38749f365ca/Avatar-Logo.png"
      class="logo"
      alt="Avatar Logo">

    <div class="hero-content">

      <div class="hero-title">
        ENTER<br>PANDORA
      </div>

      <div class="hero-text">
        Experience the complete Avatar cinematic universe with immersive bioluminescent visuals, cinematic playback and next-generation streaming aesthetics.
      </div>

      <div class="hero-buttons">

        <button class="hero-btn primary">
          <i class="fas fa-play mr-2"></i>
          Explore
        </button>

        <button class="hero-btn secondary">
          <i class="fas fa-film mr-2"></i>
          Collection
        </button>

      </div>

    </div>

  </div>

  <!-- MOVIES -->
  <div class="movies-grid" id="movies"></div>

  <!-- FOOTER -->
  <div class="footer">

    <a href="#"><i class="fab fa-facebook-f"></i></a>

    <a href="#"><i class="fab fa-twitter"></i></a>

    <a href="https://www.instagram.com/stark_4152/reels"><i class="fab fa-instagram"></i></a>

    <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g"><i class="fab fa-youtube"></i></a>

  </div>

</div>

<!-- MODAL -->
<div id="playbackModal" class="modal-backdrop">

  <div class="modal-card">

    <div class="player-wrapper" id="playerWrapper">

      <video id="modalVideo" controls playsinline></video>

      <button id="topCloseBtn">
        <i class="fas fa-times"></i>
      </button>

    </div>

    <div class="player-meta">

      <div>
        <h3 id="modalTitle">Title</h3>
        <p id="modalDesc"></p>
      </div>

      <div class="controls-row">

        <button id="prevBtn" class="btn">
          <i class="fas fa-step-backward"></i>
        </button>

        <button id="playPauseBtn" class="btn">
          <i class="fas fa-play"></i>
        </button>

        <button id="nextBtn" class="btn">
          <i class="fas fa-step-forward"></i>
        </button>

        <button id="fullscreenBtn" class="btn">
          <i class="fas fa-expand"></i>
        </button>

        <button id="muteBtn" class="btn">
          <i class="fas fa-volume-up"></i>
        </button>

        <button id="closeBtn" class="btn">
          <i class="fas fa-times"></i>
        </button>

      </div>

    </div>

  </div>

</div>

<script>

const movies = [

{
title:"Avatar",
language:"English",
video:"https://mega.nz/embed/Jc0X1IQI#vcOVxskqnRJlZGyo1MyYPBABu8mEEYiqJv21VRKvJmE",
image:"https://image.tmdb.org/t/p/w500/gKY6q7SjCkAU6FqvqWybDYgUKIF.jpg",
year:2009,
duration:"160 min",
description:"A paraplegic Marine dispatched to Pandora..."
},

{
title:"Avatar: The Way of Water",
language:"English",
video:"https://storrrrrrm.site/stream/75160113d5a4469b/1038p.m3u8",
image:"https://image.tmdb.org/t/p/w500/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg",
year:2022,
duration:"190 min",
description:"Jake Sully lives with his family..."
},

{
title:"Avatar: Fire and Ash",
language:"English",
video:"https://mega.nz/embed/gdtzBSKI#FvPWcAk-Ssk2l6SvdYHr5wd5JKTBOxxEIec6qjyFUsI",
image:"https://image.tmdb.org/t/p/w500/g96wHxU7EnoIFwemb2RgohIXrgW.jpg",
year:2025,
duration:"190 min",
description:"Jake and Neytiri face Ash People..."
},

{
title:"Avatar (Hindi)",
language:"Hindi",
video:"https://mega.nz/embed/VYdGzYrb#W1JpGowM5N3lB7Dtiw3EvsCF0uNLMOavaLLYJ7g6ljY",
image:"https://m.media-amazon.com/images/I/61O8KP0CYVS.jpg",
year:2009,
duration:"190 min",
description:"Hindi version..."
},

{
title:"Avatar 2 (Hindi)",
language:"Hindi",
video:"https://mega.nz/embed/UN8iHTjS#EyES8ImHKm8mlAETupSpERY4tO05nbTOvdBWOM4Ghzs",
image:"https://wallpapercave.com/wp/wp11685736.jpg",
year:2022,
duration:"190 min",
description:"Hindi version..."
},

{
title:"Avatar 3 (Hindi)",
language:"Hindi",
video:"https://mega.nz/embed/sNtD2KQA#iAjs3QxE9ksR5Y2oVTZ-gDuDs_iR87-s3SK4XFHrSvo",
image:"https://m.media-amazon.com/images/I/71OioRQjVQL._AC_UF894,1000_QL80_.jpg",
year:2025,
duration:"190 min",
description:"Hindi version..."
}

];

const playbackModal=document.getElementById('playbackModal');
const playerWrapper=document.getElementById('playerWrapper');
const modalTitle=document.getElementById('modalTitle');
const modalDesc=document.getElementById('modalDesc');

const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const playPauseBtn=document.getElementById('playPauseBtn');
const fullscreenBtn=document.getElementById('fullscreenBtn');
const muteBtn=document.getElementById('muteBtn');

let currentHls=null;
let currentFiltered=[];
let currentIndex=null;

function isMP4(url){
  return /\.mp4($|\?)/i.test((url||''));
}

function isHls(url){
  if(!url)return false;

  return url.includes('.m3u8') ||
         url.includes('index-') ||
         /index.*\.txt/i.test(url) ||
         url.includes('manifest') ||
         url.includes('master');
}

function isYouTube(url){
  if(!url)return false;

  return url.includes('youtube.com') ||
         url.includes('youtu.be') ||
         url.includes('/embed/');
}

function resetPlayerContainer(){

  if(currentHls){

    try{
      currentHls.destroy();
    }catch(e){}

    currentHls=null;
  }

  playerWrapper.innerHTML=`
    <video id="modalVideo" controls playsinline></video>

    <button id="topCloseBtn">
      <i class="fas fa-times"></i>
    </button>
  `;

  document.getElementById('topCloseBtn')
    .addEventListener('click',closeModalHandler);
}

function showModal(){
  playbackModal.classList.add('active');
  document.body.style.overflow='hidden';
}

function hideModal(){
  playbackModal.classList.remove('active');
  document.body.style.overflow='';
}

function openPlayer(list,index){

  currentFiltered=list;
  currentIndex=index;

  const movie=list[index];

  modalTitle.textContent=movie.title;
  modalDesc.textContent=movie.description;

  resetPlayerContainer();

  showModal();

  let src='';

  if(typeof movie.video==='object'){
    src=movie.video.high ||
        movie.video.medium ||
        movie.video.low;
  }else{
    src=movie.video;
  }

  const lc=src.toLowerCase();

  if(
    lc.includes('mega.nz') ||
    lc.includes('drive.google.com')
  ){

    playerWrapper.innerHTML=`
      <iframe
        src="${src}"
        allowfullscreen
        allow="autoplay; encrypted-media">
      </iframe>

      <button id="topCloseBtn">
        <i class="fas fa-times"></i>
      </button>
    `;

    document.getElementById('topCloseBtn')
      .addEventListener('click',closeModalHandler);

    return;
  }

  if(isYouTube(src)){

    playerWrapper.innerHTML=`
      <iframe
        src="${src}?autoplay=1"
        allowfullscreen
        allow="autoplay; encrypted-media">
      </iframe>

      <button id="topCloseBtn">
        <i class="fas fa-times"></i>
      </button>
    `;

    document.getElementById('topCloseBtn')
      .addEventListener('click',closeModalHandler);

    return;
  }

  const v=document.getElementById('modalVideo');

  if(isHls(src)){

    if(Hls.isSupported()){

      currentHls=new Hls();

      currentHls.loadSource(src);

      currentHls.attachMedia(v);

      currentHls.on(Hls.Events.MANIFEST_PARSED,function(){

        v.play().catch(()=>{});

      });

    }else if(v.canPlayType('application/vnd.apple.mpegurl')){

      v.src=src;

      v.play().catch(()=>{});
    }

  }else{

    v.src=src;

    v.play().catch(()=>{});
  }
}

function togglePlayPause(){

  const v=document.getElementById('modalVideo');

  if(!v)return;

  if(v.paused){

    v.play().catch(()=>{});

    playPauseBtn.innerHTML='<i class="fas fa-pause"></i>';

  }else{

    v.pause();

    playPauseBtn.innerHTML='<i class="fas fa-play"></i>';
  }
}

function playNext(){

  if(currentIndex<currentFiltered.length-1){

    openPlayer(currentFiltered,currentIndex+1);
  }
}

function playPrev(){

  if(currentIndex>0){

    openPlayer(currentFiltered,currentIndex-1);
  }
}

function toggleFullscreen(){

  const el=document.getElementById('modalVideo') ||
            playerWrapper.querySelector('iframe');

  if(!el)return;

  if(!document.fullscreenElement){

    (el.requestFullscreen ||
      playerWrapper.requestFullscreen)
      .call(el);

  }else{

    document.exitFullscreen();
  }
}

function toggleMute(){

  const v=document.getElementById('modalVideo');

  if(!v)return;

  v.muted=!v.muted;

  muteBtn.innerHTML=v.muted
    ? '<i class="fas fa-volume-mute"></i>'
    : '<i class="fas fa-volume-up"></i>';
}

function closeModalHandler(){

  if(currentHls){

    try{
      currentHls.destroy();
    }catch(e){}

    currentHls=null;
  }

  const v=document.getElementById('modalVideo');

  if(v){

    try{
      v.pause();
    }catch(e){}

    try{
      v.removeAttribute('src');
      v.load();
    }catch(e){}
  }

  hideModal();

  currentIndex=null;
}

playPauseBtn.addEventListener('click',togglePlayPause);
nextBtn.addEventListener('click',playNext);
prevBtn.addEventListener('click',playPrev);
fullscreenBtn.addEventListener('click',toggleFullscreen);
muteBtn.addEventListener('click',toggleMute);

document.getElementById('closeBtn')
  .addEventListener('click',closeModalHandler);

document.getElementById('topCloseBtn')
  .addEventListener('click',closeModalHandler);

playbackModal.addEventListener('click',function(e){

  if(e.target===playbackModal){

    closeModalHandler();
  }
});

document.addEventListener('keydown',(e)=>{

  if(!playbackModal.classList.contains('active'))return;

  switch(e.key.toLowerCase()){

    case 'escape':
      closeModalHandler();
      break;

    case ' ':
      e.preventDefault();
      togglePlayPause();
      break;

    case 'f':
      toggleFullscreen();
      break;

    case 'm':
      toggleMute();
      break;

    case 'n':
      playNext();
      break;

    case 'p':
      playPrev();
      break;
  }
});

const container=document.getElementById('movies');

function renderMovies(moviesToRender){

  container.innerHTML='';

  moviesToRender.forEach((movie,index)=>{

    const div=document.createElement('div');

    div.className='movie-card';

    div.innerHTML=`

      <div class="poster-wrap">

        <img
          src="${movie.image}"
          alt="${movie.title}"
          class="movie-poster">

        <div class="poster-overlay"></div>

        <div class="play-overlay">

          <button class="play-btn">
            <i class="fas fa-play"></i>
          </button>

        </div>

        <div class="movie-year">
          ${movie.year}
        </div>

      </div>

      <div class="movie-info">

        <div class="movie-title">
          ${movie.title}
        </div>

        <div class="movie-meta">

          <span>${movie.language}</span>

          <span>${movie.duration}</span>

        </div>

      </div>
    `;

    div.addEventListener('click',()=>{

      openPlayer(moviesToRender,index);

    });

    container.appendChild(div);

  });
}

renderMovies(movies);

</script>

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>
