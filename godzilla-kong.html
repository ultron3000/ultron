<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Godzilla vs Kong - MonsterVerse Hub</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Impact&family=Montserrat:wght@400;500;700;800&display=swap');
    
    :root {
      --godzilla-neon: #00f0ff; /* Atomic Cyan Blue */
      --kong-neon: #ff9900;     /* Primal Hollow Earth Orange */
      --bg-dark: #07090e;
      --card-bg: #10141d;
    }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at top, #0f172a 0%, #05070b 100%);
      color: #f3f4f6;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .movie-card {
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }
    
    .movie-card:hover {
      transform: translateY(-6px);
      border-color: rgba(0, 240, 255, 0.3);
      box-shadow: 0 10px 25px rgba(0, 240, 255, 0.15);
    }
    
    .movie-poster {
      aspect-ratio: 2/3;
      transition: transform 0.5s ease;
    }
    
    .movie-card:hover .movie-poster {
      transform: scale(1.03);
    }
    
    .glow-atomic {
      text-shadow: 0 0 12px rgba(0, 240, 255, 0.6);
    }
    
    /* Custom clean styling for scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #05070b;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--godzilla-neon);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--kong-neon);
    }
    
    @keyframes entryUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-titan-fade {
      animation: entryUp 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }
    
    /* Modal Layout Overhaul Engine */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(3, 4, 7, 0.96); 
      backdrop-filter: blur(8px);
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
    }
    .modal-backdrop.active { display:flex; }
    
    .modal-card { 
      width: 100%;
      height: 100%;
      max-width: 1000px;
      max-height: 100vh;
      background: #090d16;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 70px rgba(0,0,0,0.8);
    }
    
    .player-wrapper { 
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }
    
    #topCloseBtn { 
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    #topCloseBtn:hover {
      background: #dc2626;
      border-color: #dc2626;
      transform: scale(1.05);
    }
    
    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      background: #060910;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Balanced Controls Row Grid Layout for Mobile viewports */
    .controls-row { 
      display: grid;
      grid-template-cols: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
    }

    /* Titan Button UI Architecture styling */
    .btn {
      background: #121824;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #cbd5e1;
      padding: 12px 6px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    .btn:hover { 
      background: #1a2334;
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }
    
    /* Play Highlight Button Variant */
    .btn-play-atomic {
      background: linear-gradient(135deg, #00b8d4 0%, #00e5ff 100%) !important;
      border-color: #00e5ff !important;
      color: #04060a !important;
    }
    .btn-play-atomic:hover {
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
      filter: brightness(1.1);
    }
    
    /* Exit Button Variant */
    .btn-exit-titan {
      background: rgba(239, 68, 68, 0.1) !important;
      border-color: rgba(239, 68, 68, 0.3) !important;
      color: #ef4444 !important;
    }
    .btn-exit-titan:hover {
      background: #ef4444 !important;
      color: white !important;
    }

    /* Responsive Adaptations Layer */
    @media (min-width: 768px) {
      .modal-card {
        width: 90%;
        height: auto;
        border-radius: 8px;
        max-height: 85vh;
        overflow: hidden;
      }
      .player-wrapper {
        padding-bottom: 56.25%;
        height: 0;
      }
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 18px;
      }
      .controls-row {
        display: flex;
        width: auto;
        gap: 10px;
      }
      .btn {
        padding: 10px 16px;
        font-size: 0.85rem;
      }
    }

    @media (max-width: 480px) {
      .btn span {
        font-size: 0.7rem;
      }
    }

    video:fullscreen, iframe:fullscreen {
      width: 100vw !important;
      height: 100vh !important;
      object-fit: contain !important;
      background-color: black;
    }
</style>
</head>
<body class="relative">

<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
  <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/90"></div>
  <div class="stars absolute inset-0"></div>
  <div class="stars2 absolute inset-0"></div>
</div>

<div class="container mx-auto px-4 py-6 max-w-7xl">

  <div class="relative w-full h-[200px] sm:h-[300px] md:h-[400px] overflow-hidden rounded-2xl border border-cyan-500/10 mb-8 shadow-2xl">
    <iframe 
      src="https://www.youtube.com/embed/XLYAz6yuJOk?autoplay=1&mute=1&loop=1&playlist=QsvRms3HJi4&controls=0&modestbranding=1&showinfo=0&rel=0"
      frameborder="0" 
      allow="autoplay; fullscreen" 
      class="absolute top-1/2 left-1/2 min-w-full min-h-full -translate-x-1/2 -translate-y-1/2 pointer-events-none object-cover opacity-50 scale-105">
    </iframe>

    <div class="absolute inset-0 bg-gradient-to-t from-[#05070b] via-black/20 to-transparent"></div>
    <div class="absolute top-4 left-4 z-20">
      <img 
        src="https://upload.wikimedia.org/wikipedia/commons/f/f9/Godzilla_vs._Kong_Logo.png" 
        alt="Titan Logo" 
        class="h-12 sm:h-16 md:h-24 object-contain drop-shadow-[0_4px_8px_rgba(0,0,0,0.8)]"
      />
    </div>
  </div>

  <div class="mb-12">
    <div class="flex items-center justify-between border-b border-gray-800 pb-3 mb-6">
      <h2 class="text-lg sm:text-2xl font-bold uppercase tracking-wider glow-atomic text-white">
        <i class="fas fa-bolt text-cyan-400 mr-2"></i>Titan Outpost Archive
      </h2>
      <span class="text-xs font-mono text-gray-500 bg-slate-900 px-2 py-1 rounded border border-gray-800" id="titanCounter">Verifying Nodes...</span>
    </div>
    
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6" id="movies"></div>
  </div>

  <div class="border-t border-gray-900 mt-16 pt-8 pb-4 text-center text-xs text-gray-600">
    <div class="flex justify-center gap-6 mb-4 text-base">
      <a href="#" class="text-gray-500 hover:text-cyan-400 transition-colors"><i class="fab fa-facebook-f"></i></a>
      <a href="#" class="text-gray-500 hover:text-orange-400 transition-colors"><i class="fab fa-twitter"></i></a>
      <a href="https://www.instagram.com/stark_4152/reels" class="text-gray-500 hover:text-cyan-400 transition-colors"><i class="fab fa-instagram"></i></a>
      <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="text-gray-500 hover:text-orange-400 transition-colors"><i class="fab fa-youtube"></i></a>
    </div>
    <p class="font-mono uppercase tracking-widest text-[10px] text-gray-700">&copy; 2026 Monarch Terminal Protocol Network Stream</p>
  </div>
</div>

<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" title="Deactivate Feed">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="player-meta">
      <div class="flex-1 min-w-0 pr-2">
        <h3 id="modalTitle" class="truncate font-bold tracking-wide text-white">Operation Asset</h3>
        <p id="modalDesc" class="text-gray-400 text-xs sm:text-sm mt-0.5 truncate font-light"></p>
      </div>
      
      <div class="controls-row">
        <button id="prevBtn" class="btn"><i class="fas fa-backward"></i><span>Prev</span></button>
        <button id="playPauseBtn" class="btn btn-play-atomic"><i class="fas fa-play"></i><span>Play</span></button>
        <button id="nextBtn" class="btn"><span>Next</span><i class="fas fa-forward"></i></button>
        <button id="fullscreenBtn" class="btn"><i class="fas fa-expand"></i><span>Size</span></button>
        <button id="muteBtn" class="btn"><i class="fas fa-volume-up"></i><span>Mute</span></button>
        <button id="closeBtn" class="btn btn-exit-titan"><i class="fas fa-power-off"></i><span>Exit</span></button>
      </div>
    </div>
  </div>
</div>

<script>
    /******************************
     * Movies Database Array (Enriched with fixed properties)
     ******************************/
    const movies = [
        { title: "Kong: Skull Island", video: "https://mega.nz/embed/P6ZHyS6K#TdL8qW1nOH5Rp-TWx4gm1WAh3SP8fIYdRnK7pCPWqNw", image: "https://i.pinimg.com/736x/06/96/f5/0696f51f664f753b9f94e0375742c888.jpg", category: "godzilla", year: 2017, duration: "2h 00m" },
        { title: "Godzilla", video: "https://mega.nz/embed/6qBjQCjL#s-j05nYnpLLhjuKyJKin1fYr6gW598WpNztmjhVDv1s", image: "https://i.ebayimg.com/images/g/ZmMAAOSwRiNk5YET/s-l1200.jpg", category: "godzilla", year: 2014, duration: "2h 03m" },
        { title: "Godzilla: King of the Monsters", video: "https://mega.nz/embed/G2ISXD7b#4L88Q7dzcizM_xYLwwrNRaxzCAQZI3xfp5REfVMl5tQ", image: "https://musicart.xboxlive.com/7/8f586a00-0000-0000-0000-000000000002/504/image.jpg", category: "godzilla", year: 2019, duration: "2h 12m" },
        { title: "Godzilla vs. Kong", video: "https://mega.nz/embed/anpVlLxI#zvy_YXRXxdL4Xf8-qSvwN6KCp8y6L-URTLHHZ2fEA-Q", image: "https://preview.redd.it/ive-just-noticed-these-posters-recently-they-all-seem-to-v0-7n3vir46w8wc1.jpg?width=640&crop=smart&auto=webp&s=f08b754a2bb4ef3d7fb14e5129f0ccf8188af421", category: "godzilla", year: 2021, duration: "1h 53m" },
        { title: "Godzilla Minus One", video: "https://mega.nz/embed/Wr4CWLxI#fhj4N1-Gxo_Lo4W5iSSW-oQng00qOuDYelfnrXIoYqc", image: "https://image.tmdb.org/t/p/w500/2E2WTX0TJEflAged6kzErwqX1kt.jpg", category: "godzilla", year: 2023, duration: "2h 04m" },
        { title: "Godzilla x Kong: The New Empire", video: "https://mega.nz/embed/7ixRAIgD#APEeIpE0uGRI8NGfmHOAVKDIvyUrGU1p_xF-w-W53iI", image: "https://myhotposters.com/cdn/shop/files/mL7118_1024x1024.jpg?v=1748531263", category: "godzilla", year: 2024, duration: "1h 55m" },
        { title: "Godzilla", video: "https://mega.nz/embed/2mA33DwR#Piqt66yBdIgapnbkN0vgHmet5U9WB8MEHHHSFK3DSmI", image: "https://picfiles.alphacoders.com/433/thumb-433474.jpg", category: "godzilla", year: 1998, duration: "2h 19m" },
        { title: "King Kong", video: "https://mega.nz/embed/CuAjBIRY#a52Pu-S6Wxiasg1Jla1uNqnH1S3hO-elYDiSi4xanIc", image: "https://image.tmdb.org/t/p/original/3PLDhyNX9QIq176XI84Q6PeFD5h.jpg", category: "godzilla", year: 2005, duration: "3h 07m" }
    ];

    /******************************
     * DOM Caching Nodes References
     ******************************/
    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) return;
      
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];
      if (!movie) return;

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = `${movie.year} • Monarch Field Telemetry Logging Operational Feed Stream`;

      resetPlayerContainer();
      showModal();

      let src = (typeof movie.video === 'object' && movie.video !== null) ? 
                (movie.video.high || movie.video.medium || Object.values(movie.video)[0]) : movie.video;
      if (!src) return;

      const lc = src.toLowerCase();

      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('mega.nz') || lc.includes('drive.google.com')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isYouTube(src)) {
        let embed = src;
        try {
          if (src.includes('watch') && src.includes('v=')) {
            const v = new URLSearchParams(src.split('?')[1]).get('v');
            if (v) embed = `https://www.youtube.com/embed/${v}`;
          } else if (src.includes('youtu.be/')) {
            const p = src.split('youtu.be/')[1].split(/[?&]/)[0];
            if (p) embed = `https://www.youtube.com/embed/${p}`;
          }
        } catch (e) {}
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) return;
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(src);
          currentHls.attachMedia(v);
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        }
        return;
      }

      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) return;
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }
    }

    /******************************
     * Control Interface Bindings Engine
     ******************************/
    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
      }
    }
    
    function playNext() {
      if (!currentFiltered.length) currentFiltered = movies.slice();
      if (currentIndex != null && currentIndex < currentFiltered.length - 1) {
        openPlayer(currentFiltered, currentIndex + 1);
      }
    }
    
    function playPrev() {
      if (!currentFiltered.length) currentFiltered = movies.slice();
      if (currentIndex != null && currentIndex > 0) {
        openPlayer(currentFiltered, currentIndex - 1);
      }
    }
    
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=>{});
      } else {
        document.exitFullscreen();
      }
    }
    
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i><span>Muted</span>' : '<i class="fas fa-volume-up"></i><span>Mute</span>';
    }

    function closeModalHandler() {
      if (currentHls) { try { currentHls.destroy(); } catch(e){} currentHls = null; }
      const v = document.getElementById(modalVideoId);
      if (v) { try { v.pause(); v.removeAttribute('src'); v.load(); } catch(e){} }
      resetPlayerContainer();
      hideModal();
      playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);

    playbackModal.addEventListener('click', function(e){
      if (e.target === playbackModal) closeModalHandler();
    });

    /******************************
     * Collection Render Node Grid Setup
     ******************************/
    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const div = document.createElement('div');
        div.className = `movie-card animate-titan-fade rounded-xl overflow-hidden bg-[#0c101a] cursor-pointer relative group flex flex-col justify-between`;
        div.innerHTML = `
          <div class="relative overflow-hidden bg-black aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-[#05070b] via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center p-4">
              <div class="bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-bold text-xs uppercase tracking-wider py-2.5 px-4 rounded shadow-lg transform translate-y-3 group-hover:translate-y-0 transition-all duration-300">
                <i class="fas fa-play mr-1.5 text-[10px]"></i> Stream Feed
              </div>
            </div>
          </div>
          <div class="p-3 sm:p-4 bg-[#0a0e17]">
            <h3 class="font-bold text-sm sm:text-base text-gray-200 group-hover:text-cyan-400 transition duration-200 truncate">${movie.title}</h3>
            <div class="flex justify-between items-center mt-1 text-xs text-gray-500 font-mono">
              <span>${movie.year}</span>
              <span class="bg-slate-900 border border-gray-800 px-1.5 py-0.5 rounded text-[10px] text-cyan-500">${movie.duration}</span>
            </div>
          </div>
        `;

        div.addEventListener('click', () => openPlayer(moviesToRender, index));
        container.appendChild(div);
      });
      
      const counterNode = document.getElementById('titanCounter');
      if (counterNode) counterNode.textContent = `${moviesToRender.length} Titans Logged`;
    }

    // Dynamic Starfield Generators
    function createStars(targetContainer, count, sizeRange, durationRange) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'absolute rounded-full bg-white pointer-events-none';
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.opacity = Math.random() * 0.4 + 0.1;
        star.style.animation = `float ${durationRange[0] + Math.random() * (durationRange[1] - durationRange[0])}s infinite ease-in-out alternate`;
        star.style.animationDelay = `${Math.random() * 4}s`;
        targetContainer.appendChild(star);
      }
    }

    const starsContainer = document.querySelector('.stars');
    const starsContainer2 = document.querySelector('.stars2');
    if (starsContainer) createStars(starsContainer, 40, [1, 2], [6, 12]);
    if (starsContainer2) createStars(starsContainer2, 20, [2, 3], [10, 18]);

    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes float {
        0% { transform: translateY(0px) translateX(0px); }
        100% { transform: translateY(-15px) translateX(8px); }
      }
    `;
    document.head.appendChild(style);

    // Initial deployment execution call
    renderMovies(movies);
</script>
