  <!-- hls.js for HLS playback -->

  <style>
    /* Custom scrollbar matching luxurious gold/gunmetal */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #070a0f; }
    ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #aa8c2c; }

    /* Custom animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .delay-1 { animation-delay: 0.05s; } .delay-2 { animation-delay: 0.1s; } .delay-3 { animation-delay: 0.15s; }

    /* Custom tactical gun-barrel glow effect */
    .glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

    /* Aspect ratio for movie cards */
    .movie-card { aspect-ratio: 2/3; }

    @supports not (aspect-ratio: 2/3) {
      .movie-card::before { content: ""; display: block; padding-top: 150%; }
    }

    /* Cinematic modal/player styles */
    .modal-overlay { position: fixed; inset: 0; display:flex; align-items:center; justify-content:center; background: rgba(3, 4, 6, 0.95); z-index: 9999; opacity:0; visibility:hidden; transition: all .25s ease; }
    .modal-overlay.active { opacity:1; visibility:visible; }
    .modal-card { width:95%; max-width:980px; border-radius:12px; overflow:hidden; background: linear-gradient(180deg,#0d0f14,#07080b); border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 30px 80px rgba(0,0,0,0.9); }
    .player-area { position: relative; padding-bottom: 56.25%; height:0; background:#000; }
    .player-area video, .player-area iframe { position:absolute; inset:0; width:100%; height:100%; background:#000; }
    .progress-bar { height:4px; background: rgba(255,255,255,0.06); position: relative; width:100%; }
    .progress-fill { position:absolute; left:0; top:0; bottom:0; width:0%; background:#d4af37; transition: width .2s linear; }
    .controls { display:flex; gap:8px; align-items:center; }
    .btn { background: #161a22; color:#fff; padding:8px 14px; border-radius:8px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s ease; }
    .btn:hover { background: #222936; border-color: rgba(212, 175, 55, 0.3); }
    .btn.primary { background:#d4af37; color:#070a0f; border-color:#d4af37; font-weight: 600; }
    .btn.primary:hover { background:#f3cf55; }
    @media (max-width:640px){ .modal-card { width:98%; } }

    /* === SMART FULLSCREEN VIDEO FIX (NO CROPPING, NO GAPS WHEN POSSIBLE) === */
    video:fullscreen,
    video:-webkit-full-screen,
    iframe:fullscreen,
    iframe:-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
      object-fit: contain !important;
      background-color: black;
    }

    /* Only cover when video aspect is cinematic */
    @media (min-aspect-ratio: 16/9) {
      video:fullscreen,
      video:-webkit-full-screen,
      iframe:fullscreen,
      iframe:-webkit-full-screen {
        object-fit: cover !important;
      }
    }
  </style>
</head>

      },
      { 
        title: "No Time to Die", 
        video: "https://mega.nz/embed/BN1BAbLA#4n3J8vM2FJtuhav1d558eATU0lGeglZTLD-mbV6SoDk", 
        image: "https://preview.redd.it/4a8rd5658g161.jpg?width=640&crop=smart&auto=webp&s=8c16f3cd4b0a985f791de5507f7d2b1c411eda02",
        year: 2021,
        actor: "Daniel Craig",
        rating: "7.3",
        duration: "163m",
        description: "Bond's emotionally charged final chapter. Pulled from retirement, he must face Lyutsifer Safin, a biological terrorist threatening global extinction."
      }
    ];

    /* DOM references */
    const container = document.getElementById('movies');
    const searchInput = document.getElementById('search');
    const loadingSpinner = document.getElementById('loading');
    const totalMoviesEl = document.getElementById('total-movies');

    /* Modal/player refs */
    const playbackModal = document.getElementById('playback-modal');
    const closeModalBtn = document.getElementById('close-modal');
    const playerArea = document.getElementById('player-area');
    const modalTitle = document.getElementById('modal-title');
    const modalSub = document.getElementById('modal-sub');
    const modalDesc = document.getElementById('modal-desc');
    const modalMetaStats = document.getElementById('modal-meta-stats');
    const progressFill = document.getElementById('progress-fill');
    const modalPlayBtn = document.getElementById('modal-play');
    const playText = document.getElementById('playText');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const muteBtn = document.getElementById('muteBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    /* Playback state */
    let currentList = [];
    let currentIndex = null;
    let currentHls = null;

    /* Type detection helpers */
    function isHls(u){
      if(!u) return false;
      return u.includes('.m3u8') || u.includes('index-') || /index.*\.txt/i.test(u) || u.toLowerCase().includes('master.m3u8') || u.includes('manifest');
    }
    function isMP4(u){ return /\.mp4($|\?)/i.test(u||''); }
    function isYouTube(u){ return !!(u && (u.includes('youtube.com') || u.includes('youtu.be') || u.includes('youtube-nocookie.com') || u.includes('/embed/'))); }

    /* Player container helpers */
    function resetPlayerContainer(){
      if(currentHls){ try{ currentHls.destroy(); }catch(e){} currentHls = null; }
      playerArea.innerHTML = `<video id="modal-video" controls playsinline preload="metadata"></video>`;
    }
    function getModalVideo(){ return document.getElementById('modal-video'); }

    /* Attach listeners to video */
    function attachVideoListeners(){
      const v = getModalVideo();
      if(!v) return;
      if(v.dataset.listenersAttached) return;
      v.dataset.listenersAttached = '1';

      v.addEventListener('timeupdate', () => {
        if(!v.duration || !isFinite(v.duration)) return;
        const pct = (v.currentTime / v.duration) * 100;
        progressFill.style.width = pct + '%';
      });
      v.addEventListener('play', () => { modalPlayBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span id="playText">PAUSE</span>'; });
      v.addEventListener('pause', () => { modalPlayBtn.innerHTML = '<i class="fas fa-play mr-2"></i><span id="playText">PLAY</span>'; });
      v.addEventListener('ended', () => { modalPlayBtn.innerHTML = '<i class="fas fa-redo mr-2"></i><span id="playText">REPLAY</span>'; });
    }

    /* Show/hide modal */
    function showModal(){ playbackModal.classList.add('active'); document.body.style.overflow='hidden'; }
    function hideModal(){ playbackModal.classList.remove('active'); document.body.style.overflow=''; }

    /* Close & cleanup */
    function closeAndCleanup(){
      if(currentHls){ try{ currentHls.destroy(); }catch(e){} currentHls = null; }
      const v = getModalVideo();
      if(v){
        try{ v.pause(); }catch(e){}
        try{ v.removeAttribute('src'); v.load(); }catch(e){}
      }
      resetPlayerContainer();
      progressFill.style.width = '0%';
      currentIndex = null;
      hideModal();
      modalPlayBtn.innerHTML = '<i class="fas fa-play mr-2"></i><span id="playText">PLAY</span>';
    }

    /* Core playback function */
    function playInModalByIndex(list, index){
      if(!list || typeof index !== 'number' || index < 0 || index >= list.length) return;
      const movie = list[index];
      currentIndex = index;
      
      modalTitle.textContent = movie.title || 'Untitled';
      modalSub.textContent = `${movie.year || 'Unknown'} • Actor: ${movie.actor || '007'}`;
      modalDesc.textContent = movie.description || '';
      
      // Load tactical stats into meta footer
      modalMetaStats.innerHTML = `
        <span><i class="fas fa-star text-[#d4af37] mr-1"></i> ${movie.rating || '—'}/10</span>
        <span><i class="fas fa-clock text-gray-500 mr-1"></i> ${movie.duration || '—'}</span>
        <span class="text-xs uppercase text-[#d4af37] tracking-wider"><i class="fas fa-shield-halved mr-1"></i> Active Mission</span>
      `;

      progressFill.style.width = '0%';
      resetPlayerContainer();
      const url = movie.video;
      
      if(!url){
        showModal();
        modalDesc.textContent = 'Mission video broadcast link currently offline.';
        return;
      }

      // iframe-hosts that work better embedded
      const iframeHosts = ['streamtape.com','openload.co','vidcdn.','dood.', 'sbembed', 'drive.google.com','mega.nz','streamlare','mixdrop','rapidvideo'];
      if(iframeHosts.some(h => url.includes(h))){
        playerArea.innerHTML = `<iframe src="${url}" width="100%" height="100%" allowfullscreen allow="autoplay; encrypted-media" frameborder="0"></iframe>`;
        showModal(); updateNavButtons(); return;
      }

      // YouTube embed
      if(isYouTube(url)){
        try{
          let embedUrl = url;
          if(url.includes('watch') && url.includes('v=')){
            const vid = new URLSearchParams(url.split('?')[1]).get('v');
            if(vid) embedUrl = `https://www.youtube.com/embed/${vid}`;
          } else if(url.includes('youtu.be/')){
            const vid = url.split('youtu.be/')[1].split(/[?&]/)[0];
            embedUrl = `https://www.youtube.com/embed/${vid}`;
          }
          playerArea.innerHTML = `<iframe src="${embedUrl}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" allowfullscreen allow="autoplay; encrypted-media" frameborder="0"></iframe>`;
          showModal(); updateNavButtons(); return;
        }catch(e){}
      }

      // Expected native <video> operations
      const v = getModalVideo();

      // HLS handling
      if(isHls(url)){
        if(window.Hls && Hls.isSupported()){
          try{
            currentHls = new Hls();
            currentHls.loadSource(url);
            currentHls.attachMedia(v);
            currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
              showModal(); attachVideoListeners(); v.play().catch(()=>{});
            });
            currentHls.on(Hls.Events.ERROR, (event, data) => {
              if(data && data.fatal){
                try{ currentHls.destroy(); }catch(e){} currentHls = null;
                v.src = url; showModal(); attachVideoListeners(); v.play().catch(()=>{});
              }
            });
          }catch(e){
            v.src = url; showModal(); attachVideoListeners(); v.play().catch(()=>{});
          }
        } else {
          v.src = url; showModal(); attachVideoListeners(); v.play().catch(()=>{});
        }
        updateNavButtons();
        return;
      }

      // MP4 fallback
      if(isMP4(url)){
        v.src = url; showModal(); attachVideoListeners(); v.play().catch(()=>{});
        updateNavButtons();
        return;
      }

      // Unknown fallback
      window.location.href = `player.html?title=${encodeURIComponent(movie.title)}&video=${encodeURIComponent(url)}`;
    }

    /* Play/pause control */
    modalPlayBtn.addEventListener('click', () => {
      if(playerArea.querySelector('iframe')) return;
      const v = getModalVideo();
      if(!v) return;
      if(v.paused) v.play().catch(()=>{});
      else v.pause();
    });

    /* Navigation button alignment state triggers */
    function updateNavButtons(){
      prevBtn.disabled = (currentIndex === null || currentIndex <= 0);
      nextBtn.disabled = (currentIndex === null || currentIndex >= (currentList.length - 1));
      
      // Visual feedback for disabled buttons
      prevBtn.style.opacity = prevBtn.disabled ? "0.3" : "1";
      nextBtn.style.opacity = nextBtn.disabled ? "0.3" : "1";
    }
    prevBtn.addEventListener('click', () => { if(currentIndex > 0) playInModalByIndex(currentList, currentIndex - 1); });
    nextBtn.addEventListener('click', () => { if(currentIndex < currentList.length - 1) playInModalByIndex(currentList, currentIndex + 1); });

    /* Control options */
    muteBtn.addEventListener('click', () => {
      const v = getModalVideo();
      if(!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    });
    fullscreenBtn.addEventListener('click', () => {
      const elem = playerArea.querySelector('video') || playerArea.querySelector('iframe');
      if(!elem) return;
      if(!document.fullscreenElement) elem.requestFullscreen().catch(()=>{});
      else document.exitFullscreen().catch(()=>{});
    });

    /* Keyboard binds */
    closeModalBtn.addEventListener('click', closeAndCleanup);
    playbackModal.addEventListener('click', (e) => { if(e.target === playbackModal) closeAndCleanup(); });
    document.addEventListener('keydown', (e) => {
      if(!playbackModal.classList.contains('active')) return;
      if(e.key === 'Escape') closeAndCleanup();
      if(e.key === ' '){ e.preventDefault(); const v = getModalVideo(); if(v) v.paused ? v.play() : v.pause(); }
      if(e.key === 'ArrowRight'){ const v = getModalVideo(); if(v) v.currentTime += 10; }
      if(e.key === 'ArrowLeft'){ const v = getModalVideo(); if(v) v.currentTime -= 10; }
      if(e.key.toLowerCase() === 'n') nextBtn.click();
      if(e.key.toLowerCase() === 'p') prevBtn.click();
    });

    /* Rendering Grid logic with refined, gorgeous cards */
    function renderMovies(list){
      container.innerHTML = '';
      if(!list || list.length === 0){
        container.innerHTML = `
          <div class="col-span-full text-center py-16">
            <i class="fas fa-user-secret text-5xl text-[#d4af37]/30 mb-4"></i>
            <h3 class="text-xl font-bold text-white">No Missions Found</h3>
            <p class="text-gray-500 mt-2 text-sm">Review your filter keywords and attempt another search query.</p>
          </div>`;
        totalMoviesEl.textContent = 0;
        return;
      }

      list.forEach((movie, index) => {
        const delayClass = `delay-${index % 3 + 1}`;
        const div = document.createElement('div');
        div.className = `fade-in ${delayClass} cursor-pointer`;
        div.innerHTML = `
          <div class="movie-card group relative overflow-hidden rounded-xl border border-[#d4af37]/15 bg-[#111622] shadow-lg transition-all duration-300 hover:scale-[1.03] hover:glow">
            <img src="${movie.image || ''}" alt="${movie.title || 'Untitled'}" class="absolute inset-0 h-full w-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy">
            
            <!-- Sleek Gradient Overlay -->
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-black/30 opacity-60 group-hover:opacity-90 transition-opacity duration-300"></div>
            
            <!-- Year Badge top right -->
            <span class="absolute top-3 right-3 text-[10px] bg-black/75 text-[#d4af37] border border-[#d4af37]/40 px-2 py-0.5 rounded font-mono font-bold">${movie.year}</span>

            <!-- Tactical Content Info -->
            <div class="absolute bottom-0 left-0 right-0 p-4 text-white">
              <p class="text-[10px] uppercase tracking-wider text-[#d4af37] font-semibold truncate mb-1">${movie.actor}</p>
              <h3 class="font-extrabold text-base md:text-lg tracking-wide truncate group-hover:text-[#d4af37] transition-colors">${movie.title}</h3>
              
              <div class="flex justify-between items-center mt-3 pt-2 border-t border-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                <span class="text-[10px] bg-[#d4af37] text-[#070a0f] font-extrabold px-2 py-0.5 rounded tracking-widest">007</span>
                <button class="play-button bg-[#d4af37] hover:bg-white text-[#070a0f] rounded-full w-8 h-8 flex items-center justify-center transition-all">
                  <i class="fas fa-play text-xs"></i>
                </button>
              </div>
            </div>
          </div>
        `;

        // Action handles for desktop/mobile consistency
        div.querySelector('.play-button').addEventListener('click', (e) => {
          e.stopPropagation();
          currentList = list.slice();
          playInModalByIndex(currentList, index);
        });
        div.addEventListener('click', () => {
          currentList = list.slice();
          playInModalByIndex(currentList, index);
        });

        container.appendChild(div);
      });

      totalMoviesEl.textContent = list.length;
    }

    /* Search filtering against titles, actors and descriptions */
    searchInput.addEventListener('input', (e) => {
      const q = (e.target.value || '').trim().toLowerCase();
      const filtered = movies.filter(m => 
        (m.title || '').toLowerCase().includes(q) || 
        (m.actor || '').toLowerCase().includes(q) || 
        (m.description || '').toLowerCase().includes(q)
      );
      renderMovies(filtered);
    });

    /* Initialization */
    document.addEventListener('DOMContentLoaded', () => {
      loadingSpinner.classList.remove('hidden');
      setTimeout(() => {
        loadingSpinner.classList.add('hidden');
        renderMovies(movies);
      }, 250);
    });

    /* Expose helpers */
    window.playInModalByIndex = playInModalByIndex;
    window.closeAndCleanup = closeAndCleanup;
    window.resetPlayerContainer = resetPlayerContainer;
  </script>

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>
