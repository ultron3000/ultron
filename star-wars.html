<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Star Wars Galaxy Archive</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

:root {
  --primary: #ffe81f;
  --secondary: #050816;
  --accent: #00e5ff;
  --danger: #ff3c78;
  --muted: #94a3b8;

  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.12);

  --glow-yellow: 0 0 12px rgba(255,232,31,.8);
  --glow-blue: 0 0 15px rgba(0,229,255,.7);
}

*{
  box-sizing:border-box;
}

body {
  font-family: 'Rajdhani', sans-serif;
  background:
    radial-gradient(circle at top, rgba(0,229,255,.12), transparent 25%),
    radial-gradient(circle at bottom, rgba(255,232,31,.08), transparent 25%),
    linear-gradient(180deg, #020617 0%, #000000 100%);
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  margin:0;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.15;
  pointer-events: none;
  z-index: -1;
}

/* Stars */

.stars,
.stars2 {
  position:absolute;
  inset:0;
}

/* Header */

.hero {
  position: relative;
  width: 100%;
  height: 500px;
  overflow: hidden;
  border-radius: 24px;
  margin-bottom: 50px;

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    0 0 40px rgba(0,0,0,.7),
    0 0 100px rgba(0,229,255,.08);
}

.hero iframe {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top, rgba(0,0,0,.9), transparent 40%),
    linear-gradient(to bottom, rgba(0,0,0,.4), transparent 20%);
}

.animate-logo {
  position:absolute;
  top:25px;
  left:25px;
  height:110px;
  z-index:20;

  animation:
    floatLogo 5s ease-in-out infinite,
    logoGlow 2s infinite alternate;

  filter:
    drop-shadow(0 0 10px rgba(255,232,31,.8))
    drop-shadow(0 0 30px rgba(255,232,31,.4));
}

@keyframes floatLogo {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

@keyframes logoGlow {
  from {
    filter:
      drop-shadow(0 0 10px rgba(255,232,31,.6))
      drop-shadow(0 0 20px rgba(255,232,31,.2));
  }

  to {
    filter:
      drop-shadow(0 0 18px rgba(255,232,31,1))
      drop-shadow(0 0 45px rgba(255,232,31,.6));
  }
}

/* Top line */

.container::before {
  content: "";
  display: block;
  width: 100%;
  height: 3px;

  background:
    linear-gradient(
      90deg,
      transparent,
      #00e5ff,
      #ffe81f,
      #ff3c78,
      transparent
    );

  margin-bottom: 20px;

  animation: saberMove 6s linear infinite;
}

@keyframes saberMove {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* Titles */

.star-title {
  font-family: 'Orbitron', sans-serif;
  color: var(--primary);

  text-shadow:
    0 0 8px rgba(255,232,31,.9),
    0 0 18px rgba(255,232,31,.6);
}

/* Movie Grid */

.movie-card {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  background: rgba(10,15,30,.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.08);

  transition:
    transform .45s ease,
    box-shadow .45s ease,
    border .45s ease;

  box-shadow:
    0 10px 35px rgba(0,0,0,.5);

  cursor:pointer;
}

.movie-card:hover {
  transform: translateY(-10px) scale(1.04);

  border-color: rgba(255,232,31,.5);

  box-shadow:
    0 0 25px rgba(255,232,31,.2),
    0 0 60px rgba(0,229,255,.12),
    0 30px 60px rgba(0,0,0,.7);
}

.movie-card::before {
  content: "";
  position: absolute;
  inset: -120%;
  background: linear-gradient(
    120deg,
    transparent 20%,
    rgba(255,255,255,.08),
    transparent 80%
  );

  transform: rotate(25deg);
  transition: .8s;
}

.movie-card:hover::before {
  inset: 120%;
}

.movie-poster {
  aspect-ratio: 2/3;
  width:100%;
  object-fit:cover;
  transition: all .5s ease;
}

.movie-card:hover .movie-poster {
  transform: scale(1.12);
  filter:
    brightness(1.1)
    contrast(1.08)
    saturate(1.15);
}

/* Watch Button */

.watch-btn {
  background: linear-gradient(
    90deg,
    #ffe81f,
    #ffd000
  );

  color: black;
  font-weight: 700;

  border-radius: 999px;
  padding: 10px 18px;

  transition: all .3s ease;

  box-shadow:
    0 0 18px rgba(255,232,31,.4);

  border:none;
}

.watch-btn:hover {
  transform: scale(1.08);

  box-shadow:
    0 0 30px rgba(255,232,31,.9);
}

/* Modal */

.modal-backdrop {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}

.modal-backdrop.active{
  display:flex;
}

.modal-card {
  width:95%;
  max-width:1200px;

  background:
    linear-gradient(
      180deg,
      rgba(10,15,30,.98),
      rgba(2,6,23,.98)
    );

  border: 1px solid rgba(255,255,255,.08);

  backdrop-filter: blur(20px);

  box-shadow:
    0 0 50px rgba(0,0,0,.8),
    0 0 80px rgba(0,229,255,.08);

  overflow: hidden;

  border-radius:20px;
}

.player-wrapper {
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:black;

  border-bottom: 1px solid rgba(0,229,255,.2);

  box-shadow:
    inset 0 0 50px rgba(0,229,255,.05);
}

.player-wrapper video,
.player-wrapper iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.player-meta{
  padding:20px;
  display:flex;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}

.player-meta h3{
  font-family:'Orbitron',sans-serif;
  color:var(--primary);
  margin:0;
  font-size:1.3rem;
}

.player-meta p{
  color:var(--muted);
  margin-top:8px;
  line-height:1.5;
}

.controls-row{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
}

.btn {
  background: rgba(255,255,255,.04);

  border: 1px solid rgba(255,232,31,.25);

  color: var(--primary);

  backdrop-filter: blur(10px);

  transition: .3s ease;

  font-weight: 600;
  letter-spacing: .5px;

  padding:10px 16px;
  border-radius:12px;
  cursor:pointer;
}

.btn:hover {
  background: rgba(255,232,31,.1);

  border-color: rgba(255,232,31,.6);

  transform: translateY(-2px);

  box-shadow:
    0 0 20px rgba(255,232,31,.25);
}

/* Close */

#topCloseBtn{
  position:absolute;
  top:12px;
  right:12px;
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  background:rgba(0,0,0,.7);
  color:white;
  z-index:10;
  cursor:pointer;
}

/* Crawl */

.crawl-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  perspective: 400px;
  overflow: hidden;
  z-index: 1;
}

.crawl {
  position: absolute;
  width: 80%;
  left: 10%;
  bottom: -100%;

  color: #ffe81f;

  font-family: 'Orbitron', sans-serif;

  text-align: center;

  transform-origin: 50% 100%;
  transform: rotateX(25deg);

  animation: crawl 25s linear infinite;
}

.crawl h1{
  font-size:3rem;
  margin-bottom:20px;
}

.crawl p{
  font-size:1.5rem;
  line-height:1.8;
}

@keyframes crawl {
  0% {
    bottom: -100%;
    opacity: 1;
  }

  100% {
    bottom: 140%;
    opacity: 0;
  }
}

/* Footer */

.footer-links a{
  color:#9ca3af;
  margin:0 10px;
  font-size:1.2rem;
  transition:.3s;
}

.footer-links a:hover{
  color:var(--primary);
  text-shadow:var(--glow-yellow);
}

/* Responsive */

@media(max-width:768px){

  .hero{
    height:300px;
  }

  .animate-logo{
    height:70px;
  }

  .crawl h1{
    font-size:2rem;
  }

  .crawl p{
    font-size:1rem;
  }

  .player-meta{
    flex-direction:column;
  }

  .controls-row{
    justify-content:center;
  }

}
</style>
</head>

        </button>

        <button id="muteBtn" class="btn">
          <i class="fas fa-volume-up"></i>
        </button>

      </div>

    </div>

  </div>

</div>

<script>

/******************************
 * MOVIES
 ******************************/

const movies = [

      {

        video: "https://storrrrrrm.site/stream/aa416bc0a310715b/520p.m3u8", 
        image: "https://image.tmdb.org/t/p/w342/5Vi8dSauVwH1HOsiZceDMbRr1Ca.jpg",
        year: 2026,
        duration: "128 min",
        rating: 4.6,

];

/******************************
 * DOM
 ******************************/

const playbackModal = document.getElementById('playbackModal');
const playerWrapper = document.getElementById('playerWrapper');

const modalTitle = document.getElementById('modalTitle');
const modalDesc = document.getElementById('modalDesc');

const playPauseBtn = document.getElementById('playPauseBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const muteBtn = document.getElementById('muteBtn');

const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');

const modalVideoId = 'modalVideo';

let currentHls = null;
let currentFiltered = [];
let currentIndex = null;

/******************************
 * HELPERS
 ******************************/

function isHls(url){
  return url.includes('.m3u8')
    || url.includes('index-')
    || url.includes('.txt');
}

function resetPlayerContainer(){

  if(currentHls){
    currentHls.destroy();
    currentHls = null;
  }

  playerWrapper.innerHTML = `
    <video
      id="${modalVideoId}"
      controls
      playsinline
      style="width:100%;height:100%;background:#000">
    </video>

    <button id="topCloseBtn">
      <i class="fas fa-times"></i>
    </button>
  `;

  document.getElementById('topCloseBtn')
    .addEventListener('click', closeModalHandler);
}

/******************************
 * OPEN PLAYER
 ******************************/

function openPlayer(list,index){

  currentFiltered = list;
  currentIndex = index;

  const movie = list[index];

  modalTitle.textContent = movie.title;
  modalDesc.textContent = movie.description;

  resetPlayerContainer();

  playbackModal.classList.add('active');

  const src = movie.video;

  const v = document.getElementById(modalVideoId);

  if(window.Hls && Hls.isSupported()){

    currentHls = new Hls();

    currentHls.loadSource(src);
    currentHls.attachMedia(v);

    currentHls.on(Hls.Events.MANIFEST_PARSED,function(){
      v.play();
    });

  } else {

    v.src = src;
    v.play();

  }

}

/******************************
 * CONTROLS
 ******************************/

function togglePlayPause(){

  const v = document.getElementById(modalVideoId);

  if(v.paused){
    v.play();
    playPauseBtn.innerHTML = `<i class="fas fa-pause"></i>`;
  } else {
    v.pause();
    playPauseBtn.innerHTML = `<i class="fas fa-play"></i>`;
  }

}

function toggleMute(){

  const v = document.getElementById(modalVideoId);

  v.muted = !v.muted;

  muteBtn.innerHTML = v.muted
    ? `<i class="fas fa-volume-mute"></i>`
    : `<i class="fas fa-volume-up"></i>`;

}

function toggleFullscreen(){

  const el = document.getElementById(modalVideoId);

  if(!document.fullscreenElement){
    el.requestFullscreen();
  } else {
    document.exitFullscreen();
  }

}

function playNext(){

  if(currentIndex < currentFiltered.length - 1){
    openPlayer(currentFiltered,currentIndex + 1);
  }

}

function playPrev(){

  if(currentIndex > 0){
    openPlayer(currentFiltered,currentIndex - 1);
  }

}

function closeModalHandler(){

  if(currentHls){
    currentHls.destroy();
    currentHls = null;
  }

  playbackModal.classList.remove('active');

}

/******************************
 * EVENTS
 ******************************/

playPauseBtn.addEventListener('click',togglePlayPause);
muteBtn.addEventListener('click',toggleMute);
fullscreenBtn.addEventListener('click',toggleFullscreen);

nextBtn.addEventListener('click',playNext);
prevBtn.addEventListener('click',playPrev);

playbackModal.addEventListener('click',(e)=>{
  if(e.target === playbackModal){
    closeModalHandler();
  }
});

/******************************
 * RENDER MOVIES
 ******************************/

const container = document.getElementById('movies');

function renderMovies(data){

  container.innerHTML = '';

  data.forEach((movie,index)=>{

    const div = document.createElement('div');

    div.className = 'movie-card';

    div.innerHTML = `

      <div class="relative overflow-hidden">

        <img
          src="${movie.image}"
          alt="${movie.title}"
          class="movie-poster"
        >

        <div class="absolute inset-0 bg-gradient-to-t from-black/90 to-transparent opacity-0 hover:opacity-100 transition duration-300 flex items-end p-4">

          <button class="watch-btn">
            <i class="fas fa-play mr-2"></i>
            Watch
          </button>

        </div>

      </div>

      <div class="p-4">

        <h3 class="star-title text-lg truncate tracking-wide">
          ${movie.title}
        </h3>

        <div class="flex justify-between mt-2 text-gray-400 text-sm">
          <span>${movie.year}</span>
          <span>${movie.duration}</span>
        </div>

      </div>

function createStars(container,count,sizeRange,durationRange){

    star.className = 'absolute rounded-full bg-white';

    const left = Math.random()*100;
    const top = Math.random()*100;

    const size = sizeRange[0]
      + Math.random()*(sizeRange[1]-sizeRange[0]);

    const duration = durationRange[0]
      + Math.random()*(durationRange[1]-durationRange[0]);

    star.style.left = `${left}%`;
    star.style.top = `${top}%`;

    star.style.width = `${size}px`;
    star.style.height = `${size}px`;

    star.style.opacity = Math.random()*0.5 + 0.1;

    star.style.animation =
      `float ${duration}s infinite ease-in-out alternate`;

    container.appendChild(star);

  }

}

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>
