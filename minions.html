   :root{
    --primary:#FFD400;          /* Minion Yellow */
    --secondary:#165AA7;        /* Denim Blue */
    --accent:#FFE566;           /* Banana Yellow */
    --dark:#103A71;
    --white:#ffffff;
}
    
  body {
  font-family:'Poppins',sans-serif;
  background:
      radial-gradient(circle at top,#fffbe8 0%,#ffe86c 40%,#ffd400 100%);
  color:#103A71;
  min-height:100vh;
  margin:0;
  padding:0;
  overflow-x:hidden;
}
    
    .super-heading {
      font-family: 'Montserrat', sans-serif;
      letter-spacing: -0.02em;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Holographic Movie Cards */
   .movie-card{

position:relative;

overflow:hidden;

transition:.35s ease;

background:rgba(255,255,255,.28);

backdrop-filter:blur(14px);

-webkit-backdrop-filter:blur(14px);

border:2px solid rgba(255,255,255,.55);

border-radius:22px;

box-shadow:

0 10px 30px rgba(0,0,0,.15);

}
    
   .movie-card:hover{

transform:translateY(-8px) scale(1.03);

border-color:#165AA7;

box-shadow:

0 18px 35px rgba(0,0,0,.22),

0 0 25px rgba(22,90,167,.3);

}
    
    .holo-glow-text {
      text-shadow: 0 0 12px rgba(0, 240, 255, 0.6), 0 0 25px rgba(255, 30, 39, 0.4);
    }
    
   .movie-poster{

aspect-ratio:2/3;

transition:.4s;

border-radius:18px;

}
    
    .movie-card:hover .movie-poster {
      transform: scale(1.04);
    }
    
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #050814;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
    }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    
    /* Fixed & Upgraded Mobile Responsive Holographic Modal */
    .modal-backdrop { 
      position: fixed; 
      inset: 0; 
      background: rgba(2, 4, 10, 0.92); 
      display: none; 
      align-items: center; 
      justify-content: center; 
      z-index: 9999; 
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 12px;
    }
    .modal-backdrop.active { display: flex; }
    
    .modal-card { 
      width: 100%;
      max-width: 960px;
      background: rgba(10, 16, 30, 0.85);
      border: 1px solid rgba(0, 240, 255, 0.25);
      box-shadow: 0 0 50px rgba(0, 240, 255, 0.15), inset 0 0 20px rgba(255, 30, 39, 0.1);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 96vh;
    }
    
    .player-wrapper { 
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #topCloseBtn { 
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 50;
      background: rgba(5, 8, 20, 0.8);
      color: var(--primary);
      border: 1px solid rgba(255, 30, 39, 0.4);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }
    #topCloseBtn:hover {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 0 15px var(--primary);
    }

    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      background: linear-gradient(to bottom, rgba(13, 21, 39, 0.95), rgba(5, 8, 20, 0.95));
      border-top: 1px solid rgba(0, 240, 255, 0.15);
      overflow-y: auto;
    }

    .player-meta h3 { 
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.15rem;
      color: #ffffff;
      font-weight: 800;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }
    .player-meta p { 
      margin: 4px 0 0 0;
      color: #9cb0d4;
      font-size: 0.8rem;
      line-height: 1.4;
    }

    /* Fixed Perfectly Proportioned Horizontal Grid Controls for Mobile */
    .controls-row { 
      display: grid;
      grid-template-cols: repeat(3, 1fr);
      gap: 6px;
      width: 100%;
    }

    .btn {
      background: rgba(5, 8, 20, 0.6);
      border: 1px solid rgba(0, 240, 255, 0.3);
      color: var(--accent);
      padding: 8px 4px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s ease;
    }
    
    .btn i {
      font-size: 0.8rem;
    }

    .btn{

background:#165AA7;

border:none;

color:white;

padding:8px 10px;

border-radius:12px;

cursor:pointer;

font-size:.72rem;

font-weight:700;

display:flex;

align-items:center;

justify-content:center;

gap:5px;

transition:.25s;

box-shadow:

0 4px 12px rgba(0,0,0,.25);

}

    /* Responsive Grid Adjustments */
    @media (min-width: 640px) {
      .controls-row {
        grid-template-cols: repeat(6, 1fr);
      }
      .btn {
        padding: 10px 12px;
        font-size: 0.8rem;
        gap: 6px;
      }
      .player-meta h3 { 
        font-size: 1.25rem;
      }
      .player-meta p { 
        font-size: 0.875rem;
      }
    }

    @media (min-width: 850px) {
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
      }
      .player-meta .meta-left {
        max-width: 45%;
      }
      .controls-row {
        display: flex;
        flex-wrap: nowrap;
        justify-content: flex-end;
        width: auto;
        gap: 8px;
      }
      .btn {
        flex: unset;
        min-width: 85px;
        padding: 10px 14px;
      }
    }

    @keyframes NodeFloat {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.1; }
      50% { transform: translateY(-40px) translateX(20px) scale(1.4); opacity: 0.3; }
      100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.1; }
    }
    .network-node {
      position: absolute;
      background: radial-gradient(circle at top,#102a58 0%,#08142b 60%,#03060f 100%);
      border-radius: 50%;
      pointer-events: none;
    }
</style>

        description: "The Minions learn to ride bikes with hilarious results."

    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" aria-label="Dismiss Player"><i class="fas fa-times"></i></button>`;
      document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) return;
      
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];
      if (!movie) return;

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || '';

      resetPlayerContainer();
      showModal();

      let src = '';
      if (typeof movie.video === 'object' && movie.video !== null) {
        src = movie.video.high || movie.video.medium || movie.video.low || Object.values(movie.video)[0];
      } else {
        src = movie.video;
      }
      if (!src || src === 'cc') {
        setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=`, 500);
        return;
      }

      const lc = src.toLowerCase();

      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('mega.nz') || lc.includes('openload') || lc.includes('drive.google.com')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        <button id="topCloseBtn" aria-label="Dismiss Player"><i class="fas fa-times"></i></button>`;
        document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isYouTube(src)) {
        let embed = src;
        try {
          if (src.includes('watch') && src.includes('v=')) {
            const v = new URLSearchParams(src.split('?')[1]).get('v');
            if (v) embed = `https://www.youtube.com/embed/${v}`;
          } else if (src.includes('youtu.be/')) {
            const p = src.split('youtu.be/')[1].split(/[?&]/)[0];
            if (p) embed = `https://www.youtube.com/embed/${p}`;
          }
        } catch (e) {}
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        <button id="topCloseBtn" aria-label="Dismiss Player"><i class="fas fa-times"></i></button>`;
        document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) return;
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(src);
          currentHls.attachMedia(v);
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
          });
          currentHls.on(Hls.Events.ERROR, function(event, data) {
            if (data && data.fatal) {
              try { currentHls.destroy(); } catch(e){}
              currentHls = null;
              setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 700);
            }
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        } else {
          setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 700);
        }
        return;
      }

      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) { window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`; return; }
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`;
    }

    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
      }
    }
    function playNext() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return;
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
    }
    function playPrev() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return;
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
    }
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=>{});
      } else {
        document.exitFullscreen();
      }
    }
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i><span>Unmute</span>' : '<i class="fas fa-volume-up"></i><span>Mute</span>';
    }

    function closeModalHandler() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      const v = document.getElementById(modalVideoId);
      if (v) {
        try { v.pause(); } catch(e){}
        try { v.removeAttribute('src'); v.load(); } catch(e){}
      }
      resetPlayerContainer();
      hideModal();
      currentIndex = null;
      currentFiltered = [];
      playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);

    playbackModal.addEventListener('click', function(e){
      if (e.target === playbackModal) closeModalHandler();
    });

    document.addEventListener('keydown', (e) => {
      if (!playbackModal.classList.contains('active')) return;
      switch (e.key.toLowerCase()) {
        case 'escape': closeModalHandler(); break;
        case ' ': e.preventDefault(); togglePlayPause(); break;
        case 'arrowright': { const v = document.getElementById(modalVideoId); if (v) v.currentTime = Math.min(v.duration, v.currentTime + 10); break; }
        case 'arrowleft': { const v = document.getElementById(modalVideoId); if (v) v.currentTime = Math.max(0, v.currentTime - 10); break; }
        case 'f': toggleFullscreen(); break;
        case 'm': toggleMute(); break;
      }
    });

    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 5) * 100}`;

        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-xl overflow-hidden cursor-pointer relative group`;
        div.innerHTML = `
          <div class="relative overflow-hidden aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-[#050814] via-[#050814]/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end justify-center p-3">
              <button class="bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-2 px-4 rounded-full transition transform hover:scale-105 shadow-lg flex items-center gap-2 text-xs uppercase tracking-wider">
                <i class="fas fa-play"></i> Play
              </button>
            </div>
          </div>
          <div class="p-3 bg-gradient-to-b from-transparent to-black/40">
            <h3 class="font-bold text-slate-200 group-hover:text-cyan-400 transition-colors text-xs sm:text-sm truncate spider-heading">${movie.title}</h3>
            <div class="flex justify-between items-center mt-2 text-[10px] font-semibold">
              <span class="bg-cyan-950/40 text-cyan-400 px-2 py-0.5 rounded border border-cyan-800/30">${movie.year}</span>
              <span class="uppercase tracking-widest text-[9px] text-red-500"><i class="fas fa-mask mr-1"></i>Hero</span>
            </div>
          </div>
        `;

        div.addEventListener('click', () => {
          openPlayer(moviesToRender, index);
        });

        container.appendChild(div);
      });
    }

    renderMovies(movies);

    function createNodes() {
      const ambientContainer = document.getElementById('spidey-ambient');
      if (!ambientContainer) return;
      
      for (let i = 0; i < 20; i++) {
        const node = document.createElement('div');
        node.className = 'network-node';
        const size = Math.random() * 5 + 2;
        node.style.width = `${size}px`;
        node.style.height = `${size}px`;
        node.style.left = `${Math.random() * 100}%`;
        node.style.top = `${Math.random() * 100}%`;
        
        const duration = Math.random() * 8 + 6;
        node.style.animation = `NodeFloat ${duration}s infinite ease-in-out alternate`;
        node.style.animationDelay = `${Math.random() * 3}s`;
        
        ambientContainer.appendChild(node);
      }
    }
    createNodes();
</script>

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>

<style>
html, body {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    overflow-x: hidden;
}

/* Disable image dragging */
img {
    pointer-events: none;
    -webkit-user-drag: none;
}

/* Hide selection */
::selection {
    background: transparent;
}
</style>
