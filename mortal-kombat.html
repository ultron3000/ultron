<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mortal Kombat</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Poppins:wght@300;400;500;600&display=swap');

:root{
    --mk-gold:#ffcc00;
    --mk-red:#b30000;
    --mk-dark:#050505;
    --mk-dark2:#111111;
    --mk-metal:#1b1b1b;
    --mk-glow:#ff8800;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    color:white;
    overflow-x:hidden;

    background:
    radial-gradient(circle at top,#4a0000 0%,#120000 25%,#050505 60%),
    linear-gradient(180deg,#000000,#0d0d0d);

    background-attachment:fixed;
}

/* DRAGON FIRE OVERLAY */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 50% 0%,rgba(255,80,0,.12),transparent 40%),
    radial-gradient(circle at 100% 100%,rgba(255,0,0,.08),transparent 40%);
    pointer-events:none;
    z-index:-1;
}

/* HEADER */

.header-glow{
    font-family:'Cinzel',serif;
    color:var(--mk-gold);
    text-shadow:
    0 0 10px #ff8800,
    0 0 20px #ff6600,
    0 0 40px #ff2200;
}

/* MOVIE CARDS */

.movie-card{
    background:
    linear-gradient(
    145deg,
    rgba(35,35,35,.95),
    rgba(10,10,10,.98)
    );

    border:1px solid rgba(255,204,0,.25);

    transition:.35s ease;

    box-shadow:
    0 0 15px rgba(255,0,0,.15),
    inset 0 0 20px rgba(255,204,0,.05);

    overflow:hidden;
    position:relative;
}

.movie-card::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(
    135deg,
    transparent,
    rgba(255,204,0,.08),
    transparent
    );

    opacity:0;
    transition:.4s;
}

.movie-card:hover::before{
    opacity:1;
}

.movie-card:hover{
    transform:
    translateY(-10px)
    scale(1.03);

    border-color:var(--mk-gold);

    box-shadow:
    0 0 30px rgba(255,150,0,.4),
    0 0 60px rgba(255,0,0,.25);
}

/* POSTERS */

.movie-poster{
    transition:.5s ease;
    border-bottom:2px solid rgba(255,204,0,.25);
}

.movie-card:hover .movie-poster{
    transform:scale(1.08);
}

/* TITLE */

.movie-card h3{
    font-family:'Cinzel',serif;
    color:#f8e6a0;
    letter-spacing:.5px;
}

/* WATCH BUTTON */

.movie-card button{
    background:
    linear-gradient(
    90deg,
    #ffcc00,
    #ff8800
    );

    color:black;
    font-weight:700;

    border:none;

    box-shadow:
    0 0 10px rgba(255,204,0,.5);
}

.movie-card button:hover{
    box-shadow:
    0 0 25px rgba(255,204,0,.9);
}

/* MODAL */

.modal-card{
    background:
    linear-gradient(
    180deg,
    #1a0d0d,
    #050505
    );

    border:2px solid rgba(255,204,0,.25);

    box-shadow:
    0 0 60px rgba(255,0,0,.4);
}

.player-meta{
    background:
    linear-gradient(
    180deg,
    #120707,
    #050505
    );
}

.player-meta h3{
    font-family:'Cinzel',serif;
    color:var(--mk-gold);

    text-shadow:
    0 0 10px rgba(255,180,0,.6);
}

/* CONTROL BUTTONS */

.btn{
    background:
    linear-gradient(
    180deg,
    #250000,
    #120000
    );

    border:1px solid var(--mk-gold);

    color:var(--mk-gold);

    font-weight:600;

    transition:.25s ease;
}

.btn:hover{
    background:
    linear-gradient(
    180deg,
    #500000,
    #250000
    );

    box-shadow:
    0 0 15px rgba(255,204,0,.4);
}

/* CLOSE BUTTON */

#topCloseBtn{
    background:rgba(120,0,0,.8);
    border:1px solid var(--mk-gold);
}

#topCloseBtn:hover{
    box-shadow:
    0 0 15px rgba(255,204,0,.7);
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:#080808;
}

::-webkit-scrollbar-thumb{
    background:
    linear-gradient(
    #ffcc00,
    #b30000
    );
    border-radius:20px;
}

/* EMBER PARTICLES */

.stars div,
.stars2 div{
    background:#ff6600 !important;

    box-shadow:
    0 0 6px #ff6600,
    0 0 12px #ff0000;
}

/* LOGO */

.animate-logo{
    animation:
    dragonFloat 4s ease-in-out infinite,
    dragonGlow 2s infinite alternate;
}

@keyframes dragonFloat{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

@keyframes dragonGlow{
    from{
        filter:
        drop-shadow(0 0 5px #ff8800)
        drop-shadow(0 0 10px #ff0000);
    }

    to{
        filter:
        drop-shadow(0 0 20px #ffcc00)
        drop-shadow(0 0 35px #ff3300);
    }
}

/* VIDEO HEADER */

iframe{
    filter:
    brightness(.55)
    contrast(1.25)
    saturate(1.2);
}

/* FOOTER */

footer,
.border-t{
    border-color:rgba(255,204,0,.2)!important;
}

.border-t a:hover{
    color:var(--mk-gold)!important;
}
/* =========================
   REQUIRED PLAYER CSS
   ========================= */

.animate-fade-in{
    animation:fadeIn .6s ease forwards;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.delay-100{animation-delay:.1s;}
.delay-200{animation-delay:.2s;}
.delay-300{animation-delay:.3s;}
.delay-400{animation-delay:.4s;}

.modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:99999;
    padding:15px;
}

.modal-backdrop.active{
    display:flex;
}

.modal-card{
    width:100%;
    max-width:1100px;
    max-height:90vh;
    overflow:hidden;
    border-radius:16px;
    display:flex;
    flex-direction:column;
}

.player-wrapper{
    position:relative;
    background:black;
    width:100%;
    min-height:420px;
}

.player-wrapper video,
.player-wrapper iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

.player-meta{
    display:flex;
    justify-content:space-between;
    gap:20px;
    padding:16px;
}

.meta-left{
    flex:1;
}

.controls-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}

.btn{
    min-width:90px;
    cursor:pointer;
}

@media(max-width:768px){

    .modal-card{
        max-height:100vh;
        border-radius:0;
    }

    .player-wrapper{
        min-height:250px;
    }

    .player-meta{
        flex-direction:column;
    }

    .controls-row{
        justify-content:center;
    }
}

  </style>
</head>
<body class="relative">
<!-- Floating stars background -->
<div class="fixed inset-0 overflow-hidden -z-10">
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/80"></div>
<div class="stars"></div>
<div class="stars2"></div>
</div>
<div class="container mx-auto px-4 py-8 max-w-7xl">

<!-- Full-Width Video Header with Animated Logo -->
<div class="relative w-full h-[200px] sm:h-[300px] md:h-[400px] lg:h-[500px] overflow-hidden">
  <!-- YouTube Video Background -->
  <iframe 
    src="https://www.youtube.com/embed/LX9kXRRJlPw?autoplay=1&mute=1&loop=1&playlist=Cwumhvq1FEA&controls=0&modestbranding=1"
    frameborder="0" 
    allow="autoplay; fullscreen" 
    class="absolute top-0 left-0 w-full h-full pointer-events-none">
  </iframe>

  <!-- Animated Logo at Top-Left -->
  <img 
    src="https://wallpaperaccess.com/full/288779.jpg" 
    alt="Transformers Logo" 
    class="absolute top-2 left-2 sm:top-4 sm:left-4 h-10 sm:h-16 md:h-20 lg:h-24 animate-logo z-10"
  />
</div>

<style>
  /* Animated Logo */
  .animate-logo {
    animation: float-pulse 3s ease-in-out infinite, glow-logo 2s ease-in-out infinite alternate;
  }

  @keyframes float-pulse {

  @keyframes glow-logo {

</div>
</div>
<!-- Movies Grid -->
<div class="mb-12">
<div class="grid grid-cols-2 xs:grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 sm:gap-4 md:gap-6" id="movies"></div>
</div>
<!-- Footer / Social -->
  <div class="border-t border-gray-800 mt-6 sm:mt-8 pt-4 sm:pt-6 text-center text-gray-500">
    <a href="#" class="text-gray-400 hover:text-[#c0392b] transition px-2"><i class="fab fa-facebook-f"></i></a>
    <a href="#" class="text-gray-400 hover:text-[#c0392b] transition px-2"><i class="fab fa-twitter"></i></a>
    <a href="https://www.instagram.com/stark_4152/reels" class="text-gray-400 hover:text-[#c0392b] transition px-2"><i class="fab fa-instagram"></i></a>
    <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="text-gray-400 hover:text-[#c0392b] transition px-2"><i class="fab fa-youtube"></i></a>
  </div>
</div>

<!-- === REPLACED: Illumination-style Modal Player === -->
<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <!-- video or iframe injected here -->
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" class="absolute top-4 right-4 z-10 bg-black/70 hover:bg-black/90 text-white rounded-full w-10 h-10 flex items-center justify-center transition">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <div class="player-meta">
      <div class="meta-left">
        <h3 id="modalTitle">Title</h3>
        <p id="modalDesc" class="text-sm"></p>
      </div>
      <div class="controls-row">
        <button id="prevBtn" class="btn"><i class="fas fa-step-backward mr-2"></i>Prev</button>
        <button id="playPauseBtn" class="btn"><i class="fas fa-play mr-2"></i>Play</button>
        <button id="nextBtn" class="btn">Next<i class="fas fa-step-forward ml-2"></i></button>
        <button id="fullscreenBtn" class="btn"><i class="fas fa-expand"></i></button>
        <button id="muteBtn" class="btn"><i class="fas fa-volume-up"></i></button>
        <button id="closeBtn" class="btn"><i class="fas fa-times"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
    /******************************
     * Existing movies array (unchanged)
     ******************************/
    const movies = [
{ title: "Mortal Kombat ", video: "https://mega.nz/embed/S8oWWLqZ#Ti0VJOKHWx36ZSU6P0SUfXiDteGDZ3M9c2gCMdnSDd4", image: "https://media.themoviedb.org/t/p/w188_and_h282_face/fcK7tzSSXMYiMN8E9KlZJL1BYyp.jpg", category: "other", year: 1995 },
      { title: "Mortal Kombat: Annihilation", video: "https://mega.nz/embed/u9g2RKAA#SvQjE8ck0_kdXrtQ5zMXn5lQbSmLv4qvDUMalzI3cw4", image: "https://media.themoviedb.org/t/p/w188_and_h282_face/ttryglcY2osWZE3sRYBf3ewTZsW.jpg", category: "other", year: 1997 },
      { title: "Mortal Kombat ", video: "https://mega.nz/embed/vggzwKjY#KDUzdLaLi2YK1G5Hf9i1zOJKvjH1rXNDYozW_nonjJM", image: "https://media.themoviedb.org/t/p/w188_and_h282_face/ybrX94xQm8lXYpZAPRmwD9iIbWP.jpg", category: "other", year: 2021 },
      { title: "Mortal Kombat II", video: "https://se9d.digitalgizmos.cyou:443/v4/vz/d3fdgz/index-f1-v1-a1.txt", image: "https://media.themoviedb.org/t/p/w188_and_h282_face/lIsMeDbwntNXSUVHmWMMRXEZOVc.jpg", category: "other", year: 2026 },
             
      
    ];

    /******************************
     * DOM refs for modal controls
     ******************************/
    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    /******************************
     * Type detection helpers
     ******************************/
    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    /******************************
     * Reset player container
     ******************************/
    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function showError(msg) {
      console.warn(msg);
    }

    /******************************
     * Core: open player (Illumination logic)
     ******************************/
    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) {
        showError('Invalid playback request');
        return;
      }
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];
      if (!movie) { showError('Movie missing'); return; }

      // metadata
      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || (movie.title || '');

      // reset & show
      resetPlayerContainer();
      showModal();

      // pick src
      let src = '';
      if (typeof movie.video === 'object' && movie.video !== null) {
        src = movie.video.high || movie.video.medium || movie.video.low || Object.values(movie.video)[0];
      } else {
        src = movie.video;
      }
      if (!src) {
        showError('No video source');
        setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=`, 500);
        return;
      }

      const lc = (src || '').toLowerCase();

      // iframe-hosted common hosts
      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('mega.nz') || lc.includes('openload') || lc.includes('drive.google.com')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        return;
      }

      // youtube
      if (isYouTube(src)) {
        let embed = src;
        try {
          if (src.includes('watch') && src.includes('v=')) {
            const v = new URLSearchParams(src.split('?')[1]).get('v');
            if (v) embed = `https://www.youtube.com/embed/${v}`;
          } else if (src.includes('youtu.be/')) {
            const p = src.split('youtu.be/')[1].split(/[?&]/)[0];
            if (p) embed = `https://www.youtube.com/embed/${p}`;
          }
        } catch (e) {}
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        return;
      }

      // FORCE iframe for protected / unknown streams
if (
  src.includes('megacdn.co') ||
  src.includes('livecricketsl.cc.nf')
) {
  playerWrapper.innerHTML = `
    <iframe 
      src="${src}" 
      width="100%" 
      height="100%" 
      frameborder="0" 
      allowfullscreen 
      allow="autoplay; encrypted-media">
    </iframe>`;
  return;
}
      // HLS
      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) { showError('Video element missing'); return; }
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          try {
            currentHls.loadSource(src);
            currentHls.attachMedia(v);
          } catch (e) { console.warn('HLS attach error', e); }
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
          });
          currentHls.on(Hls.Events.ERROR, function(event, data) {
            console.warn('HLS error', data);
            if (data && data.fatal) {
              try { currentHls.destroy(); } catch(e){}
              currentHls = null;
              showError('HLS fatal error — redirecting to player.html');
              setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 700);
            }
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        } else {
          showError('HLS not supported — redirecting to player.html');
          setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 700);
        }
        return;
      }

       // FORCE Workers MP4 streams to use HTML5 video
if (src.includes('workers.dev/mp4')) {
  const v = document.getElementById(modalVideoId);
  if (!v) { 
    showError('Video element missing'); 
    return; 
  }

  v.src = src;
  v.setAttribute("playsinline", "");
  v.setAttribute("webkit-playsinline", "");

  v.load();
  v.play().catch(() => {});

  playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
  return;
}

      // FORCE lizer123 /stream/ links to use HLS
if (src.includes('lizer123.site') && src.includes('/stream/')) {

  const v = document.getElementById(modalVideoId);
  if (!v) { showError('Video element missing'); return; }

  if (currentHls) {
    currentHls.destroy();
    currentHls = null;
  }

  if (Hls.isSupported()) {
    currentHls = new Hls();
    currentHls.loadSource(src);
    currentHls.attachMedia(v);
    currentHls.on(Hls.Events.MANIFEST_PARSED, function () {
      v.play().catch(()=>{});
    });
  } 
  else if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = src;
    v.load();
    v.play().catch(()=>{});
  }

  playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
  return;
}


      // MP4
      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) { window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`; return; }
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        return;
      }

      // fallback
      window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`;
    }

    /******************************
     * Controls
     ******************************/
    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play mr-2"></i>Play';
      }
    }
    function playNext() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return showError('No current video');
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
      else showError('No next video');
    }
    function playPrev() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return showError('No current video');
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
      else showError('No previous video');
    }
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=> showError('Fullscreen failed'));
      } else {
        document.exitFullscreen();
      }
    }
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    }

    /******************************
     * Close modal & cleanup
     ******************************/
    function closeModalHandler() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      const v = document.getElementById(modalVideoId);
      if (v) {
        try { v.pause(); } catch(e){}
        try { v.removeAttribute('src'); v.load(); } catch(e){}
      }
      resetPlayerContainer();
      hideModal();
      currentIndex = null;
      currentFiltered = [];
      playPauseBtn.innerHTML = '<i class="fas fa-play mr-2"></i>Play';
    }

    /******************************
     * Events wiring
     ******************************/
    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);

    // close by clicking outside
    playbackModal.addEventListener('click', function(e){
      if (e.target === playbackModal) closeModalHandler();
    });

    // Escape & keyboard
    document.addEventListener('keydown', (e) => {
      if (!playbackModal.classList.contains('active')) return;
      switch (e.key.toLowerCase()) {
        case 'escape': closeModalHandler(); break;
        case ' ': e.preventDefault(); togglePlayPause(); break;
        case 'arrowright': { const v = document.getElementById(modalVideoId); if (v) v.currentTime = Math.max(0, v.currentTime + 10); break; }
        case 'arrowleft': { const v = document.getElementById(modalVideoId); if (v) v.currentTime = Math.max(0, v.currentTime - 10); break; }
        case 'f': toggleFullscreen(); break;
        case 'm': toggleMute(); break;
        case 'n': playNext(); break;
        case 'p': playPrev(); break;
      }
    });

    /******************************
     * Render movies and wire to openPlayer
     ******************************/
    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 5) * 100}`;

        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-lg sm:rounded-xl overflow-hidden bg-gray-800 hover:bg-gray-700 cursor-pointer relative group`;
        div.innerHTML = `
          <div class="relative overflow-hidden rounded-t-lg">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-2 sm:p-4">
              <button class="bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-1 px-2 sm:py-2 sm:px-4 rounded-full transition transform hover:scale-105 text-xs sm:text-sm">
                <i class="fas fa-play mr-1 sm:mr-2"></i> Watch Now
              </button>
            </div>
          </div>
          <div class="p-2 sm:p-3 md:p-4">
            <h3 class="font-semibold text-sm sm:text-base md:text-lg truncate">${movie.title}</h3>
            <div class="flex justify-between items-center mt-1 sm:mt-2 text-xs sm:text-sm text-gray-400">
              <span>${movie.year}</span>
            </div>
          </div>
        `;

        // Open modal and use movies array for prev/next
        div.addEventListener('click', () => {
          openPlayer(moviesToRender, index);
        });

        container.appendChild(div);
      });
    }

    // Initial render
    renderMovies(movies);

    /******************************
     * Backwards-compatible extras:
     * Keep original search/category wiring but guard missing elements
     ******************************/
    const modalCloseBtn = document.getElementById('modal-close-btn');
    if (modalCloseBtn) modalCloseBtn.addEventListener('click', closeModalHandler);

    // previous code referenced searchBar; guard that
    const searchBarEl = document.getElementById('searchBar');
    if (searchBarEl) {
      searchBarEl.addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase();
        const filteredMovies = movies.filter(movie => 
          movie.title.toLowerCase().includes(searchTerm)
        );
        renderMovies(filteredMovies);
      });
    }

    // Category tabs preservation (guard for existence)
    document.querySelectorAll('.category-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        // Update active tab
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');

        const category = this.dataset.category;
        let filteredMovies;

        if (category === 'all') {
          filteredMovies = movies;
        } else {
          filteredMovies = movies.filter(movie => (movie.categories || []).includes(category));
        }

        renderMovies(filteredMovies);
      });
    });

    /******************************
     * Create floating stars background (existing)
     ******************************/
    function createStars(container, count, sizeRange, durationRange) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'absolute rounded-full bg-white';

        // Random position
        const left = Math.random() * 100;
        const top = Math.random() * 100;

        // Random size
        const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);

        // Random animation duration
        const duration = durationRange[0] + Math.random() * (durationRange[1] - durationRange[0]);

        star.style.left = `${left}%`;
        star.style.top = `${top}%`;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.opacity = Math.random() * 0.5 + 0.1;
        star.style.animation = `float ${duration}s infinite ease-in-out alternate`;
        star.style.animationDelay = `${Math.random() * 5}s`;

        container.appendChild(star);
      }
    }

    const starsContainer = document.querySelector('.stars');
    const starsContainer2 = document.querySelector('.stars2');
    if (starsContainer) createStars(starsContainer, 50, [1, 3], [5, 15]);
    if (starsContainer2) createStars(starsContainer2, 30, [2, 4], [10, 20]);

    // Add floating animation
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes float {
        0% { transform: translateY(0) translateX(0); }
        50% { transform: translateY(-20px) translateX(10px); }
        100% { transform: translateY(0) translateX(0); }
      }
    `;
    document.head.appendChild(style);

</script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;

})();

/* =========================

if (window.location.href.startsWith("view-source:")) {

}

/* =========================

========================= */
if (window.top !== window.self) {

    try {

}
