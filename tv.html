<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Live Channels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary: #ffcc00;
      --secondary: #111827;
      --accent: #f59e0b;
      --muted: #9CA3AF;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .movie-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    
    .movie-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
    }
    
    .search-input {
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    
    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.5);
    }
    
    .movie-poster {
      aspect-ratio: 16/9;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    
    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }
    
    .category-tab {
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    
    .category-tab:hover {
      transform: translateY(-2px);
      background-color: rgba(255, 204, 0, 0.1);
    }
    
    .category-tab.active {
      background-color: var(--primary);
      color: var(--secondary);
      font-weight: 600;
    }
    
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #ffcc00;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #f59e0b;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.4s ease forwards;
    }
    
    .delay-100 { animation-delay: 0.05s; }
    .delay-200 { animation-delay: 0.1s; }
    .delay-300 { animation-delay: 0.15s; }
    .delay-400 { animation-delay: 0.2s; }
    
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(0,0,0,0.85); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
      backdrop-filter: blur(8px);
    }
    .modal-backdrop.active { display:flex; }
    
    .modal-card { 
      width: 100%;
      height: 100%;
      max-width: 980px;
      max-height: 100vh;
      background: #0b1220;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 768px) {
      .modal-card {
        max-height: 100vh;
      }
      .player-wrapper {
        padding-bottom: 56.25% !important;
      }
      .player-meta {
        padding: 12px !important;
      }
    }
    
    .player-wrapper { 
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }
    
    #topCloseBtn { 
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    #topCloseBtn:hover {
      background: #ef4444;
      transform: scale(1.1);
    }
    
    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    
    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      color: #ddd;
      background: #0f172a;
      border-top: 1px solid #1e293b;
      flex-shrink: 0;
    }
    
    .player-meta h3 { 
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
    }
    
    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    
    .btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    
    .btn:hover { 
      background: var(--primary); 
      color: var(--secondary);
      border-color: var(--primary);
    }
    
    @media (min-width: 768px) {
      .modal-card {
        width: 90%;
        height: auto;
        border-radius: 16px;
        max-height: 90vh;
        overflow: hidden;
      }
      .player-wrapper {
        padding-bottom: 56.25% !important;
        height: 0;
        flex: none;
      }
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .controls-row {
        flex-wrap: nowrap;
      }
    }
    
    @media (max-width: 480px) {
      .btn span { display: none; }
      .btn { padding: 10px 12px; }
    }
    
    video:fullscreen, video:-webkit-full-screen {
      object-fit: contain !important;
      background-color: black;
    }
  </style>
</head>

<body>
  <div class="container mx-auto px-4 py-6 max-w-7xl">
    <header class="relative flex items-center justify-center mb-6 sm:mb-8">
      <a href="https://ultron3000.github.io/ultron" class="absolute left-0">
        <img src="https://static.readdy.ai/image/0ece273271e400e488b9947cb1e99e9a/a79b6f32c71c4ee2094ead0eb9c84c9b.png" alt="Logo" class="h-8 sm:h-10 md:h-12 drop-shadow-lg"/>
      </a>
      <h1 class="text-2xl sm:text-3xl font-bold text-yellow-400 tracking-wide flex items-center gap-2">
        <span>📡</span> Live TV
      </h1>
    </header>

    <!-- Search Bar -->
    <div class="mb-6 flex justify-center">
      <div class="relative w-full max-w-md">
        <input type="text" id="searchBar" placeholder="Search channels..." class="search-input w-full px-5 py-3 pl-12 rounded-full bg-gray-800/60 backdrop-blur-md border border-gray-700 focus:border-yellow-400 text-white placeholder-gray-400 focus:outline-none"/>
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-yellow-400"></i>
      </div>
    </div>

    <!-- Category Tabs -->
    <div class="flex flex-wrap gap-2 mb-8 justify-center px-1">
      <button class="category-tab active px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="all">All</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="cricket">Cricket</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="football">Football</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="sports">Sports</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="movie">Movies</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="entertainment">Entertainment</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="comedy">Comedy</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="education">Education</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="kid">KIDS</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="music">Music</button>
      <button class="category-tab px-4 py-2 rounded-full border border-gray-700 text-gray-300" data-category="news">News</button>
    </div>

    <!-- Main Grid -->
    <div id="movies" class="grid grid-cols-2 xs:grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4 mb-12"></div>

    <!-- Footer -->
    <div class="border-t border-gray-800 mt-12 pt-6 text-center text-gray-500">
      <a href="#" class="text-gray-400 hover:text-yellow-400 transition px-3"><i class="fab fa-facebook-f"></i></a>
      <a href="#" class="text-gray-400 hover:text-yellow-400 transition px-3"><i class="fab fa-twitter"></i></a>
      <a href="https://www.instagram.com/stark_4152/reels" class="text-gray-400 hover:text-yellow-400 transition px-3"><i class="fab fa-instagram"></i></a>
      <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="text-gray-400 hover:text-yellow-400 transition px-3"><i class="fab fa-youtube"></i></a>
    </div>
  </div>

  <!-- Playback Modal -->
  <div id="playbackModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="player-wrapper" id="playerWrapper">
        <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
        <button id="topCloseBtn">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <div class="player-meta">
        <div class="meta-left max-w-[100%] md:max-w-[40%]">
          <h3 id="modalTitle" class="truncate">Title</h3>
          <p id="modalDesc" class="text-sm text-gray-400 truncate mt-1"></p>
        </div>
        <div class="controls-row">
          <button id="prevBtn" class="btn"><i class="fas fa-step-backward"></i><span>Prev</span></button>
          <button id="playPauseBtn" class="btn"><i class="fas fa-play"></i><span>Play</span></button>
          <button id="nextBtn" class="btn"><span>Next</span><i class="fas fa-step-forward"></i></button>
          <button id="fullscreenBtn" class="btn"><i class="fas fa-expand"></i></button>
          <button id="muteBtn" class="btn"><i class="fas fa-volume-up"></i></button>
          <button id="closeBtn" class="btn !bg-red-600/20 !border-red-500/40 hover:!bg-red-600 text-white"><i class="fas fa-times"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Channels array is completely extracted to channels.json to hide your source URLs
    let movies = [];

    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      if (window.shakaPlayer) {
        try { window.shakaPlayer.destroy(); } catch(e) {}
        window.shakaPlayer = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function triggerExternalFallback(movie, src) {
      console.log("Stream failed or unplayable in modal. Triggering external page fallback redirection.");
      window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    async function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) return;
      
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];
      if (!movie) return;

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.language ? `${movie.language} • Live Channel` : 'Live Channel';

      resetPlayerContainer();
      showModal();

      let src = (typeof movie.video === 'object' && movie.video !== null) ? (movie.video.high || Object.values(movie.video)[0]) : movie.video;
      if (!src) return;

    

      const lc = src.toLowerCase();

      // Native Element Error Hook for global fallback handling
      setTimeout(() => {
        const vEl = document.getElementById(modalVideoId);
        if (vEl) {
          vEl.addEventListener('error', () => triggerExternalFallback(movie, src));
        }
      }, 100);

      // DASH / MPD Key setup
      if (typeof movie.video === 'object' && movie.video.mpd) {
        const v = document.getElementById(modalVideoId);
        try {
          window.shakaPlayer = new shaka.Player(v);
          window.shakaPlayer.addEventListener('error', () => triggerExternalFallback(movie, src));
          if (movie.video.key) {
            const [kid, key] = movie.video.key.split(':');
            window.shakaPlayer.configure({ drm: { clearKeys: { [kid]: key } } });
          }
          await window.shakaPlayer.load(movie.video.mpd);
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
          return;
        } catch (e) { 
          triggerExternalFallback(movie, src);
          return;
        }
      }

      // Live TV web frame links handler logic block
      if (lc.includes('waptv.wapka.xyz') || lc.includes('tv4wab.pages.dev') || lc.includes('24spn-webhost8.blogspot.com') ||
          lc.includes('livesportz.cfd') || lc.includes('tvwap.pages.dev') || lc.includes('live4wab.pages.dev') ||
          lc.includes('joplay.lrl45.workers.dev') || lc.includes('jiogo.pages.dev') || lc.includes('tvgotk.wapka.site') || 
          lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('livecricketsl.cc.nf')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" style="background:#000"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      // YouTube player
      if (isYouTube(src)) {
        let embed = src;
        if (src.includes('watch') && src.includes('v=')) {
          const v = new URLSearchParams(src.split('?')[1]).get('v');
          if (v) embed = `https://www.youtube.com/embed/${v}`;
        }
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      // Optimized Lag-Fixing HLS Stream Engine Implementation with advanced configuration tuning
      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls({
            maxBufferLength: 30,             // Maximizes local timeline segment downloads
            maxMaxBufferLength: 60,          // Prevents memory loops while keeping stream solid
            liveSyncDurationCount: 3,        // Targets ideal safe distance from target edge 
            liveMaxLatencyDurationCount: 6,  // Smart adaptive boundary to handle fast/slow nets
            enableWorker: true,              // Moves data demux tasks to webworker to fix UI stuttering
            lowLatencyMode: true,            // Processes chunked transfer streams instantly
            abrEwmaDefaultEstimate: 5000000, // Starts off requesting high-grade stream variants
            backBufferLength: 30             // Retains past segments safely for short backward checks
          });
          currentHls.loadSource(src);
          currentHls.attachMedia(v);
          
          // Enhanced recovery mechanics inside live HLS play loops
          currentHls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
              switch (data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                  console.log("Fatal network error encountered, attempting to recover...");
                  currentHls.startLoad();
                  break;
                case Hls.ErrorTypes.MEDIA_ERROR:
                  console.log("Fatal media process error encountered, trying buffer recovery...");
                  currentHls.recoverMediaError();
                  break;
                default:
                  triggerExternalFallback(movie, src);
                  break;
              }
            }
          });

          currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
          });
        } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        } else {
          triggerExternalFallback(movie, src);
        }
        return;
      }

      // MP4 streams fallback loop 
      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }
    }

    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
      }
    }

    function playNext() {
      if (!currentFiltered.length) currentFiltered = movies.slice();
      if (currentIndex != null && currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
    }

    function playPrev() {
      if (!currentFiltered.length) currentFiltered = movies.slice();
      if (currentIndex != null && currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
    }

    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=>{});
      else document.exitFullscreen();
    }

    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    }

    function closeModalHandler() {
      if (currentHls) { currentHls.destroy(); currentHls = null; }
      const v = document.getElementById(modalVideoId);
      if (v) { v.pause(); v.removeAttribute('src'); v.load(); }
      resetPlayerContainer();
      hideModal();
      playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);
    playbackModal.addEventListener('click', (e) => { if (e.target === playbackModal) closeModalHandler(); });

    const container = document.getElementById('movies');
    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 5) * 100}`;
        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-xl overflow-hidden bg-gray-800/80 border border-gray-700/50 hover:border-yellow-400/60 cursor-pointer relative group`;
        div.innerHTML = `
          <div class="relative overflow-hidden">
            <img src="${movie.image}" alt="${movie.title}" class="w-full movie-poster" loading="lazy">
            <div class="absolute inset-0 bg-gradient-to-t from-gray-950 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
              <span class="bg-yellow-400 text-gray-900 rounded-full p-3 transform scale-90 group-hover:scale-100 transition-all shadow-lg"><i class="fas fa-play"></i></span>
            </div>
          </div>
          <div class="p-3 bg-gray-900/40">
            <h3 class="font-medium text-sm sm:text-base truncate text-gray-100 group-hover:text-yellow-400 transition-colors">${movie.title}</h3>
          </div>
        `;
        div.addEventListener('click', () => openPlayer(moviesToRender, index));
        container.appendChild(div);
      });
    }

    // Async Fetch function to download channels dynamic list from channels.json repository location
    async function loadChannelsData() {
      try {
        const response = await fetch('channels.json');
        if (!response.ok) throw new Error('Network error attempting to pull channels list structure.');
        movies = await response.json();
        renderMovies(movies);
      } catch (err) {
        console.error("Failed to load channel data source configuration array accurately:", err);
        container.innerHTML = `<div class="col-span-full text-center py-8 text-red-400 font-medium">Failed to load channels. Please refresh or check file configuration settings.</div>`;
      }
    }

    // Initial lifecycle trigger execution load
    loadChannelsData();

    document.getElementById('searchBar').addEventListener('input', function() {
      const searchTerm = this.value.toLowerCase();
      renderMovies(movies.filter(movie => movie.title.toLowerCase().includes(searchTerm)));
    });

    document.querySelectorAll('.category-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const category = this.dataset.category;
        renderMovies(category === 'all' ? movies : movies.filter(movie => movie.category === category));
      });
    });
  </script>

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>

<style>
html, body {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    overflow-x: hidden;
}

/* Disable image dragging */
img {
    pointer-events: none;
    -webkit-user-drag: none;
}

/* Hide selection */
::selection {
    background: transparent;
}
</style>
