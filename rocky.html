<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Rocky Cinematic Universe: The Ultimate Collection</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary: #ffcc00;
      --secondary: #111827;
      --accent: #dc2626;
      --muted: #9CA3AF;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .movie-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
    }
    
    .movie-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 25px -5px rgba(255, 204, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
    }
    
    .header-glow {
      text-shadow: 0 0 10px rgba(255, 204, 0, 0.7);
    }
    
    .movie-poster {
      aspect-ratio: 2/3;
      transition: transform 0.5s ease;
    }
    
    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #ffcc00;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #f59e0b;
    }
    
    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.6s ease forwards;
    }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    
    /* Illumination modal styles (responsive) */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(0,0,0,0.9); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
      padding: 0;
    }
    .modal-backdrop.active { display:flex; }
    .modal-card { 
      width: 100%;
      height: 100%;
      max-width: 980px;
      max-height: 90vh;
      border-radius: 0;
      overflow: hidden;
      background: #0b1220;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255, 204, 0, 0.2);
    }
    .player-wrapper { 
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }
    #topCloseBtn { 
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: all 0.2s ease;
    }
    #topCloseBtn:hover {
      background: var(--primary);
      color: #000;
      transform: scale(1.1);
    }
    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      color: #ddd;
      background: #0b1220;
      border-top: 1px solid rgba(255, 204, 0, 0.1);
    }
    .player-meta .meta-left { 
      width: 100%;
    }
    .player-meta h3 { 
      margin: 0;
      font-size: 1.125rem;
      color: var(--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta p { 
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      min-width: 60px;
      flex: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    .btn:hover { 
      background: var(--primary); 
      color: #000;
    }
    .btn i {
      font-size: 1rem;
    }

    .animate-logo {
      animation: float-pulse 3s ease-in-out infinite;
    }

    @keyframes float-pulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* DESKTOP FIXED OVERRIDE LAYER */
    @media (min-width: 768px) {
      .modal-card {
        width: 92%;
        height: auto;
        border-radius: 12px;
        max-height: 80vh;
      }
      .player-wrapper {
        padding-bottom: 0 !important;
        height: auto !important;
        max-height: 60vh !important;
        position: relative !important;
      }
      .player-wrapper video,
      .player-wrapper iframe {
        height: 100% !important;
        max-height: 60vh !important;
        position: relative !important;
      }
      .player-meta {
        position: relative !important;
        z-index: 100 !important;
        background: #0b1220 !important;
        padding-top: 10px !important;
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
      }
      .player-meta .meta-left {
        max-width: 65%;
      }
      .controls-row {
        display: flex !important;
        flex-wrap: wrap !important;
        justify-content: center !important;
        gap: 12px !important;
      }
      .btn {
        min-width: 95px !important;
        padding: 10px 16px !important;
        flex: unset !important;
      }
      .modal-card {
        max-height: 85vh !important;
        overflow: visible !important;
      }
      #topCloseBtn {
        opacity: 0;
      }
      .player-wrapper:hover #topCloseBtn {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .btn {
        padding: 8px;
        font-size: 0;
      }
      .btn i {
        font-size: 1rem;
        margin: 0 !important;
      }
    }
</style>
</head>

<!-- === Illumination-style Modal Player === -->
<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" class="absolute top-4 right-4 z-10 bg-black/70 hover:bg-yellow-500 hover:text-black text-white rounded-full w-10 h-10 flex items-center justify-center transition">

        <button id="nextBtn" class="btn">Next<i class="fas fa-step-forward ml-2"></i></button>

<script>
    /**********************************************
     * Upgraded Dataset Grid Records Array
     **********************************************/
    const movies = [
      { 
        title: "Rocky", 
        video: "https://vip.opstream12.com/20220529/16968_eec5cdf1/index.m3u8",
        image: "https://m.media-amazon.com/images/I/81D9S-YP5oL.jpg",

        image: "https://images-cdn.ubuy.co.in/634e494b208b18270d536803-movie-poster-rocky-ii-1979-24x36-this.jpg",

        year: 1979,
        duration: "1h 59m",
        description: "Rocky Balboa struggles to cope with his newfound fame and family life after his epic bout, leading him back to the gym for a highly anticipated rematch against Apollo Creed."
      },
      {

        video: "https://vip.opstream12.com/20220626/22391_2d6b7c64/index.m3u8",
        image: "https://posterspy.com/wp-content/uploads/2022/05/235-rocky-alternative-movie-poster-final.jpg",
        category: "other", 
        year: 1982,
        duration: "1h 39m",
        description: "After capturing the ultimate heavyweight title, Rocky grows complacent, facing a devastating defeat at the hands of brutal challenger Clubber Lang before seeking an unexpected trainer."
      },
      { 
        title: "Rocky IV", 
        video: "https://vip.opstream12.com/20220529/16967_5dc91c6a/index.m3u8",
        image: "https://posterspy.com/wp-content/uploads/2020/11/rocky-iv-genzo-1280.jpg",
        category: "other", 
        year: 1985,
        duration: "1h 31m",
        description: "Rocky Balboa proudly flies to the Soviet Union to take on the towering, genetically engineered powerhouse Ivan Drago in an intensely personal fight following tragedy."
      },
      { 
        title: "Rocky V", 
        video: "https://mega.nz/embed/RzYA2aRY#gdHTh4c98eYqFbgfrGmF9ypfID0FK77h4e5OJrFn2kU",
        image: "https://m.media-amazon.com/images/M/MV5BMTM2Mzc4MTYxM15BMl5BanBnXkFtZTcwODY5NTk1NA@@._V1_FMjpg_UX1000_.jpg",
        category: "other", 
        year: 1990,
        duration: "1h 44m",
        description: "Bankrupt and physically broken from his career, Rocky returns to his roots in Philadelphia to train a highly promising yet ungrateful young protégé named Tommy Gunn."
      },
      { 
        title: "Rocky Balboa", 
        video: "https://mega.nz/embed/Aq5VkDKA#I47t0ypP0AthgerQzg3WzZ3ePg-aDQx6pWN99wHqsdg",
        image: "https://m.media-amazon.com/images/I/81zj0nhRI1L.jpg",
        category: "other", 
        year: 2006,
        duration: "1h 42m",
        description: "Virtually retired and running a quiet local restaurant, an aging Rocky steps out of standard retirement into the ring one last time to square off against the reigning champ."
      },
      { 
        title: "Creed", 
        video: "https://vip.opstream12.com/20220511/15153_f8238d31/index.m3u8",
        image: "https://m.media-amazon.com/images/I/61rcZZn-HfL._AC_UF1000,1000_QL80_.jpg",
        category: "other", 
        year: 2015,
        duration: "2h 13m",
        description: "Adonis Johnson, the son of the legendary boxing champion Apollo Creed, travels across to Philadelphia to seek out Rocky Balboa to serve as his primary career trainer."
      },
      { 
        title: "Creed II", 
        video: "https://vip.opstream12.com/20220508/14932_205ec359/index.m3u8",
        image: "https://mlpnk72yciwc.i.optimole.com/cqhiHLc.IIZS~2ef73/w:auto/h:auto/q:75/https://bleedingcool.com/wp-content/uploads/2018/02/creed-ii.jpg",
        category: "other", 
        year: 2018,
        duration: "2h 10m",
        description: "Under the deep strategic guidance of Rocky, heavyweight champion Adonis Creed faces off against Viktor Drago, the heavy-hitting son of the man who ended his father's life."
      },
      { 
        title: "Creed III", 
        video: "https://mega.nz/embed/d2ohzQKA#0NpgPf2mD75i5nTjsMg2-0e305cG0HzhK7YaWm35hmw",
        image: "https://m.media-amazon.com/images/M/MV5BOWY0MTRmY2YtMzBlYi00NjlkLThkZWYtMmE2NzJiZmIzODFkXkEyXkFqcGc@._V1_.jpg",
        category: "other", 
        year: 2023,
        duration: "1h 56m",
        description: "Dominating the absolute boxing world, Adonis Creed thrives until a brilliant childhood friend and former boxing prodigy re-emerges to force a final emotional face-off."
      }
    ];

    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) { try { currentHls.destroy(); } catch(e) {} currentHls = null; }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() { playbackModal.classList.add('active'); document.body.style.overflow = 'hidden'; }
    function hideModal() { playbackModal.classList.remove('active'); document.body.style.overflow = ''; }

    function openPlayer(list, index) {
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];
      if (!movie) return;

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || '';

      resetPlayerContainer();
      showModal();

      let src = movie.video;
      const lc = (src || '').toLowerCase();

      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('ok.ru') || lc.includes('mega.nz')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        return;
      }

      if (isYouTube(src)) {
        let embed = src;
        if (src.includes('watch') && src.includes('v=')) {
          const v = new URLSearchParams(src.split('?')[1]).get('v');
          if (v) embed = `https://www.youtube.com/embed/${v}`;
        }
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        return;
      }

      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(src);
          currentHls.attachMedia(v);
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        }
        return;
      }

      const v = document.getElementById(modalVideoId);
      v.src = src;
      v.play().catch(()=>{});
      playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
    }

    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) { v.play().catch(()=>{}); playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause'; }
      else { v.pause(); playPauseBtn.innerHTML = '<i class="fas fa-play mr-2"></i>Play'; }
    }
    function playNext() { if (currentIndex !== null && currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1); }
    function playPrev() { if (currentIndex !== null && currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1); }
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=>{});
      else document.exitFullscreen();
    }
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute mr-2"></i>Muted' : '<i class="fas fa-volume-up mr-2"></i>Audio';
    }

    function closeModalHandler() { if (currentHls) { currentHls.destroy(); currentHls = null; } resetPlayerContainer(); hideModal(); }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);
    playbackModal.addEventListener('click', (e) => { if (e.target === playbackModal) closeModalHandler(); });

    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 5) * 100}`;
        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-xl overflow-hidden bg-gray-800 hover:bg-gray-700 cursor-pointer relative group`;
        div.innerHTML = `
          <div class="relative overflow-hidden aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
              <button class="bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-2 px-4 rounded-full w-full text-xs transition transform hover:scale-105">
                <i class="fas fa-play mr-2"></i> Watch Now
              </button>
            </div>
          </div>
          <div class="p-4">
            <h3 class="font-semibold text-sm truncate text-gray-100 group-hover:text-yellow-400 transition-colors">${movie.title}</h3>
            <div class="flex justify-between items-center mt-2 text-xs text-gray-400">
              <span>${movie.year}</span>
              <span class="text-yellow-500 bg-yellow-950/40 px-1 rounded border border-yellow-900/20 font-bold">${movie.duration}</span>
            </div>
          </div>
        `;
        div.addEventListener('click', () => openPlayer(moviesToRender, index));
        container.appendChild(div);
      });
    }

    renderMovies(movies);

    function createStars(starsContainer, count, sizeRange, durationRange) {
      if (!starsContainer) return;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
