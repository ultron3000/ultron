  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary: #ffcc00;
      --secondary: #111827;
      --accent: #f59e0b;
      --muted: #9CA3AF;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #050b14 0%, #111827 100%);
      color: white;
      min-height: 100vh;
    }

    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(0,0,0,0.95); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
    }
    .modal-backdrop.active { display:flex; }
    .modal-card { 
      width: 100%; max-width: 980px; background: #0b1220; display: flex; flex-direction: column;
    }
    .player-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
    .btn { border: 1px solid var(--primary); color: var(--primary); padding: 8px 16px; border-radius: 8px; transition: all 0.2s; }
    .btn:hover { background: rgba(254,209,65,0.1); }
    
    .live-glow-card {
      position: relative;
      border: 2px solid #ef4444 !important;
      box-shadow: 0 0 25px rgba(239, 68, 68, 0.25);
    }
  </style>
</head>

<div class="container mx-auto px-4 py-8 max-w-7xl">
  <header class="flex items-center justify-between mb-10 border-b border-gray-800 pb-5">
    <a href="#" class="flex items-center gap-2">
      <img src="https://static.readdy.ai/image/0ece273271e400e488b9947cb1e99e9a/a79b6f32c71c4ee2094ead0eb9c84c9b.png" alt="Logo" class="h-10 drop-shadow-lg"/>
      <span class="text-sm font-bold tracking-wider text-gray-400 hidden sm:inline">Cloud TV</span>
    </a>
    <h1 class="text-xl sm:text-2xl font-bold text-yellow-400 flex items-center gap-2">
      🏆 FIFA World Cup 2026 Match Center
    </h1>
    <div class="w-10"></div>
  </header>

  <div>
    <h2 class="text-lg font-semibold text-gray-400 mb-6 flex items-center gap-2">
      <i class="fas fa-calendar-alt text-yellow-400"></i> Tournament Highlights
    </h2>
    <div id="matchScheduleGrid" class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-6">
    </div>
  </div>
</div>

<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card">
    <div class="player-wrapper">
      <!-- Media container explicitly handles isolation between native HTML5 video player and external Iframes -->
      <div id="mediaContainer" class="absolute inset-0 w-full h-full">
        <video id="modalVideo" class="w-full h-full" controls playsinline autocomplete="off"></video>
      </div>
      
      <button id="topCloseBtn" onclick="closePlayer()" class="absolute top-4 right-4 z-50 bg-black/70 hover:bg-black/90 text-white rounded-full w-10 h-10 flex items-center justify-center">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>
    <div class="p-4 bg-[#0b1220] flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-t border-gray-800">
      <div>
        <h3 id="modalTitle" class="text-lg font-bold text-white">Match Stream</h3>
        <p id="modalDesc" class="text-sm text-gray-400">FIFA World Cup 2026 Video Feed</p>
      </div>
      
      <!-- Integrated Media Controls & Close Layout Alignment -->
      <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
        <div class="flex items-center gap-1 bg-gray-900 border border-gray-800 rounded-lg p-1">
          <button onclick="playAdjacentMatch(-1)" title="Previous Match" class="text-white hover:text-yellow-400 w-9 h-9 flex items-center justify-center transition rounded-md hover:bg-gray-800">
            <i class="fas fa-step-backward text-sm"></i>
          </button>
          <button onclick="togglePlayPause()" title="Play/Pause" class="text-white hover:text-yellow-400 w-9 h-9 flex items-center justify-center transition rounded-md hover:bg-gray-800">
            <i id="modalPlayIcon" class="fas fa-pause text-sm"></i>
          </button>
          <button onclick="playAdjacentMatch(1)" title="Next Match" class="text-white hover:text-yellow-400 w-9 h-9 flex items-center justify-center transition rounded-md hover:bg-gray-800">
            <i class="fas fa-step-forward text-sm"></i>
          </button>
          <div class="w-[1px] h-4 bg-gray-800 mx-1"></div>
          <button onclick="toggleFullScreen()" title="Fullscreen" class="text-white hover:text-yellow-400 w-9 h-9 flex items-center justify-center transition rounded-md hover:bg-gray-800">
            <i class="fas fa-expand text-sm"></i>
          </button>
        </div>
        
        <button onclick="closePlayer()" class="btn px-6 shrink-0"><i class="fas fa-times mr-2"></i>Close</button>
      </div>
    </div>
  </div>
</div>

  function buildScheduleGrid() {
    const grid = document.getElementById("matchScheduleGrid");
    let fullGridHtml = ""; // Use a localized accumulator string to prevent heavy iterative DOM re-render lag

    fifaMatches.forEach((match, index) => {

      } else if (match.status === "LIVE") {
        customCardClass = "live-glow-card";
        statusHtml = `<span class="bg-red-600 text-white text-[10px] sm:text-xs px-2 sm:px-3 py-1 rounded-full font-bold animate-pulse flex items-center gap-1"><span class="h-1.5 w-1.5 rounded-full bg-white block"></span> LIVE</span>`;
        actionButtonHtml = `

        statusHtml = `<span class="bg-blue-600/20 text-blue-400 border border-blue-500/30 text-[10px] sm:text-xs px-2 sm:px-3 py-1 rounded-full font-medium"><i class="fas fa-clock mr-1"></i> UPCOMING</span>`;

  function launchStreamByIndex(index, title) {
    currentMatchIndex = index;
    const match = fifaMatches[index];
    launchStream(match.videoUrl, title, match);
  }

  async function launchStream(url, title, matchObj = {}) {
    if(!url || url === "#" || url === "00") return alert("No video link configured for this match yet.");
    const modal = document.getElementById("playbackModal");
    document.getElementById("modalTitle").innerText = title;
    
    modal.classList.add("active");

    const mediaContainer = document.getElementById("mediaContainer");

    // ==========================================
    // EXTRA IFRAME OVERRIDE FOR EMBED/EXTERNAL LINKS (MEGA)
    // ==========================================
    if (
      url.includes('mega.nz') ||
      url.includes('megacdn.co') ||
      url.includes('fast3.vidplus.dev') ||
      url.includes('akcloud.animanga.fun') ||
      url.includes('https://lingering-cherry-13ec.fdgbr3422wdf56y.workers.dev') ||
      url.includes('https://m3u8-proxy.digitalcinemaos.workers.dev') ||
      url.includes('livecricketsl.cc.nf')
    ) {
      mediaContainer.innerHTML = `
        <iframe 
          src="${url}" 
          width="100%" 
          height="100%" 
          frameborder="0" 
          allowfullscreen 
          allow="autoplay; encrypted-media"
          style="width:100%; height:100%;">
        </iframe>`;
      return; // Stop processing native configurations if it's an Iframe
    }

    // Default Fallback: Guarantee an HTML5 video component is initialized
    mediaContainer.innerHTML = `<video id="modalVideo" class="w-full h-full" controls playsinline autocomplete="off"></video>`;
    const video = document.getElementById("modalVideo");

    if (typeof shaka !== 'undefined') shaka.polyfill.installAll();

    if (shaka.Player.isBrowserSupported()) {
      if (shakaPlayerInstance) await shakaPlayerInstance.destroy();
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

      shakaPlayerInstance = new shaka.Player(video);
      
      const shakaConfig = {
        streaming: {
          lowLatencyMode: true,
          rebufferingGoal: 2,
          bufferingGoal: 5
        }
      };

      if (matchObj.clearKeyId && matchObj.clearKey) {
        shakaConfig.drm = {
          clearKeys: {
            [matchObj.clearKeyId]: matchObj.clearKey
          }
        };
      }

      shakaPlayerInstance.configure(shakaConfig);

      shakaPlayerInstance.addEventListener('error', (event) => {
        console.error('Shaka Player error:', event.detail);
      });

      try {
        await shakaPlayerInstance.load(url);
        video.play().catch(err => console.log("Autoplay context note: ", err));
      } catch (error) {
        console.warn("Shaka failure, shifting layout context to native Hls.js initialization loop", error);
        fallbackToHls(url, video);
      }
    } else {
      fallbackToHls(url, video);
    }
  }
  

  function fallbackToHls(url, video) {
    if (Hls.isSupported()) {
      if (hlsInstance) hlsInstance.destroy();
      hlsInstance = new Hls({ maxMaxBufferLength: 10, enableWorker: true, lowLatencyMode: true });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.addEventListener('loadedmetadata', () => video.play());
    }
  }

  async function closePlayer() {
    const modal = document.getElementById("playbackModal");
    modal.classList.remove("active");
    
    const video = document.getElementById("modalVideo");
    if(video) video.pause();
    
    if (shakaPlayerInstance) {
      await shakaPlayerInstance.destroy();
      shakaPlayerInstance = null;
    }
    if (hlsInstance) {
      hlsInstance.destroy();
      hlsInstance = null;
    }
    
    // Completely nuke inner content of mediaContainer to terminate running internal frames immediately
    const mediaContainer = document.getElementById("mediaContainer");
    if (mediaContainer) {
       mediaContainer.innerHTML = `<video id="modalVideo" class="w-full h-full" controls playsinline autocomplete="off"></video>`;
    }
  }
  function togglePlayPause() {
    const video = document.getElementById("modalVideo");
    const icon = document.getElementById("modalPlayIcon");
    if (!video) return;
    
    if (video.paused) {
      video.play();
      icon.className = "fas fa-pause text-sm";
    } else {
      video.pause();
      icon.className = "fas fa-play text-sm ml-0.5";
    }
  }

  function toggleFullScreen() {
    const container = document.getElementById("mediaContainer");
    if (!container) return;
    
    if (!document.fullscreenElement) {
      container.requestFullscreen().catch(err => {
        console.error(`Fullscreen Error: ${err.message}`);
      });
    } else {
      document.exitFullscreen();
    }
  }

  function playAdjacentMatch(direction) {
    let nextIndex = currentMatchIndex + direction;
    
    if (nextIndex < 0) {
      nextIndex = fifaMatches.length - 1; 
    } else if (nextIndex >= fifaMatches.length) {
      nextIndex = 0; 
    }
    
    const match = fifaMatches[nextIndex];
    const suffix = match.status === "COMPLETED" ? " (Replay)" : "";
    launchStreamByIndex(nextIndex, `${match.teamA} vs ${match.teamB}${suffix}`);
  }
  window.onload = buildScheduleGrid;
