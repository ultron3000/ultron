<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Jurassic Park & World: The Ultimate Collection</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary: #ff9900; /* Jurassic Amber */
      --secondary: #0a0e0a; /* Deep Jungle Obsidian */
      --accent: #dc2626; /* Warning Red */
      --muted: #9CA3AF;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #040804 0%, #0c0f12 100%);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .movie-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.7);
    }
    
    .movie-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 30px -10px rgba(255, 153, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
    }
    
    .header-glow {
      font-family: 'Cinzel', serif;
      text-shadow: 0 0 15px rgba(255, 153, 0, 0.6);
      letter-spacing: 0.1em;
    }
    
    .movie-poster {
      aspect-ratio: 2/3;
      transition: transform 0.5s ease;
    }
    
    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }

    /* === JURASSIC DINOSAUR POPUP SYSTEM === */
    .character-trex {
      position: absolute;
      bottom: -160px;
      left: 4%;
      height: 140px;
      z-index: 25;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.9));
    }

    .character-raptor {
      position: absolute;
      bottom: -160px;
      right: 4%;
      height: 140px;
      z-index: 25;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.9));
    }

    /* Hovering over banner raises the beasts */
    .video-banner-container:hover .character-trex {
      bottom: 12px;
      transform: scale(1.15) rotate(-2deg);
    }

    .video-banner-container:hover .character-raptor {
      bottom: 12px;
      transform: scale(1.15) rotate(2deg);
    }

    /* Responsive scales for dinosaurs */
    @media (min-width: 640px) {
      .character-trex, .character-raptor {
        height: 180px;
        bottom: -200px;
      }
      .video-banner-container:hover .character-trex { bottom: 16px; }
      .video-banner-container:hover .character-raptor { bottom: 16px; }
    }

    @media (min-width: 768px) {
      .character-trex, .character-raptor {
        height: 230px;
        bottom: -260px;
      }
      .video-banner-container:hover .character-trex { bottom: 20px; }
      .video-banner-container:hover .character-raptor { bottom: 20px; }
    }

    @media (min-width: 1024px) {
      .character-trex, .character-raptor {
        height: 280px;
        bottom: -310px;
      }
      .video-banner-container:hover .character-trex { bottom: 24px; }
      .video-banner-container:hover .character-raptor { bottom: 24px; }
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #080c08;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #ffa620;
    }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.6s ease forwards;
    }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }

    /* Elegant Amber Logo Animation */
    @keyframes amberGlow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 153, 0, 0.4)) brightness(1); }
      50% { filter: drop-shadow(0 0 25px rgba(255, 153, 0, 0.85)) brightness(1.1); }
    }
    .animate-logo {
      animation: amberGlow 4s ease-in-out infinite;
    }
    
    /* Elegant Tactical Media Modal */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(0,0,0,0.96); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
      padding: 0;
    }
    .modal-backdrop.active { display:flex; }
    .modal-card { 
      width: 100%;
      height: 100%;
      max-width: 980px;
      max-height: 90vh;
      border-radius: 0;
      overflow: hidden;
      background: #080a08;
      box-shadow: 0 30px 80px rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255, 153, 0, 0.25);
    }
    .player-wrapper { 
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }
    #topCloseBtn { 
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      background: rgba(0,0,0,0.8);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: all 0.2s ease;
    }
    #topCloseBtn:hover {
      background: var(--primary);
      color: #000;
      transform: scale(1.1);
    }
    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      color: #ddd;
      background: #080a08;
      border-top: 1px solid rgba(255, 153, 0, 0.15);
    }
    .player-meta .meta-left { 
      width: 100%;
    }
    .player-meta h3 { 
      margin: 0;
      font-size: 1.125rem;
      font-family: 'Cinzel', serif;
      color: var(--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta p { 
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    /* Redesigned Primal Ranger Buttons */
    .btn {
      background: rgba(255, 153, 0, 0.03);
      border: 1px solid rgba(255, 153, 0, 0.4);
      color: var(--primary);
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      min-width: 60px;
      flex: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover { 
      background: var(--primary); 
      color: #050505;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(255, 153, 0, 0.45);
      transform: translateY(-1px);
    }
    .btn i {
      font-size: 0.95rem;
      transition: transform 0.2s ease;
    }
    .btn:hover i {
      transform: scale(1.1);
    }

    /* Responsive adjustments */
    @media (min-width: 768px) {
      .modal-card {
        width: 92%;
        height: auto;
        border-radius: 12px;
        max-height: 80vh;
      }
      .player-wrapper {
        padding-bottom: 56.25%;
        height: 0;
      }
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
      }
      .player-meta .meta-left {
        max-width: 65%;
      }
      .controls-row {
        flex-wrap: nowrap;
        justify-content: flex-end;
      }
      .btn {
        flex: 0;
        min-width: auto;
        padding: 8px 14px;
      }
      #topCloseBtn {
        opacity: 0;
      }
      .player-wrapper:hover #topCloseBtn {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .btn {
        padding: 10px;
        font-size: 0;
      }
      .btn i {
        font-size: 1.1rem;
        margin: 0 !important;
      }
    }

    /* DESKTOP FIXED OVERRIDE */
    @media (min-width: 768px) {
      .player-wrapper {
        padding-bottom: 0 !important;
        height: auto !important;
        max-height: 60vh !important;
        position: relative !important;
      }
      .player-wrapper video,
      .player-wrapper iframe {
        height: 100% !important;
        max-height: 60vh !important;
        position: relative !important;
      }
      .player-meta {
        position: relative !important;
        z-index: 100 !important;
        background: #080a08 !important;
        padding-top: 10px !important;
      }
      .controls-row {
        display: flex !important;
        flex-wrap: wrap !important;
        justify-content: center !important;
        gap: 12px !important;
      }
      .btn {
        min-width: 105px !important;
        padding: 10px 18px !important;
        flex: unset !important;
      }
      .modal-card {
        max-height: 85vh !important;
        overflow: visible !important;
      }
    }
</style>
</head>
<body class="relative">

<!-- Atmospheric Ember Particles Background -->
<div class="fixed inset-0 overflow-hidden -z-10">
  <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/95"></div>
  <div class="stars"></div>
  <div class="stars2"></div>
</div>

<div class="container mx-auto px-4 py-8 max-w-7xl">

  <!-- Full-Width Video Header with Dynamic Character Overlays -->
  <div class="video-banner-container relative w-full h-[280px] sm:h-[350px] md:h-[400px] lg:h-[480px] overflow-hidden rounded-2xl border border-yellow-900/30 shadow-2xl mb-12">
    
    <!-- Cinematic Wilderness Background Loop -->
    <iframe 
      src="https://www.youtube.com/embed/fbqo7T-XWQQ?autoplay=1&mute=1&loop=1&playlist=G9zD3GXPR6g&controls=0&modestbranding=1"

    <img

    <img 
      src="https://i.ebayimg.com/images/g/Ki8AAOSwG4dmZsEE/s-l1200.jpg"

    >

    <!-- Aesthetic Warning Label -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-30 text-center w-full max-w-md px-4 hidden sm:block">

  </div>

  <!-- Section Header -->
  <div class="flex items-center justify-between mb-8 border-b border-gray-900 pb-4">

  <!-- Movies Grid -->
  <div class="mb-12">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 justify-center" id="movies"></div>
  </div>

  <!-- Footer / Social -->
  <div class="border-t border-gray-900 mt-8 pt-6 text-center text-gray-500">
    <a href="#" class="text-gray-400 hover:text-yellow-500 transition px-2"><i class="fab fa-facebook-f"></i></a>
    <a href="#" class="text-gray-400 hover:text-yellow-500 transition px-2"><i class="fab fa-twitter"></i></a>
    <a href="https://www.instagram.com/stark_4152/reels" class="text-gray-400 hover:text-yellow-500 transition px-2"><i class="fab fa-instagram"></i></a>
    <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="text-gray-400 hover:text-yellow-500 transition px-2"><i class="fab fa-youtube"></i></a>
  </div>
</div>

<!-- === Elegant Tactical Media Modal === -->
<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" class="absolute top-4 right-4 z-10 bg-black/80 hover:bg-yellow-500 hover:text-black text-white rounded-full w-10 h-10 flex items-center justify-center transition">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <div class="player-meta">
      <div class="meta-left">
        <h3 id="modalTitle">Prehistoric Stream</h3>
        <p id="modalDesc" class="text-sm"></p>
      </div>
      <div class="controls-row">
        <button id="prevBtn" class="btn"><i class="fas fa-backward-step"></i>Prev</button>
        <button id="playPauseBtn" class="btn"><i class="fas fa-play"></i>Play</button>
        <button id="nextBtn" class="btn">Next<i class="fas fa-forward-step"></i></button>
        <button id="fullscreenBtn" class="btn"><i class="fas fa-expand"></i>Resize</button>
        <button id="muteBtn" class="btn"><i class="fas fa-volume-high"></i>Audio</button>
        <button id="closeBtn" class="btn"><i class="fas fa-circle-xmark text-red-500"></i>Eject</button>
      </div>
    </div>
  </div>
</div>

<script>
    /**********************************************
     * Accurate Jurassic Park/World Movies Array
     **********************************************/
    const movies = [
      { 
        title: "Jurassic Park", 
        video: "00", 
        image: "https://m.media-amazon.com/images/I/91XMXQCZwKL._AC_UF894,1000_QL80_.jpg", 
        category: "other", 
        year: 1993,
        duration: "2h 7m",
        description: "A pragmatic paleontologist touring an almost complete theme park on an island in Central America is tasked with protecting a couple of kids after a power failure causes the park's cloned dinosaurs to run loose."
      },
      { 
        title: "The Lost World: Jurassic Park", 
        video: "00", 
        image: "https://image.tmdb.org/t/p/original/z5DK9QjxxYhQD4LsHEt79caG0yF.jpg", 
        category: "other", 
        year: 1997,
        duration: "2h 9m",
        description: "A research team is sent to the Jurassic Park Site B island to study the dinosaurs there, while an InGen team approaches with another agenda: capturing the dinosaurs to bring them back to San Diego."
      },
      { 
        title: "Jurassic Park III", 
        video: "00", 
        image: "https://static0.moviewebimages.com/wordpress/wp-content/uploads/sharedimages/2025/01/01195861_poster_w780.jpg", 
        category: "other", 
        year: 2001,
        duration: "1h 32m",
        description: "A decidedly odd couple with ulterior motives convinces Dr. Alan Grant to conduct an aerial tour of Isla Sorna, resulting in an unexpected landing and introducing a terrifyingly agile new predator."
      },
      { 
        title: "Jurassic World", 
        video: "00", 
        image: "https://images.wall-art.de/format:webp/q:92/rs:fit:780:/_img/out/pictures/master/product/1/114154.jpg", 
        category: "other", 
        year: 2015,
        duration: "2h 4m",
        description: "A new theme park, built on the original site of Jurassic Park, creates a genetically modified hybrid dinosaur, the Indominus Rex, which escapes containment and goes on a killing spree."
      },
      { 
        title: "Jurassic World: Fallen Kingdom", 
        video: "00", 
        image: "https://flixpatrol.com/runtime/cache/files/posters/c/w350/c9xxwwhphdaima2f1wefesbhafb.jpg", 
        category: "other", 
        year: 2018,
        duration: "2h 8m",
        description: "When the island's dormant volcano begins roaring to life, Owen and Claire mount a campaign to rescue the remaining dinosaurs from an impending extinction-level event, only to stumble upon a global conspiracy."
      },
      { 
        title: "Jurassic World: Dominion", 
        video: "00", 
        image: "https://http2.mlstatic.com/D_NQ_NP_890755-MLC50179934590_062022-O.webp", 
        category: "other", 
        year: 2022,
        duration: "2h 27m",
        description: "Four years after the destruction of Isla Nublar, dinosaurs now live and hunt alongside humans all over the world. This fragile balance will reshape the future and determine once and for all whether human beings are to remain the dominant predators."
      },
      { 
        title: "Jurassic World: Rebirth", 
        video: "00", 
        image: "https://i.ebayimg.com/images/g/1ngAAOSwgVRoOyI6/s-l400.jpg", 
        category: "other", 
        year: 2025,
        duration: "2h 5m",
        description: "A skilled operations crew led by Zora Bennett races to secure vital genetic samples from the world's three most colossal dinosaur species surviving in isolated tropical sanctuaries."
      }
    ];

    /******************************
     * DOM refs for modal controls
     ******************************/
    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    /******************************
     * Type detection helpers
     ******************************/
    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    /******************************
     * Reset player container
     ******************************/
    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function showError(msg) {
      console.warn(msg);
    }

    /******************************
     * Core: open player logic
     ******************************/
    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) {
        showError('Invalid playback request');
        return;
      }
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];
      if (!movie) { showError('Movie missing'); return; }

      // metadata
      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || (movie.title || '');

      // reset & show
      resetPlayerContainer();
      showModal();

      // pick src
      let src = '';
      if (typeof movie.video === 'object' && movie.video !== null) {
        src = movie.video.high || movie.video.medium || movie.video.low || Object.values(movie.video)[0];
      } else {
        src = movie.video;
      }
      if (!src) {
        showError('No video source');
        setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=`, 500);
        return;
      }

      const lc = (src || '').toLowerCase();

      // iframe-hosted common hosts
      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('mega.nz') || lc.includes('openload') || lc.includes('drive.google.com')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        return;
      }

      // youtube
      if (isYouTube(src)) {
        let embed = src;
        try {
          if (src.includes('watch') && src.includes('v=')) {
            const v = new URLSearchParams(src.split('?')[1]).get('v');
            if (v) embed = `https://www.youtube.com/embed/${v}`;
          } else if (src.includes('youtu.be/')) {
            const p = src.split('youtu.be/')[1].split(/[?&]/)[0];
            if (p) embed = `https://www.youtube.com/embed/${p}`;
          }
        } catch (e) {}
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        return;
      }

      // HLS
      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) { showError('Video element missing'); return; }
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          try {
            currentHls.loadSource(src);
            currentHls.attachMedia(v);
          } catch (e) { console.warn('HLS attach error', e); }
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
          });
          currentHls.on(Hls.Events.ERROR, function(event, data) {
            console.warn('HLS error', data);
            if (data && data.fatal) {
              try { currentHls.destroy(); } catch(e){}
              currentHls = null;
              showError('HLS fatal error — redirecting to player.html');
              setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 700);
            }
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        } else {
          showError('HLS not supported — redirecting to player.html');
          setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 700);
        }
        return;
      }

      // MP4
      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) { window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`; return; }
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
        return;
      }

      // fallback
      window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`;
    }

    /******************************
     * Controls
     ******************************/
    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i>Pause';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play mr-2"></i>Play';
      }
    }
    function playNext() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return showError('No current video');
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
      else showError('No next video');
    }
    function playPrev() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return showError('No current video');
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
      else showError('No previous video');
    }
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=> showError('Fullscreen failed'));
      } else {
        document.exitFullscreen();
      }
    }
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-xmark text-red-500"></i> Muted' : '<i class="fas fa-volume-high"></i> Audio';
    }

    /******************************
     * Close modal & cleanup
     ******************************/
    function closeModalHandler() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      const v = document.getElementById(modalVideoId);
      if (v) {
        try { v.pause(); } catch(e){}
        try { v.removeAttribute('src'); v.load(); } catch(e){}
      }
      resetPlayerContainer();
      hideModal();
      currentIndex = null;
      currentFiltered = [];
      playPauseBtn.innerHTML = '<i class="fas fa-play mr-2"></i>Play';
    }

    /******************************
     * Events wiring
     ******************************/
    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);

    playbackModal.addEventListener('click', function(e){
      if (e.target === playbackModal) closeModalHandler();
    });

    // Escape & keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (!playbackModal.classList.contains('active')) return;
      switch (e.key.toLowerCase()) {
        case 'escape': closeModalHandler(); break;
        case ' ': e.preventDefault(); togglePlayPause(); break;
        case 'arrowright': { const v = document.getElementById(modalVideoId); if (v) v.currentTime = Math.max(0, v.currentTime + 10); break; }
        case 'arrowleft': { const v = document.getElementById(modalVideoId); if (v) v.currentTime = Math.max(0, v.currentTime - 10); break; }
        case 'f': toggleFullscreen(); break;
        case 'm': toggleMute(); break;
        case 'n': playNext(); break;
        case 'p': playPrev(); break;
      }
    });

    /******************************
     * Render movies and wire to openPlayer
     ******************************/
    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 5) * 100}`;

        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-xl overflow-hidden bg-gray-950 border border-yellow-950 hover:border-yellow-500/50 cursor-pointer relative group`;
        div.innerHTML = `
          <div class="relative overflow-hidden aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
              <button class="bg-[#ff9900] hover:bg-yellow-500 text-gray-950 font-black py-2 px-4 rounded-lg w-full text-xs tracking-wide uppercase transition transform hover:scale-105 shadow-lg shadow-yellow-500/10">
                <i class="fas fa-play mr-1.5"></i> Play
              </button>
            </div>
          </div>
          <div class="p-3 bg-gradient-to-b from-gray-950 to-black">
            <h3 class="font-bold text-xs text-gray-200 group-hover:text-yellow-500 transition-colors duration-200 truncate">${movie.title}</h3>
            <div class="flex justify-between items-center mt-1.5 text-[10px] text-gray-500">
              <span>${movie.year}</span>
              <span class="text-yellow-500 bg-yellow-950/40 px-1 rounded border border-yellow-900/30 font-bold uppercase">${movie.duration}</span>
            </div>
          </div>
        `;

        div.addEventListener('click', () => {
          openPlayer(moviesToRender, index);
        });

        container.appendChild(div);
      });
    }

    renderMovies(movies);

    /******************************
     * Floating Ember Particles
     ******************************/
    function createStars(container, count, sizeRange, durationRange) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'absolute rounded-full bg-yellow-600';

        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
        const duration = durationRange[0] + Math.random() * (durationRange[1] - durationRange[0]);

        star.style.left = `${left}%`;
        star.style.top = `${top}%`;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.opacity = Math.random() * 0.4 + 0.05;
        star.style.animation = `float ${duration}s infinite ease-in-out alternate`;
        star.style.animationDelay = `${Math.random() * 5}s`;

        container.appendChild(star);
      }
    }

    const starsContainer = document.querySelector('.stars');
    const starsContainer2 = document.querySelector('.stars2');
    if (starsContainer) createStars(starsContainer, 40, [1, 2], [6, 12]);
    if (starsContainer2) createStars(starsContainer2, 25, [2, 3], [10, 18]);

    // Floating animation
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes float {
        0% { transform: translateY(0) translateX(0); }
        100% { transform: translateY(-25px) translateX(12px); }
      }
    `;
    document.head.appendChild(style);
</script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"

if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";

}

/* =========================

========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
