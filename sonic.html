<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sonic Universe</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --blue:#00bfff;
  --yellow:#ffd000;
  --dark:#050816;
  --card:#10182a;
}

body{
  font-family:'Poppins',sans-serif;
  background:
  radial-gradient(circle at top,#122347 0%,#060b16 45%,#02040a 100%);
  color:white;
  overflow-x:hidden;
  min-height:100vh;
}

/* =========================
   STARS
========================= */

.stars{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
}

.star{
  position:absolute;
  background:white;
  border-radius:50%;
  animation:floatStar linear infinite;
}

@keyframes floatStar{
  from{
    transform:translateY(0px);
    opacity:.2;
  }
  50%{
    opacity:1;
  }
  to{
    transform:translateY(-120px);
    opacity:.2;
  }
}

/* =========================
   HERO
========================= */

.hero{
  position:relative;
  width:100%;
  height:92vh;
  overflow:hidden;
}

.hero iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  pointer-events:none;
  transform:scale(1.15);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
  linear-gradient(to top,#02040a 5%,transparent 40%),
  linear-gradient(to right,rgba(0,0,0,.65),rgba(0,0,0,.15));
}

.hero-content{
  position:relative;
  z-index:5;
  height:100%;
  display:flex;
  align-items:center;
  padding:8%;
}

.logo{
  width:420px;
  max-width:90%;
  animation:floatLogo 3s ease-in-out infinite;
  filter:
  drop-shadow(0 0 8px #00bfff)
  drop-shadow(0 0 20px #00bfff);
}

@keyframes floatLogo{
  0%,100%{
    transform:translateY(0px);
  }
  50%{
    transform:translateY(-10px);
  }
}

.hero-text{
  margin-top:25px;
  max-width:650px;
}

.hero-text h1{
  font-size:4rem;
  font-weight:800;
  line-height:1;
  margin-bottom:15px;
}

.gradient{
  background:linear-gradient(90deg,#00bfff,#ffd000);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero-text p{
  color:#d1d5db;
  line-height:1.8;
  margin-bottom:28px;
}

.hero-buttons{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.hero-btn{
  padding:14px 26px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-weight:700;
  transition:.3s;
}

.hero-btn-primary{
  background:linear-gradient(90deg,#ffd000,#ffae00);
  color:#111;
}

.hero-btn-secondary{
  background:rgba(255,255,255,.08);
  color:white;
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
}

.hero-btn:hover{
  transform:translateY(-4px) scale(1.03);
}

/* =========================
   SECTION
========================= */

.section{
  max-width:1400px;
  margin:auto;
  padding:70px 25px;
}

.section-title{
  font-size:2.3rem;
  font-weight:800;
  margin-bottom:40px;
  display:flex;
  align-items:center;
  gap:14px;
}

.section-title i{
  color:var(--yellow);
}

/* =========================
   SEARCH
========================= */

.search-wrap{
  margin-bottom:40px;
  position:relative;
}

.search{
  width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  height:60px;
  border-radius:18px;
  padding:0 60px 0 22px;
  color:white;
  font-size:1rem;
  outline:none;
  backdrop-filter:blur(12px);
}

.search:focus{
  border-color:#00bfff;
  box-shadow:0 0 20px rgba(0,191,255,.3);
}

.search-icon{
  position:absolute;
  right:22px;
  top:50%;
  transform:translateY(-50%);
  color:#9ca3af;
}

/* =========================
   MOVIES GRID
========================= */

.movies-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:30px;
}

.card{
  position:relative;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.06);
  border-radius:28px;
  overflow:hidden;
  transition:.4s;
  cursor:pointer;
  backdrop-filter:blur(12px);
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:
  0 15px 40px rgba(0,191,255,.2),
  0 0 25px rgba(255,208,0,.15);
}

.poster-wrap{
  position:relative;
  overflow:hidden;
}

.poster{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  transition:.6s;
}

.card:hover .poster{
  transform:scale(1.08);
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.95),transparent 55%);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  opacity:0;
  transition:.4s;
  padding-bottom:25px;
}

.card:hover .overlay{
  opacity:1;
}

.play-btn{
  width:72px;
  height:72px;
  border-radius:50%;
  border:none;
  background:linear-gradient(90deg,#00bfff,#0095ff);
  color:white;
  font-size:1.3rem;
  cursor:pointer;
  transition:.3s;
}

.play-btn:hover{
  transform:scale(1.12);
}

.card-content{
  padding:20px;
}

.card-title{
  font-size:1.15rem;
  font-weight:700;
  margin-bottom:12px;
}

.meta{
  display:flex;
  justify-content:space-between;
  color:#9ca3af;
  font-size:.9rem;
}

/* =========================
   MODAL
========================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}

.modal.active{
  display:flex;
}

.modal-card{
  width:100%;
  max-width:1250px;
  background:#08111f;
  border-radius:28px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 25px 80px rgba(0,0,0,.6);
}

.player{
  position:relative;
  background:black;
  aspect-ratio:16/9;
}

.player video,
.player iframe{
  width:100%;
  height:100%;
  border:none;
}

.close-top{
  position:absolute;
  top:18px;
  right:18px;
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.7);
  color:white;
  cursor:pointer;
  z-index:20;
  font-size:1.1rem;
}

.modal-content{
  padding:24px;
}

.modal-title{
  font-size:2rem;
  font-weight:800;
  margin-bottom:10px;
}

.modal-desc{
  color:#9ca3af;
  line-height:1.8;
  margin-bottom:25px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.control-btn{
  border:none;
  padding:14px 18px;
  border-radius:14px;
  background:rgba(255,255,255,.06);
  color:white;
  cursor:pointer;
  transition:.3s;
  font-weight:600;
}

.control-btn:hover{
  background:#00bfff;
  transform:translateY(-2px);
}

/* =========================
   FOOTER
========================= */

.footer{
  border-top:1px solid rgba(255,255,255,.08);
  padding:40px 20px;
  text-align:center;
  color:#9ca3af;
}

.socials{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:16px;
}

.socials a{
  width:45px;
  height:45px;
  border-radius:50%;
  background:rgba(255,255,255,.05);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  transition:.3s;
}

.socials a:hover{
  background:#00bfff;
  transform:translateY(-4px);
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  .hero{
    height:80vh;
  }

  .hero iframe{
    transform:scale(1.6);
  }

  .hero-text h1{
    font-size:2.5rem;
  }

  .section-title{
    font-size:1.7rem;
  }

  .modal-content{
    padding:18px;
  }

  .modal-title{
    font-size:1.5rem;
  }

}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<!-- HERO -->
<section class="hero">

  <iframe
    src="https://www.youtube.com/embed/nb_fFj_0rq8?autoplay=1&mute=1&controls=0&loop=1&playlist=LmurwU1K8sE"
    allow="autoplay"
  ></iframe>

  <div class="hero-content">

    <div>

      <img
        class="logo"
        src="https://www.pngplay.com/wp-content/uploads/11/Sonic-The-Hedgehog-Logo-PNG-Photos.png"
      >

      <div class="hero-text">

        <h1>
          Welcome To The
          <span class="gradient">Sonic Universe</span>
        </h1>

        <p>
          Watch all Sonic the Hedgehog movies in one cinematic streaming experience.
          Fast. Stylish. Modern. Built with an upgraded Netflix-style UI and immersive fullscreen player.
        </p>

        <div class="hero-buttons">

          <button class="hero-btn hero-btn-primary" onclick="scrollToMovies()">
            <i class="fas fa-play"></i> Watch Movies
          </button>

          <button class="hero-btn hero-btn-secondary">
            <i class="fas fa-bolt"></i> Sonic Collection
          </button>

        </div>

      </div>

    </div>

  </div>

</section>

<!-- MOVIES -->
<section class="section" id="moviesSection">

  <h2 class="section-title">
    <i class="fas fa-film"></i>
    Sonic Movie Collection
  </h2>

  <div class="search-wrap">

    <input
      type="text"
      class="search"
      id="search"
      placeholder="Search Sonic movies..."
    >

    <i class="fas fa-search search-icon"></i>

  </div>

  <div class="movies-grid" id="moviesGrid"></div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">

  <div class="modal-card">

    <div class="player" id="player">

      <video
        id="video"
        controls
        playsinline
      ></video>

      <button class="close-top" id="closeTop">
        <i class="fas fa-times"></i>
      </button>

    </div>

    <div class="modal-content">

      <h2 class="modal-title" id="modalTitle"></h2>

      <p class="modal-desc" id="modalDesc"></p>

      <div class="controls">

        <button class="control-btn" id="prevBtn">
          <i class="fas fa-backward"></i> Prev
        </button>

        <button class="control-btn" id="playBtn">
          <i class="fas fa-play"></i> Play
        </button>

        <button class="control-btn" id="nextBtn">
          Next <i class="fas fa-forward"></i>
        </button>

        <button class="control-btn" id="muteBtn">
          <i class="fas fa-volume-up"></i>
        </button>

        <button class="control-btn" id="fullBtn">
          <i class="fas fa-expand"></i>
        </button>

        <button class="control-btn" id="closeBtn">
          <i class="fas fa-times"></i>
        </button>

      </div>

    </div>

  </div>

</div>

<!-- FOOTER -->
<footer class="footer">

  <p>© 2026 Sonic Universe Streaming Experience</p>

  <div class="socials">

    <a href="#"><i class="fab fa-facebook-f"></i></a>

    <a href="#"><i class="fab fa-twitter"></i></a>

    <a href="https://www.instagram.com/stark_4152/reels">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g">
      <i class="fab fa-youtube"></i>
    </a>

  </div>

</footer>

<script>

/* =========================
   STARS
========================= */

const starsContainer = document.getElementById("stars");

for(let i=0;i<120;i++){

  const star=document.createElement("div");

  star.className="star";

  star.style.left=Math.random()*100+"%";
  star.style.top=Math.random()*100+"%";

  const size=Math.random()*3+"px";

  star.style.width=size;
  star.style.height=size;

  star.style.animationDuration=
  5+Math.random()*12+"s";

  star.style.animationDelay=
  Math.random()*5+"s";

  starsContainer.appendChild(star);
}

/* =========================
   MOVIES
========================= */

const movies=[

{
title:"Sonic the Hedgehog",
year:"2020",
image:"https://image.tmdb.org/t/p/w780/aQvJ5WPzZgYVDrxLX4R6cLJCEaQ.jpg",
description:"Sonic teams up with Tom to stop Dr. Robotnik and save the planet.",
video:"https://storrrrrrm.site/stream/0ef043d09a6a27e5/master.m3u8"
},

{
title:"Sonic the Hedgehog 2",
year:"2022",
image:"https://image.tmdb.org/t/p/w780/6DrHO1jr3qVrViUO6s6kFiAGM7.jpg",
description:"Sonic and Tails unite against Robotnik and Knuckles.",
video:"https://mega.nz/embed/vnwnzCZB#EXb896RAIHwCvsoa-PAAtZENqjTiZVDFcoKeCR1uOFs"
},

{
title:"Sonic the Hedgehog 3",
year:"2024",
image:"https://image.tmdb.org/t/p/w780/d8Ryb8AunYAuycVKDp5HpdWPKgC.jpg",
description:"Shadow arrives as Sonic faces his biggest battle yet.",
video:"https://mega.nz/embed/iqgVEKJJ#lYBP-tDPYEwms2LIasag3O5OY2xsiIyqPcjkrCdhV9E"
}

];

const grid=document.getElementById("moviesGrid");

function renderMovies(data){

grid.innerHTML="";

data.forEach((movie,index)=>{

grid.innerHTML+=`

<div class="card" onclick="openMovie(${index})">

<div class="poster-wrap">

<img class="poster" src="${movie.image}">

<div class="overlay">

<button class="play-btn">
<i class="fas fa-play"></i>
</button>

</div>

</div>

<div class="card-content">

<h3 class="card-title">${movie.title}</h3>

<div class="meta">

<span>${movie.year}</span>

<span><i class="fas fa-star"></i> 9.${index+1}</span>

</div>

</div>

</div>

`;

});

}

renderMovies(movies);

/* =========================
   SEARCH
========================= */

document.getElementById("search")
.addEventListener("input",e=>{

const value=e.target.value.toLowerCase();

const filtered=movies.filter(movie=>
movie.title.toLowerCase().includes(value)
);

renderMovies(filtered);

});

/* =========================
   MODAL PLAYER
========================= */

const modal=document.getElementById("modal");
const player=document.getElementById("player");

const video=document.getElementById("video");

const modalTitle=document.getElementById("modalTitle");
const modalDesc=document.getElementById("modalDesc");

let currentIndex=0;
let hls=null;

function openMovie(index){

currentIndex=index;

const movie=movies[index];

modal.classList.add("active");

modalTitle.textContent=movie.title;
modalDesc.textContent=movie.description;

loadVideo(movie.video);

}

function loadVideo(src){

if(hls){
hls.destroy();
}

player.innerHTML=`
<video id="video" controls playsinline></video>

<button class="close-top" id="closeTop">
<i class="fas fa-times"></i>
</button>
`;

const v=document.getElementById("video");

document.getElementById("closeTop")
.addEventListener("click",closeModal);

if(src.includes("mega.nz")){

player.innerHTML=`

<iframe
src="${src}"
allowfullscreen
allow="autoplay; encrypted-media">
</iframe>

<button class="close-top" id="closeTop">
<i class="fas fa-times"></i>
</button>

`;

document.getElementById("closeTop")
.addEventListener("click",closeModal);

return;
}

if(Hls.isSupported() && src.includes(".m3u8")){

hls=new Hls();

hls.loadSource(src);

hls.attachMedia(v);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
v.play();
});

}
else{

v.src=src;

v.play();

}

}

/* =========================
   CONTROLS
========================= */

document.getElementById("closeBtn")
.addEventListener("click",closeModal);

function closeModal(){

modal.classList.remove("active");

if(hls){
hls.destroy();
}

const v=document.getElementById("video");

if(v){
v.pause();
}

}

document.getElementById("playBtn")
.addEventListener("click",()=>{

const v=document.getElementById("video");

if(!v) return;

if(v.paused){
v.play();
}
else{
v.pause();
}

});

document.getElementById("muteBtn")
.addEventListener("click",()=>{

const v=document.getElementById("video");

if(!v) return;

v.muted=!v.muted;

});

document.getElementById("fullBtn")
.addEventListener("click",()=>{

const el=
document.getElementById("video")
||
player.querySelector("iframe");

if(el.requestFullscreen){
el.requestFullscreen();
}

});

document.getElementById("nextBtn")
.addEventListener("click",()=>{

currentIndex++;

if(currentIndex>=movies.length){
currentIndex=0;
}

openMovie(currentIndex);

});

document.getElementById("prevBtn")
.addEventListener("click",()=>{

currentIndex--;

if(currentIndex<0){
currentIndex=movies.length-1;
}

openMovie(currentIndex);

});

/* =========================
   ESC CLOSE
========================= */

document.addEventListener("keydown",e=>{

if(e.key==="Escape"){
closeModal();
}

});

/* =========================
   SCROLL
========================= */

function scrollToMovies(){

document.getElementById("moviesSection")
.scrollIntoView({
behavior:"smooth"
});

}

</script>

    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>

<style>
html, body {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    overflow-x: hidden;
}

/* Disable image dragging */
img {
    pointer-events: none;
    -webkit-user-drag: none;
}

/* Hide selection */
::selection {
    background: transparent;
}
</style>
