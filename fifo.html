<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Cloud TV | Watch Live Streams & Top Channels</title>
    <meta name="description" content="Watch high-quality live streams and top channels for free from around the world on Cloud TV.">
    <meta name="keywords" content="live tv, cloud tv, free live streams, m3u8 player">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Cloud TV | Watch Live Streams & Top Channels">
    <meta property="og:description" content="Stream your favorite live events and world-class TV channels in HD quality for free on Cloud TV.">
    <meta property="og:site_name" content="Cloud TV">
    <meta name="twitter:card" content="summary_large_image">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://ssl.p.jwpcdn.com/player/v/8.48.3/jwplayer.js"></script>
    <script>jwplayer.key = "jTL7dlu7ybUI5NZnDdVgb1laM8/Hj3ftIJ5Vqg==";</script> 
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .dark .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        html { scroll-behavior: smooth; }
        
        .fade-in-page {
            animation: fadeInPageEffect 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeInPageEffect {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans antialiased transition-colors duration-300">

    <header id="main-header" class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800/80 sticky top-0 z-50 shadow-sm transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="https://static.readdy.ai/image/0ece273271e400e488b9947cb1e99e9a/a79b6f32c71c4ee2094ead0eb9c84c9b.png" alt="Cloud TV Logo" class="h-8 w-auto object-contain">
                <h1 class="text-xl font-black tracking-wider text-indigo-600 dark:text-white uppercase">Cloud <span class="text-slate-800 dark:text-indigo-400">TV</span></h1>
            </div>
            <nav class="hidden md:flex space-x-6 text-xs font-bold text-slate-600 dark:text-slate-300">
                <a href="/" class="hover:text-indigo-500 dark:hover:text-indigo-400 transition">Home</a>
                <a href="#" class="text-indigo-500 dark:hover:text-indigo-400">Live Streaming</a>
            </nav>
           
            <div class="flex items-center space-x-3">
                <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all duration-200 shadow-sm border border-slate-200/60 dark:border-slate-700 text-sm flex items-center justify-center" title="Toggle Theme" id="theme-toggle-btn">
                    <svg id="theme-icon-light" class="w-4 h-4 text-slate-700 block dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"></path>
                    </svg>
                    <svg id="theme-icon-dark" class="w-4 h-4 text-amber-400 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14.25 12a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="fade-in-page max-w-7xl mx-auto px-3 md:px-4 py-4 md:py-6 grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6 items-start opacity-0">
        <div id="video-player-container" class="lg:col-span-2 space-y-4">
            <div class="bg-slate-950 rounded-xl overflow-hidden shadow-xl border border-slate-900 aspect-video relative">
                <div id="player-placeholder" class="w-full h-full absolute top-0 left-0 flex flex-col items-center justify-center bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-indigo-900/80 via-slate-950 to-black z-10 p-4 md:p-6 text-center select-none overflow-hidden">
                    <h2 class="text-xl md:text-3xl font-black tracking-wide md:tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-200 via-indigo-400 to-indigo-200 uppercase mb-1.5 md:mb-2 drop-shadow-lg leading-tight">Ready to Watch?</h2>
                    <p class="text-slate-300 text-[11px] md:text-sm mt-1 max-w-[280px] md:max-w-sm mx-auto font-medium leading-relaxed bg-black/40 px-3 py-1.5 md:px-4 md:py-2 rounded-xl backdrop-blur-sm border border-white/5">Select a live channel below to start streaming.</p>
                </div>

                <div id="player-wrapper" class="w-full h-full hidden">
                    <div id="player" class="w-full h-full"></div>
                </div>
                <iframe id="iframe-player" class="hidden w-full h-full absolute top-0 left-0 border-0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            
            <div id="channel-info-box" style="display: none;" class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 shadow-sm transition-colors duration-300">
                <div>
                    <h2 class="text-lg font-extrabold md:text-xl tracking-tight text-slate-800 dark:text-white" id="current-channel-title">No Channel Selected</h2>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm sticky top-20 transition-colors duration-300">
            <div class="bg-slate-50 dark:bg-slate-800/50 px-4 py-3.5 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center space-x-2">
                    <span class="text-xl">📺</span>
                    <h3 class="text-sm font-extrabold tracking-wider text-slate-700 dark:text-slate-200 uppercase">Live Broadcasts</h3>
                </div>
            </div>
            <div id="channel-list-container" class="p-3 grid grid-cols-1 gap-2 max-h-[780px] overflow-y-auto custom-scrollbar bg-slate-50/30 dark:bg-slate-950/20">
                </div>
        </div>
    </main>

    <script>
        // Channel Data Configuration
        const channels = {
            "bioscope": { "title": "Bioscope+", "type": "iframe", "source": "https://pipb.xyz/embed/bioscope.php" },
            "trt1": { "title": "TRT 1", "type": "iframe", "source": "https://pipb.xyz/embed/trt1.php" },
            "eltasports": { "title": "ELTA Sports", "type": "iframe", "source": "https://pipb.xyz/embed/eltasports.php" },
            "cctv5": { "title": "CCTV 5", "type": "iframe", "source": "https://pipb.xyz/embed/cctv5.php" },
            "ch01": { "title": "Channel 01", "type": "iframe", "source": "https://pipb.xyz/embed/ch01.php" },
            "ch02": { "title": "Channel 02", "type": "iframe", "source": "https://pipb.xyz/embed/ch02.php" },
            "ch03": { "title": "Channel 03", "type": "iframe", "source": "https://pipb.xyz/embed/ch03.php" },
            "ch04": { "title": "Channel 04", "type": "iframe", "source": "https://pipb.xyz/embed/ch04.php" },
            "ch05": { "title": "Channel 05", "type": "iframe", "source": "https://pipb.xyz/embed/ch05.php" },
            "ch06": { "title": "Channel 06", "type": "iframe", "source": "https://pipb.xyz/embed/ch06.php" }
        };

        let activePlayer = null;

        document.addEventListener("DOMContentLoaded", function() {
            document.querySelector('main').classList.remove('opacity-0');
            renderChannelList();
        });

        function renderChannelList() {
            const container = document.getElementById("channel-list-container");
            container.innerHTML = "";
            
            Object.keys(channels).forEach(key => {
                const chan = channels[key];
                const btn = document.createElement("button");
                btn.className = "w-full flex items-center p-3 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800/80 rounded-xl border border-slate-200 dark:border-slate-800 text-left transition shadow-sm";
                btn.onclick = () => playChannel(key);
                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-indigo-500 text-white flex items-center justify-center font-bold text-xs">▶</div>
                    <div class="ml-3"><p class="font-bold text-sm text-slate-800 dark:text-slate-100">${chan.title}</p></div>
                `;
                container.appendChild(btn);
            });
        }

        function playChannel(id) {
            const channel = channels[id];
            if (!channel) return;

            document.getElementById("player-placeholder").classList.add("hidden");
            document.getElementById("channel-info-box").style.display = "flex";
            document.getElementById("current-channel-title").innerText = channel.title;

            const jwWrapper = document.getElementById("player-wrapper");
            const iframePlayer = document.getElementById("iframe-player");

            if (channel.type === "jw") {
                iframePlayer.classList.add("hidden");
                iframePlayer.src = "";
                jwWrapper.classList.remove("hidden");
                
                if (activePlayer) {
                    activePlayer.load([{ file: channel.source }]);
                    activePlayer.play();
                } else {
                    activePlayer = jwplayer("player").setup({
                        file: channel.source,
                        width: "100%",
                        height: "100%",
                        autostart: true
                    });
                }
            } else if (channel.type === "iframe") {
                if (activePlayer) {
                    activePlayer.remove();
                    activePlayer = null;
                }
                jwWrapper.classList.add("hidden");
                iframePlayer.classList.remove("hidden");
                iframePlayer.src = channel.source;
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
</body>
</html>
