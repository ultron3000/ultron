<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Hellboy Collection</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

:root{
  --primary:#d62828;
  --secondary:#0f172a;
  --accent:#ffb703;
  --card:#1e293b;
  --text:#ffffff;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at top,#4a0404 0%,#130707 35%,#020202 100%);
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar{
  width:8px;
}
::-webkit-scrollbar-track{
  background:#111;
}
::-webkit-scrollbar-thumb{
  background:var(--primary);
  border-radius:10px;
}

/* BACKGROUND EFFECT */
.bg-fire{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-1;
}

.fire{
  position:absolute;
  width:8px;
  height:8px;
  background:#ff4500;
  border-radius:50%;
  opacity:.4;
  animation:floatFire linear infinite;
}

@keyframes floatFire{
  from{
    transform:translateY(100vh) scale(0.2);
    opacity:0;
  }
  10%{
    opacity:.6;
  }
  to{
    transform:translateY(-100px) scale(1.5);
    opacity:0;
  }
}

/* HERO */
.hero{
  position:relative;
  width:100%;
  height:500px;
  overflow:hidden;
}

.hero iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

.hero-overlay{
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top,#000 5%,transparent 40%,rgba(0,0,0,.4));
}

.hero-content{
  position:absolute;
  left:6%;
  bottom:10%;
  z-index:5;
  max-width:700px;
}

.hero-logo{
  width:280px;
  margin-bottom:20px;
  filter:drop-shadow(0 0 12px rgba(255,0,0,.8));
  animation:pulseLogo 3s ease infinite;
}

@keyframes pulseLogo{
  0%,100%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.04);
  }
}

.hero-title{
  font-size:3rem;
  font-weight:800;
  margin-bottom:12px;
  text-shadow:0 0 25px rgba(255,0,0,.8);
}

.hero-desc{
  color:#d1d5db;
  line-height:1.8;
  font-size:1rem;
  margin-bottom:24px;
}

.hero-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(135deg,#d62828,#ff4d4d);
  color:white;
  padding:14px 24px;
  border-radius:50px;
  font-weight:700;
  transition:.3s;
  box-shadow:0 0 20px rgba(255,0,0,.5);
}

.hero-btn:hover{
  transform:translateY(-3px) scale(1.03);
}

/* SECTION */
.section{
  padding:50px 5%;
}

.section-title{
  font-size:2rem;
  font-weight:800;
  margin-bottom:30px;
  color:#fff;
  display:flex;
  align-items:center;
  gap:12px;
}

.section-title i{
  color:var(--primary);
}

/* GRID */
.movies-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:28px;
}

/* CARD */
.movie-card{
  position:relative;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:.4s;
  backdrop-filter:blur(10px);
}

.movie-card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 20px 50px rgba(255,0,0,.35);
}

.movie-poster{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  transition:.5s;
}

.movie-card:hover .movie-poster{
  transform:scale(1.08);
}

.card-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.95),transparent 60%);
}

.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(.8);
  width:72px;
  height:72px;
  border-radius:50%;
  background:rgba(214,40,40,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:1.6rem;
  opacity:0;
  transition:.35s;
  box-shadow:0 0 25px rgba(255,0,0,.7);
}

.movie-card:hover .play-btn{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.movie-info{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  padding:18px;
  z-index:5;
}

.movie-title{
  font-size:1rem;
  font-weight:700;
  margin-bottom:8px;
}

.movie-meta{
  display:flex;
  justify-content:space-between;
  color:#d1d5db;
  font-size:.85rem;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}

.modal.active{
  display:flex;
}

.modal-content{
  width:100%;
  max-width:1100px;
  background:#090909;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 50px rgba(255,0,0,.3);
}

.player-wrapper{
  position:relative;
  width:100%;
  background:black;
  aspect-ratio:16/9;
}

.player-wrapper video,
.player-wrapper iframe{
  width:100%;
  height:100%;
}

.close-x{
  position:absolute;
  top:15px;
  right:15px;
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.7);
  color:white;
  cursor:pointer;
  z-index:10;
  font-size:1rem;
}

.modal-bottom{
  padding:20px;
}

.modal-title{
  font-size:1.5rem;
  font-weight:700;
  margin-bottom:8px;
}

.modal-description{
  color:#cbd5e1;
  margin-bottom:20px;
  line-height:1.7;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.control-btn{
  border:none;
  background:#1f2937;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
  font-weight:600;
}

.control-btn:hover{
  background:var(--primary);
}

/* FOOTER */
footer{
  margin-top:50px;
  padding:30px;
  border-top:1px solid rgba(255,255,255,.08);
  text-align:center;
}

.socials{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:15px;
}

.socials a{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#151515;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.3s;
  text-decoration:none;
}

.socials a:hover{
  background:var(--primary);
  transform:translateY(-5px);
}

/* MOBILE */
@media(max-width:768px){

  .hero{
    height:400px;
  }

  .hero-content{
    left:20px;
    right:20px;
    bottom:30px;
  }

  .hero-title{
    font-size:2rem;
  }

  .hero-logo{
    width:180px;
  }

  .section-title{
    font-size:1.5rem;
  }

  .movies-grid{
    grid-template-columns:repeat(2,1fr);
    gap:18px;
  }

  .modal-content{
    border-radius:0;
    height:100%;
    max-width:none;
  }

  .player-wrapper{
    aspect-ratio:auto;
    height:38vh;
  }

  .controls{
    justify-content:center;
  }

  .control-btn{
    flex:1;
    min-width:120px;
  }
}
</style>
</head>

<body>

<!-- FIRE BACKGROUND -->
<div class="bg-fire" id="fireBg"></div>

<!-- HERO -->
<section class="hero">

  <iframe
    src="https://www.youtube.com/embed/FphzzDHFbyM?autoplay=1&mute=1&loop=1&playlist=FphzzDHFbyM&controls=0&showinfo=0&modestbranding=1"
    frameborder="0"
    allow="autoplay"
  ></iframe>

  <div class="hero-overlay"></div>

  <div class="hero-content">

    <img
      class="hero-logo"
      src="https://upload.wikimedia.org/wikipedia/commons/7/7d/Hellboy_movie_logo.png"
      alt="Hellboy Logo"
    >

    <h1 class="hero-title">Hellboy Movie Collection</h1>

    <p class="hero-desc">
      Enter the supernatural world of Hellboy — demons, monsters,
      ancient prophecies, and brutal battles against darkness.
      Watch every Hellboy movie in one premium cinematic experience.
    </p>

    <a href="#moviesSection" class="hero-btn">
      <i class="fas fa-play"></i>
      Start Watching
    </a>

  </div>
</section>

<!-- MOVIES -->
<section class="section" id="moviesSection">

  <h2 class="section-title">
    <i class="fas fa-fire"></i>
    Hellboy Movies
  </h2>

  <div class="movies-grid" id="moviesGrid"></div>

</section>

<!-- FOOTER -->
<footer>

  <h3>HELLBOY UNIVERSE</h3>

  <div class="socials">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-twitter"></i></a>
    <a href="https://www.instagram.com/stark_4152/reels"><i class="fab fa-instagram"></i></a>
    <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g"><i class="fab fa-youtube"></i></a>
  </div>

</footer>

<!-- MODAL -->
<div class="modal" id="modal">

  <div class="modal-content">

    <div class="player-wrapper" id="playerWrapper">

      <video id="videoPlayer" controls playsinline></video>

      <button class="close-x" id="closeModal">
        <i class="fas fa-times"></i>
      </button>

    </div>

    <div class="modal-bottom">

      <h2 class="modal-title" id="modalTitle"></h2>

      <p class="modal-description" id="modalDesc"></p>

      <div class="controls">

        <button class="control-btn" id="prevBtn">
          <i class="fas fa-backward"></i> Prev
        </button>

        <button class="control-btn" id="playPauseBtn">
          <i class="fas fa-play"></i> Play
        </button>

        <button class="control-btn" id="nextBtn">
          Next <i class="fas fa-forward"></i>
        </button>

        <button class="control-btn" id="fullscreenBtn">
          <i class="fas fa-expand"></i> Fullscreen
        </button>

        <button class="control-btn" id="muteBtn">
          <i class="fas fa-volume-up"></i> Mute
        </button>

      </div>

    </div>

  </div>

</div>

<script>
/* MOVIES */
const movies = [

{
  title:"Hellboy (2004)",
  year:"2004",
  description:"Hellboy battles dark supernatural forces after being summoned from Hell during World War II.",
  image:"https://image.tmdb.org/t/p/original/hjblR6bPZR0PvFwztHcEBCjYf7d.jpg",
  video:"https://mega.nz/embed/t3MVAbCJ#XiW4sIwArWg0UDEphIFk8Yj9nL6vAvAdSyiECEFK1N8"
},

{
  title:"Hellboy II: The Golden Army (2008)",
  year:"2008",
  description:"Hellboy and the BPRD fight an unstoppable mythical army threatening humanity.",
  image:"https://image.tmdb.org/t/p/w342/zO0Wdrxnhx3KoJEvychSmnY3urC.jpg",
  video:"https://storrrrrrm.site/stream/8f4347964a60b2f6/master.m3u8"
},

{
  title:"Hellboy (2019)",
  year:"2019",
  description:"Hellboy faces Nimue the Blood Queen in a brutal apocalyptic battle.",
  image:"https://i.ebayimg.com/images/g/ZIIAAOSwcOdi~OLn/s-l1200.jpg",
  video:"https://spok.solariaarchitecture.cyou/v4/us/inz5w/index-f1-v1-a1.txt"
},

{
  title:"Hellboy: The Crooked Man (2024)",
  year:"2024",
  description:"Hellboy encounters dark witchcraft and demonic horrors in the Appalachian mountains.",
  image:"https://i.ebayimg.com/images/g/JXwAAOSwN5pm5GPS/s-l400.jpg",
  video:"https://sojg.stellarforgeinnovation.online/v4/pq/kjwnj/cf-master.txt?v=1729422650"
}

];

/* DOM */
const moviesGrid = document.getElementById("moviesGrid");
const modal = document.getElementById("modal");
const playerWrapper = document.getElementById("playerWrapper");
const videoPlayer = document.getElementById("videoPlayer");

const modalTitle = document.getElementById("modalTitle");
const modalDesc = document.getElementById("modalDesc");

const playPauseBtn = document.getElementById("playPauseBtn");
const muteBtn = document.getElementById("muteBtn");

let currentIndex = 0;
let currentHls = null;

/* RENDER MOVIES */
function renderMovies(){

  moviesGrid.innerHTML = "";

  movies.forEach((movie,index)=>{

    const card = document.createElement("div");

    card.className = "movie-card";

    card.innerHTML = `
      <img src="${movie.image}" class="movie-poster">

      <div class="card-overlay"></div>

      <div class="play-btn">
        <i class="fas fa-play"></i>
      </div>

      <div class="movie-info">

        <div class="movie-title">${movie.title}</div>

        <div class="movie-meta">
          <span>${movie.year}</span>
          <span>Movie</span>
        </div>

      </div>
    `;

    card.addEventListener("click",()=>{
      openMovie(index);
    });

    moviesGrid.appendChild(card);

  });

}

renderMovies();

/* HELPERS */
function isHLS(url){
  return url.includes(".m3u8") ||
         url.includes("master") ||
         url.includes("index");
}

function isIframe(url){
  return url.includes("mega.nz") ||
         url.includes("drive.google") ||
         url.includes("streamtape") ||
         url.includes("dood");
}

/* OPEN MOVIE */
function openMovie(index){

  currentIndex = index;

  const movie = movies[index];

  modal.classList.add("active");

  modalTitle.textContent = movie.title;
  modalDesc.textContent = movie.description;

  if(currentHls){
    currentHls.destroy();
    currentHls = null;
  }

  playerWrapper.innerHTML = `
    <video id="videoPlayer" controls playsinline></video>

    <button class="close-x" id="closeModal">
      <i class="fas fa-times"></i>
    </button>
  `;

  const player = document.getElementById("videoPlayer");

  document.getElementById("closeModal")
    .addEventListener("click",closeModal);

  const src = movie.video;

  /* IFRAME */
  if(isIframe(src)){

    playerWrapper.innerHTML = `
      <iframe
        src="${src}"
        frameborder="0"
        allowfullscreen
        allow="autoplay; encrypted-media"
      ></iframe>

      <button class="close-x" id="closeModal">
        <i class="fas fa-times"></i>
      </button>
    `;

    document.getElementById("closeModal")
      .addEventListener("click",closeModal);

    return;
  }

  /* HLS */
  if(isHLS(src)){

    if(Hls.isSupported()){

      currentHls = new Hls();

      currentHls.loadSource(src);

      currentHls.attachMedia(player);

      currentHls.on(Hls.Events.MANIFEST_PARSED,function(){

        player.play();

        playPauseBtn.innerHTML =
          '<i class="fas fa-pause"></i> Pause';

      });

    }else{

      player.src = src;

      player.play();

    }

    return;
  }

  /* MP4 */
  player.src = src;

  player.play();

}

/* CLOSE */
function closeModal(){

  modal.classList.remove("active");

  if(currentHls){
    currentHls.destroy();
    currentHls = null;
  }

  const player = document.getElementById("videoPlayer");

  if(player){

    player.pause();

    player.removeAttribute("src");

    player.load();

  }

}

/* PLAY/PAUSE */
playPauseBtn.addEventListener("click",()=>{

  const player = document.getElementById("videoPlayer");

  if(!player) return;

  if(player.paused){

    player.play();

    playPauseBtn.innerHTML =
      '<i class="fas fa-pause"></i> Pause';

  }else{

    player.pause();

    playPauseBtn.innerHTML =
      '<i class="fas fa-play"></i> Play';

  }

});

/* NEXT */
document.getElementById("nextBtn")
.addEventListener("click",()=>{

  currentIndex++;

  if(currentIndex >= movies.length){
    currentIndex = 0;
  }

  openMovie(currentIndex);

});

/* PREV */
document.getElementById("prevBtn")
.addEventListener("click",()=>{

  currentIndex--;

  if(currentIndex < 0){
    currentIndex = movies.length - 1;
  }

  openMovie(currentIndex);

});

/* FULLSCREEN */
document.getElementById("fullscreenBtn")
.addEventListener("click",()=>{

  const element =
    document.querySelector("#playerWrapper video") ||
    document.querySelector("#playerWrapper iframe");

  if(!document.fullscreenElement){

    if(element.requestFullscreen){
      element.requestFullscreen();
    }

  }else{

    document.exitFullscreen();

  }

});

/* MUTE */
muteBtn.addEventListener("click",()=>{

  const player = document.getElementById("videoPlayer");

  if(!player) return;

  player.muted = !player.muted;

  if(player.muted){

    muteBtn.innerHTML =
      '<i class="fas fa-volume-mute"></i> Unmute';

  }else{

    muteBtn.innerHTML =
      '<i class="fas fa-volume-up"></i> Mute';

  }

});

/* ESC CLOSE */
document.addEventListener("keydown",(e)=>{

  if(e.key === "Escape"){
    closeModal();
  }

});

/* CLICK OUTSIDE */
modal.addEventListener("click",(e)=>{

  if(e.target === modal){
    closeModal();
  }

});

/* FIRE PARTICLES */
const fireBg = document.getElementById("fireBg");

for(let i=0;i<80;i++){

  const fire = document.createElement("div");

  fire.className = "fire";

  fire.style.left = Math.random()*100 + "%";

  fire.style.animationDuration =
    5 + Math.random()*10 + "s";

  fire.style.animationDelay =
    Math.random()*5 + "s";

  fire.style.opacity =
    Math.random();

  fireBg.appendChild(fire);

}
</script>

   Disable DevTools

DisableDevtool({

    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>

<style>
html, body {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    overflow-x: hidden;
}

/* Disable image dragging */
img {
    pointer-events: none;
    -webkit-user-drag: none;
}

/* Hide selection */
::selection {
    background: transparent;
}
</style>
