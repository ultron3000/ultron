<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>X-Men Cinematic Universe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Explore the complete X-Men cinematic universe with all movies across all timelines in one place.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #f0131e;
      --secondary: #ffcc00;
      --dark-bg: #0a0c10;
      --card-bg: #121620;
      --light: #f5f7fa;
      --accent-blue: #0066cc;
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark-bg);
      color: var(--light);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

    header {
      background: linear-gradient(180deg, rgba(20, 24, 36, 0.95) 0%, rgba(10, 12, 16, 1) 100%);
      padding: 40px 0 20px 0;
      border-bottom: 2px solid rgba(255, 204, 0, 0.15);
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .x-logo {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: clamp(2.2rem, 6vw, 4rem);
      color: #fff;
      letter-spacing: 4px;
      line-height: 1;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    
    .x-logo span {
      color: var(--secondary);
      text-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
    }

    .subtitle { 
      font-size: clamp(0.9rem, 3vw, 1.1rem); 
      color: #a0aec0; 
      font-weight: 400;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .timeline-badge {
      display: inline-block;
      background: rgba(240, 19, 30, 0.15);
      border: 1px solid var(--primary);
      color: #ff888c;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* TIMELINE QUICK NAV FILTER BUTTONS */
    .timeline-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0 10px 0;
      justify-content: center;
    }

    .filter-tab {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #a0aec0;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-tab:hover, .filter-tab.active {
      background: var(--secondary);
      color: #000;
      border-color: var(--secondary);
      box-shadow: 0 4px 12px rgba(255, 204, 0, 0.2);
    }

    .controls { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 15px; 
      margin: 20px 0; 
      align-items: center; 
      justify-content: space-between; 
    }

    .search-container { 
      position: relative; 
      flex-grow: 1; 
      max-width: 500px; 
    }
    
    #searchBar { 
      width: 100%; 
      padding: 14px 15px 14px 45px; 
      font-size: 1rem; 
      border-radius: 8px; 
      border: 1px solid rgba(255,255,255,0.15); 
      background: var(--card-bg); 
      color: var(--light); 
      transition: var(--transition); 
    }
    
    #searchBar:focus { 
      outline: none; 
      border-color: var(--secondary); 
      box-shadow: 0 0 10px rgba(255,204,0,0.2); 
    }
    
    .search-icon { 
      position: absolute; 
      left: 15px; 
      top: 50%; 
      transform: translateY(-50%); 
      color: #718096; 
    }

    .stats-counter {
      font-size: 0.95rem;
      color: #a0aec0;
      font-weight: 600;
    }

    /* UNIFIED GLANCE GRID VIEW */
    .movies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      padding: 10px 0;
    }

    .movie {
      background: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
    }
    
    .movie:hover { 
      transform: translateY(-5px); 
      border-color: var(--secondary);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
    }
    
    .poster-container {
      position: relative;
      width: 100%;
      padding-top: 145%;
      overflow: hidden;
      background: #1a202c;
    }

    .movie img { 
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%; 
      object-fit: cover; 
      transition: var(--transition); 
    }
    
    .movie:hover img {
      transform: scale(1.05);
    }

    .movie-info {
      padding: 12px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .movie-title { 
      font-weight: 700; 
      color: var(--light); 
      font-size: 0.95rem;
      line-height: 1.4;
      margin-bottom: 5px;
    }

    .movie-meta {
      font-size: 0.8rem;
      color: #a0aec0;
      font-weight: 600;
    }

    /* --- RESPONSIVE MODAL SYSTEM --- */
    #playback-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(5, 7, 12, 0.95);
      padding: 15px;
    }
    
    #playback-modal .modal-card {
      width: 100%;
      max-width: 1000px;
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    #modal-player {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      background: #000;
    }
    
    #modal-player video, #modal-player iframe { 
      position: absolute; top:0; left:0; width:100%; height:100%; border:0; background:#000; 
    }

    .progress-bar { height: 4px; background: rgba(255,255,255,0.1); width:100%; }
    .progress-bar-fill { height: 100%; width: 0%; background: var(--secondary); }

    /* AUTO ALIGNING CONTROLS CONTAINER CONTAINER */
    .modal-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      background: #0f121a;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-wrap: wrap;
    }

    .modal-controls .btn {
      background: rgba(255,255,255,0.06);
      color: var(--light);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 18px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
      min-width: 90px;
    }

    .modal-controls .btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    
    .modal-controls .btn.btn-primary {
      background: var(--secondary);
      color: #000;
      border-color: var(--secondary);
    }
    
    .modal-controls .btn.btn-primary:hover { background: #e6b800; }
    
    .modal-controls .btn.btn-danger {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .modal-controls .btn.btn-danger:hover { background: #cc0f18; }

    .modal-meta { 
      padding: 20px; 
      display: flex; 
      flex-direction: column;
      gap: 12px;
    }
    
    .modal-meta h3 { margin:0; font-size: 1.5rem; font-family: 'Oswald', sans-serif; color: #fff; letter-spacing: 0.5px; }
    .modal-meta p { font-size: 0.9rem; color: #a0aec0; line-height: 1.5; margin-top: 4px; }
    
    .watchlist-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .watchlist-checkbox { position: relative; display: inline-block; width: 22px; height: 22px; }
    .watchlist-checkbox input { opacity:0; width:0; height:0; }
    .watchlist-checkbox .checkmark { position:absolute; top:0; left:0; height:22px; width:22px; background:rgba(255,255,255,0.05); border:2px solid #4a5568; border-radius:6px; transition: all 0.2s; cursor:pointer; }
    .watchlist-checkbox input:checked ~ .checkmark { background: var(--primary); border-color: var(--primary); }
    .watchlist-checkbox .checkmark:after { content:''; position:absolute; display:none; }
    .watchlist-checkbox input:checked ~ .checkmark:after { display:block; left:6px; top:2px; width:6px; height:11px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }

    #loading-spinner {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(5,7,12,0.8); z-index: 10000;
    }
    #loading-spinner .spinner {
      width:50px; height:50px; border-radius:50%; border-top:4px solid var(--secondary); border-left:4px solid transparent; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile Adaptations */
    @media (max-width: 768px) {
      .container { padding: 15px; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-container { max-width: 100%; }
      .stats-counter { text-align: center; }
      .movies { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
      .modal-controls { padding: 8px; gap: 6px; }
      .modal-controls .btn { padding: 8px 12px; font-size: 0.8rem; min-width: calc(33.33% - 6px); flex-grow: 1; }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--dark-bg); }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }

    video:fullscreen, iframe:fullscreen { object-fit: contain !important; background: #000; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
</head>
<body>

<header>
  <div class="container">
    <div class="x-logo">X-MEN<span> UNIVERSE</span></div>
    <p class="subtitle">The complete mutant library in a single glance timeline view. Filter across specific generation tracks below.</p>
    
    <div class="timeline-filters" id="timelineFilters">
      <button class="filter-tab active" data-timeline="all">All Timelines</button>
      <button class="filter-tab" data-timeline="Original Trilogy">Original Trilogy</button>
      <button class="filter-tab" data-timeline="The Wolverine Trilogy">Wolverine Arc</button>
      <button class="filter-tab" data-timeline="Prequel & Revised Timeline">Revised Prequels</button>
      <button class="filter-tab" data-timeline="Deadpool & Spin-Offs">Deadpool / Spin-offs</button>
    </div>
  </div>
</header>

<main class="container">
  <div class="controls">
    <div class="search-container">
      <i class="fas fa-search search-icon"></i>
      <input id="searchBar" placeholder="Search across all movies at once..." type="text"/>
    </div>
    <div class="stats-counter" id="movieCounter">Showing all movies</div>
  </div>

  <div class="movies" id="movies-container"></div>
</main>

<!-- Unified Responsive Playback Modal -->
<div id="playback-modal" aria-hidden="true">
  <div class="modal-card">
    <div id="modal-player">
      <video id="modal-video" controls playsinline>
        Your browser does not support playback.
      </video>
    </div>

    <div class="progress-bar" id="video-progress">
      <div id="progress-bar-fill" class="progress-bar-fill"></div>
    </div>

    <!-- Align-Optimized Controller Action Bar with Close Button Next To Full -->
    <div class="modal-controls">
      <button id="prevBtn" class="btn"><i class="fas fa-backward"></i> Prev</button>
      <button id="playPauseBtn" class="btn btn-primary"><i class="fas fa-play"></i> Play</button>
      <button id="nextBtn" class="btn">Next <i class="fas fa-forward"></i></button>
      <button id="muteBtn" class="btn"><i class="fas fa-volume-up"></i> Mute</button>
      <button id="fullscreenBtn" class="btn"><i class="fas fa-expand"></i> Full</button>
      <button id="closeBtn" class="btn btn-danger"><i class="fas fa-times"></i> Close</button>
    </div>

    <div class="modal-meta">
      <div>
        <h3 id="modal-title">Movie Title</h3>
        <p id="modal-desc">Movie description context text goes here.</p>
      </div>
      <div class="watchlist-container">
        <span style="font-size:0.85rem; color:#a0aec0;">Watchlist</span>
        <label class="watchlist-checkbox" title="Add to watchlist">
          <input type="checkbox" id="watchlist-checkbox">
          <span class="checkmark"></span>
        </label>
      </div>
    </div>
  </div>
</div>

<div id="blanket-spinner" style="display:none;"></div>
<div id="loading-spinner"><div class="spinner"></div></div>

<script>
/* ----------------------------------------------------
   UPGRADED DATA ARRAY WITH INTEGRATED DESCRIPTIONS
   ---------------------------------------------------- */
const movies = [
 { title: "X-Men", year: 2000, timeline: "Original Trilogy", description: "The definitive cinematic introduction to Marvel's mutants. Professor Charles Xavier's team protects a world that fears them from Magneto's genetic mutation schemes.", video: "https://mega.nz/embed/ERs0FCJT#xE1O5jAY90l1nu9d3xdhZ2z0PzLJIRAw4l-FouZ8aEQ", image: "https://image.tmdb.org/t/p/w500/bRDAc4GogyS9ci3ow7UnInOcriN.jpg" },

{ title: "X-Men: The Last Stand", year: 2006, timeline: "Original Trilogy", description: "A pharmaceutical 'cure' threatens mutant identities, triggering a final conflict while Jean Grey transforms into the highly destructive Phoenix.", video: "https://mega.nz/embed/VRUg0SSQ#GjkhgstOpqW89nDNLUydu-DpumILmGz19fPMUqMmDOE", image: "https://image.tmdb.org/t/p/w500/a2xicU8DpKtRizOHjQLC1JyCSRS.jpg" },

{ title: "X-Men Origins: Wolverine", year: 2009, timeline: "The Wolverine Trilogy", description: "The backstory tracking Logan’s violent path through historical wars, his complex bond with Victor Creed, and his transformation in the Weapon X project.", video: "https://mega.nz/embed/RE8TUBIC#7qUT4ayVCJWyzX6JixaT5p9Y2vKgwKllK0wu6AjfYcs", image: "https://image.tmdb.org/t/p/w500/yj8LbTju1p7CUJg7US2unSBk33s.jpg" },
{ title: "The Wolverine", year: 2013, timeline: "The Wolverine Trilogy", description: "A guilt-ridden Logan travels to modern-day Japan to confront an old acquaintance, losing his signature healing factor amid Yakuza attacks.", video: "", image: "https://image.tmdb.org/t/p/w500/t2wVAcoRlKvEIVSbiYDb8d0QqqS.jpg" },
{ title: "Logan", year: 2017, timeline: "The Wolverine Trilogy", description: "In a bleak dystopian future, a fading Logan protects an ailing Professor X and a young mutant girl who possesses matching biological abilities.", video: "https://mega.nz/embed/gU0EUQbK#1GJI2QLV13N1rRYAwmAJi4cYdqyJWKbf9FUYezseB0U", image: "https://image.tmdb.org/t/p/w500/fnbjcRDYn6YviCcePDnGdyAkYsB.jpg" },

{ title: "X-Men: First Class", year: 2011, timeline: "Prequel & Revised Timeline", description: "Set during the 1962 Cuban Missile Crisis, tracking how Charles Xavier and Erik Lehnsherr first met and formed the original school line-up.", video: "https://mega.nz/embed/AE0GBJIA#zDyLK4x2q5EeCgssJPv61sN5uiE1_jg71AlzRnqv8ag", image: "https://image.tmdb.org/t/p/w500/hNEokmUke0dazoBhttFN0o3L7Xv.jpg" },
{ title: "X-Men: Days of Future Past", year: 2014, timeline: "Prequel & Revised Timeline", description: "Logan's consciousness travels back to 1973 to prevent a catastrophic assassination that triggers the rise of mutant-hunting Sentinels.", video: "https://mega.nz/embed/MNtATDhK#j3h_okzGSlXdJ5Y2xPN56kY8C7TfULDKJFdvH-F5GNc", image: "https://image.tmdb.org/t/p/w500/tYfijzolzgoMOtegh1Y7j2Enorg.jpg" },
{ title: "X-Men: Apocalypse", year: 2016, timeline: "Prequel & Revised Timeline", description: "The world's original, immortal mutant awakens in 1983, assembling a powerful faction to destroy civilization and establish a new order.", video: "https://mega.nz/embed/octhkBTL#jMKkxWgwIq1Pws0JWiJD6wC2ohgtFJ9Ece7WMfZE-aE", image: "https://image.tmdb.org/t/p/w500/2mtQwJKVKQrZgTz49Dizb25eOQQ.jpg" },
{ title: "Dark Phoenix", year: 2019, timeline: "Prequel & Revised Timeline", description: "Jean Grey absorbs a cosmic entity during a rescue mission, threatening her teammates as her unstable powers grow.", video: "https://mega.nz/embed/sA0jgSJB#mzRU3fh-VhBM9I0WWKVQrwdT5WHRndE49OzYCmR8F5I", image: "https://image.tmdb.org/t/p/w500/cCTJPelKGLhALq3r51A9uMonxKj.jpg" },

{ title: "Deadpool", year: 2016, timeline: "Deadpool & Spin-Offs", description: "Former mercenary Wade Wilson undergoes an unauthorized lab experiment that leaves him with accelerated healing powers and a dark sense of humor.", video: "https://mega.nz/embed/jhpUgbpK#8bHO22457HIwFItOTozZiKm8FDpW9jPbRfaYG64ZF6M", image: "https://image.tmdb.org/t/p/w500/3E53WEZJqP6aM84D8CckXx4pIHw.jpg" },
{ title: "Deadpool 2", year: 2018, timeline: "Deadpool & Spin-Offs", description: "Wade Wilson forms the X-Force task squad to protect a volatile teenage mutant from the time-traveling cybernetic soldier Cable.", video: "https://mega.nz/embed/npBmkZYD#HzOBcvBafDSOalOoOcwgtChf_3L7Cyz_OKi7sbVY67I", image: "https://image.tmdb.org/t/p/w500/to0spRl1CMDvyUbOnbb4fTk3VAd.jpg" },
{ title: "The New Mutants", year: 2020, timeline: "Deadpool & Spin-Offs", description: "Five young mutants discover their dangerous abilities while being held captive at an isolated secret research hospital facility.", video: "https://mega.nz/embed/xNsz2DwL#-Cj9VN8U4BAqhevFIWoClHzbEGuCCq5aEM22BglOQqQ", image: "https://image.tmdb.org/t/p/w500/xiDGcXJTvu1lazFRYip6g1eLt9c.jpg" },
{ title: "Deadpool & Wolverine", year: 2024, timeline: "Deadpool & Spin-Offs", description: "The ultimate multiverse crossover. Wade Wilson is pulled from his quiet life by the TVA, teaming up with a reluctant Wolverine variant.", video: "https://mega.nz/embed/rhgA1Zxb#3Vh2oHg4Kr2FXlMCX_u_QO40K64KzhvpWOE_w3HbTvg", image: "https://image.tmdb.org/t/p/w500/8cdWjvZQUExUUTzyp4t6EDMubfO.jpg" }];

const moviesContainer = document.getElementById('movies-container');
let selectedTimeline = "all";

/* Master Comprehensive Row Render Engine */
function renderGlanceMatrix() {
  moviesContainer.innerHTML = "";
  
  movies.forEach((movie, index) => {
    const div = document.createElement('div');
    div.className = 'movie';
    div.dataset.timeline = movie.timeline;
    div.dataset.title = movie.title.toLowerCase();
    
    div.innerHTML = `
      <div class="poster-container">
        <img src="${movie.image}" alt="${movie.title}" loading="lazy">
      </div>
      <div class="movie-info">
        <div class="movie-title">${movie.title}</div>
        <div class="movie-meta">${movie.year} — <span style="color:#e6b800; font-size:0.75rem;">${movie.timeline}</span></div>
      </div>
    `;
    
    div.addEventListener('click', () => {
      playInModal(movie.title, movie.video, movie, index);
    });
    moviesContainer.appendChild(div);
  });
  updateCounters();
}

/* Dynamic Live Filter Update Handler */
function runDisplayFilters() {
  const searchTerm = document.getElementById('searchBar').value.toLowerCase();
  let matches = 0;

  document.querySelectorAll('.movie').forEach(div => {
    const titleMatch = div.dataset.title.includes(searchTerm);
    const timelineMatch = (selectedTimeline === "all" || div.dataset.timeline === selectedTimeline);

    if (titleMatch && timelineMatch) {
      div.style.display = 'flex';
      matches++;
    } else {
      div.style.display = 'none';
    }
  });
  updateCounters(matches, searchTerm !== "all" || selectedTimeline !== "all");
}

function updateCounters(overrideCount, activeFilters) {
  const counter = document.getElementById('movieCounter');
  if (overrideCount !== undefined) {
    counter.textContent = `Found ${overrideCount} matching entries`;
  } else {
    counter.textContent = `Showing all ${movies.length} movies at a glance`;
  }
}

/* Event Hooking for Buttons & Inputs */
document.getElementById('timelineFilters').addEventListener('click', (e) => {
  if (!e.target.classList.contains('filter-tab')) return;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  selectedTimeline = e.target.dataset.timeline;
  runDisplayFilters();
});

document.getElementById('searchBar').addEventListener('input', runDisplayFilters);

/* ----------------------------------------------------
   HAWKEYE PLAYER SCRIPT WITH REORDERED ACTION ITEMS
   ---------------------------------------------------- */
const playbackModal = document.getElementById('playback-modal');
const modalTitle = document.getElementById('modal-title');
const modalDesc = document.getElementById('modal-desc');
const watchlistCheckbox = document.getElementById('watchlist-checkbox');
const progressBarFill = document.getElementById('progress-bar-fill');
const loadingSpinner = document.getElementById('loading-spinner');
const modalPlayer = document.getElementById('modal-player');

let currentHls = null;
let currentMovieIndex = null;

function getModalVideo() { return document.getElementById('modal-video'); }

function isHls(u) {
  if (!u) return false;
  return (u.includes('.m3u8') || u.includes('index-') || u.includes('manifest') || u.includes('master.m3u8'));
}
function isMP4(u) { return /\.mp4($|\?)/i.test(u || ''); }
function isYouTube(u) { return !!(u && (u.includes('youtube.com') || u.includes('youtu.be') || u.includes('/embed/'))); }

function resetPlayerContainer() {
  if (currentHls) { try { currentHls.destroy(); } catch (e) {} currentHls = null; }
  modalPlayer.innerHTML = `<video id="modal-video" controls playsinline>Your browser does not support playback.</video>`;
}

function closeModalHandler() {
  const videoEl = getModalVideo();
  if (currentHls) { try { currentHls.destroy(); } catch(e) {} currentHls = null; }
  if (videoEl) { try { videoEl.pause(); } catch(e) {} }
  resetPlayerContainer();
  playbackModal.style.display = 'none';
  document.body.style.overflow = '';
  currentMovieIndex = null;
  progressBarFill.style.width = '0%';
}

function playInModal(title, url, movie = {}, episodeIndex = 0) {
  currentMovieIndex = episodeIndex;
  modalTitle.textContent = movie.title || title;
  modalDesc.textContent = movie.description || "No chronological timeline breakdown provided for this selection.";
  watchlistCheckbox.checked = !!movie.inWatchlist;
  progressBarFill.style.width = '0%';

  resetPlayerContainer();
  loadingSpinner.style.display = 'flex';

  if (!url || url === "00") {
    modalPlayer.innerHTML = `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;width:90%;">
      <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--secondary);margin-bottom:10px;"></i>
      <p>No streaming mirror configured for this title yet.</p>
    </div>`;
    playbackModal.style.display = 'flex';
    loadingSpinner.style.display = 'none';
    return;
  }

  if (url.includes('mega.nz') || url.includes('streamtape.com') || url.includes('dood')) {
    modalPlayer.innerHTML = `<iframe src="${url}" allowfullscreen allowtransparency allow="autoplay" scrolling="no" frameborder="0"></iframe>`;
    playbackModal.style.display = 'flex';
    loadingSpinner.style.display = 'none';
    return;
  }

  if (isYouTube(url)) {
    let embedUrl = url;
    if (url.includes('watch?v=')) {
      embedUrl = `https://www.youtube.com/embed/${new URLSearchParams(url.split('?')[1]).get('v')}`;
    }
    modalPlayer.innerHTML = `<iframe src="${embedUrl}?autoplay=1" allowfullscreen allow="autoplay" frameborder="0"></iframe>`;
    playbackModal.style.display = 'flex';
    loadingSpinner.style.display = 'none';
    return;
  }

  const videoEl = getModalVideo();
  if (isHls(url)) {
    if (Hls.isSupported()) {
      currentHls = new Hls();
      currentHls.loadSource(url);
      currentHls.attachMedia(videoEl);
      currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
        playbackModal.style.display = 'flex';
        loadingSpinner.style.display = 'none';
        videoEl.play().catch(()=>{});
      });
    } else {
      videoEl.src = url;
      playbackModal.style.display = 'flex';
      loadingSpinner.style.display = 'none';
      videoEl.play().catch(()=>{});
    }
    attachVideoListeners();
    return;
  }

  if (isMP4(url)) {
    videoEl.src = url;
    playbackModal.style.display = 'flex';
    loadingSpinner.style.display = 'none';
    videoEl.play().catch(()=>{});
    attachVideoListeners();
    return;
  }
}

function attachVideoListeners() {
  const videoEl = getModalVideo();
  if (!videoEl) return;
  videoEl.addEventListener('timeupdate', () => {
    if (!videoEl.duration) return;
    progressBarFill.style.width = ((videoEl.currentTime / videoEl.duration) * 100) + '%';
  });
}

/* Event Control Hooks */
document.getElementById('playPauseBtn').addEventListener('click', function() {
  const video = getModalVideo();
  if (!video || !video.play) return;
  if (video.paused) {
    video.play();
    this.innerHTML = '<i class="fas fa-pause"></i> Pause';
  } else {
    video.pause();
    this.innerHTML = '<i class="fas fa-play"></i> Play';
  }
});

document.getElementById('muteBtn').addEventListener('click', function() {
  const video = getModalVideo();
  if (!video) return;
  video.muted = !video.muted;
  this.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i> Unmute' : '<i class="fas fa-volume-up"></i> Mute';
});

document.getElementById('fullscreenBtn').addEventListener('click', () => {
  const video = getModalVideo();
  if (!video) return;
  if (video.requestFullscreen) video.requestFullscreen();
  else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentMovieIndex > 0) {
    const prev = movies[currentMovieIndex - 1];
    playInModal(prev.title, prev.video, prev, currentMovieIndex - 1);
  }
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentMovieIndex < movies.length - 1) {
    const next = movies[currentMovieIndex + 1];
    playInModal(next.title, next.video, next, currentMovieIndex + 1);
  }
});

watchlistCheckbox.addEventListener('change', function() {
  if (currentMovieIndex !== null) movies[currentMovieIndex].inWatchlist = this.checked;
});

document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
playbackModal.addEventListener('click', function(e) { if (e.target === this) closeModalHandler(); });

/* Load script lifecycle initiation */
window.addEventListener('DOMContentLoaded', renderGlanceMatrix);
</script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

        return false;

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;

})();

/* =========================

if (window.location.href.startsWith("view-source:")) {

}

/* =========================

========================= */
if (window.top !== window.self) {

}
