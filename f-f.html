<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Fast & Furious Universe</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

:root{
  --primary:#ff3c00;
  --secondary:#050505;
  --accent:#00e5ff;
  --muted:#9CA3AF;

  --glass:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.12);

  --danger:#ff004c;
  --nitro:#00f0ff;

  --shadow-red:0 0 25px rgba(255,60,0,.45);
  --shadow-blue:0 0 25px rgba(0,229,255,.35);
}

*{
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;

  background:
    radial-gradient(circle at top left, rgba(255,60,0,.18), transparent 25%),
    radial-gradient(circle at bottom right, rgba(0,229,255,.12), transparent 30%),
    linear-gradient(135deg,#050505 0%,#0f172a 45%,#050505 100%);

  color:white;
  min-height:100vh;
  margin:0;
  overflow-x:hidden;
  position:relative;
}

/* =========================
   BACKGROUND FX
========================= */

.speed-overlay{
  position:fixed;
  inset:0;

  background:
    linear-gradient(
      115deg,
      transparent 0%,
      rgba(255,255,255,.03) 45%,
      transparent 50%
    );

  background-size:300% 300%;
  animation:speedMove 12s linear infinite;

  pointer-events:none;
  z-index:-2;
}

.grid-overlay{
  position:fixed;
  inset:0;

  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

  background-size:40px 40px;

  mask-image:linear-gradient(to bottom, transparent, black);

  pointer-events:none;
  z-index:-1;
}

@keyframes speedMove{
  0%{background-position:0% 0%;}
  100%{background-position:200% 0%;}
}

/* =========================
   HERO
========================= */

.hero-section{
  position:relative;
  overflow:hidden;
  border-radius:32px;

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    0 0 60px rgba(255,60,0,.18),
    0 0 100px rgba(0,229,255,.08);
}

.hero-section::after{
  content:'';
  position:absolute;
  inset:0;

  background:
    linear-gradient(to top, rgba(0,0,0,.92), transparent 50%),
    linear-gradient(to right, rgba(0,0,0,.75), transparent 45%);

  z-index:1;
}

.hero-video{
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
}

.ff-title{
  font-size:clamp(2.5rem,8vw,6rem);
  font-weight:800;
  line-height:.9;
  letter-spacing:4px;
  text-transform:uppercase;

  text-shadow:
    0 0 20px rgba(255,60,0,.6),
    0 0 40px rgba(0,229,255,.25);
}

.ff-title span{
  color:var(--accent);
}

.ff-subtitle{
  margin-top:18px;
  max-width:650px;

  color:#d1d5db;

  font-size:1rem;
  line-height:1.7;
}

/* =========================
   LOGO
========================= */

.animate-logo{
  animation:
    floatLogo 3s ease-in-out infinite,
    glowLogo 2s ease-in-out infinite alternate;
}

@keyframes floatLogo{
  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-8px);
  }
}

@keyframes glowLogo{
  from{
    filter:
      drop-shadow(0 0 5px #ff3c00)
      drop-shadow(0 0 12px #00e5ff);
  }

  to{
    filter:
      drop-shadow(0 0 15px #ff3c00)
      drop-shadow(0 0 30px #00e5ff);
  }
}

/* =========================
   MOVIE GRID
========================= */

.movie-card{
  position:relative;
  overflow:hidden;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  border-radius:22px;

  backdrop-filter:blur(18px);

  transition:all .45s ease;

  box-shadow:
    0 10px 30px rgba(0,0,0,.35);

  opacity:0;
  animation:cardReveal .8s ease forwards;
}

.movie-card:hover{
  transform:
    translateY(-12px)
    scale(1.03);

  box-shadow:
    0 0 30px rgba(255,60,0,.35),
    0 0 60px rgba(0,229,255,.18);

  border-color:rgba(255,255,255,.2);
}

.movie-card::before{
  content:'';

  position:absolute;
  inset:-100%;

  background:
    linear-gradient(
      120deg,
      transparent 30%,
      rgba(255,255,255,.12),
      transparent 70%
    );

  transform:rotate(25deg);

  transition:.8s;
}

.movie-card:hover::before{
  inset:100%;
}

.movie-poster{
  aspect-ratio:2/3;

  transition:transform .6s ease;
}

.movie-card:hover .movie-poster{
  transform:
    scale(1.12)
    rotate(1deg);
}

@keyframes cardReveal{
  from{
    opacity:0;
    transform:
      translateY(40px)
      scale(.95);
  }

  to{
    opacity:1;
    transform:
      translateY(0)
      scale(1);
  }
}

/* =========================
   WATCH BUTTON
========================= */

.watch-btn{
  background:
    linear-gradient(
      135deg,
      #ff3c00,
      #ff8800
    );

  color:white;
  font-weight:700;

  border:none;

  padding:10px 18px;

  border-radius:999px;

  box-shadow:
    0 0 25px rgba(255,60,0,.5);

  transition:.3s;
}

.watch-btn:hover{
  transform:scale(1.08);

  box-shadow:
    0 0 40px rgba(255,60,0,.8);
}

/* =========================
   MODAL
========================= */

.modal-backdrop{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.92);

  display:none;
  align-items:center;
  justify-content:center;

  z-index:9999;
}

.modal-backdrop.active{
  display:flex;
}

.modal-card{
  width:95%;
  max-width:1200px;
  max-height:92vh;

  overflow:hidden;

  border-radius:24px;

  border:1px solid rgba(255,255,255,.08);

  background:
    linear-gradient(
      145deg,
      rgba(10,10,10,.96),
      rgba(20,20,20,.92)
    );

  backdrop-filter:blur(20px);

  box-shadow:
    0 0 50px rgba(255,60,0,.2),
    0 0 100px rgba(0,229,255,.08);
}

.player-wrapper{
  position:relative;
  background:black;
}

.player-wrapper video,
.player-wrapper iframe{
  width:100%;
  height:65vh;
  background:black;
}

.player-meta{
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.controls-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  background:
    linear-gradient(
      135deg,
      rgba(255,60,0,.15),
      rgba(0,229,255,.08)
    );

  border:1px solid rgba(255,255,255,.12);

  color:white;

  padding:10px 18px;

  border-radius:14px;

  backdrop-filter:blur(10px);

  transition:all .3s ease;

  cursor:pointer;
}

.btn:hover{
  transform:translateY(-2px);

  box-shadow:
    0 0 20px rgba(255,60,0,.35);

  border-color:rgba(255,255,255,.2);
}

#topCloseBtn{
  position:absolute;
  top:15px;
  right:15px;

  width:45px;
  height:45px;

  border:none;

  border-radius:50%;

  background:rgba(0,0,0,.7);

  color:white;

  z-index:10;

  cursor:pointer;
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:#111;
}

::-webkit-scrollbar-thumb{
  background:linear-gradient(#ff3c00,#00e5ff);
  border-radius:20px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  .hero-section{
    border-radius:18px;
  }

  .player-wrapper video,
  .player-wrapper iframe{
    height:35vh;
  }

  .controls-row{
    justify-content:center;
  }

  .btn{
    flex:1;
  }

  .ff-subtitle{
    font-size:.9rem;
  }
}
</style>
</head>

<body>

<div class="speed-overlay"></div>
<div class="grid-overlay"></div>

<div class="container mx-auto px-4 py-8 max-w-7xl">

<!-- HERO -->
<div class="hero-section relative w-full h-[260px] sm:h-[400px] md:h-[520px] mb-12">

  <iframe
    src="https://www.youtube.com/embed/XLYAz6yuJOk?autoplay=1&mute=1&loop=1&playlist=NOLlgPn8cIY&controls=0&showinfo=0&modestbranding=1"
    frameborder="0"
    allow="autoplay"
    class="absolute inset-0 w-full h-full hero-video">
  </iframe>

  <!-- LOGO -->
  <img
    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0vFe-RWiWYQkTwJeh1O35rko8eRQQQB0oBg&s"
    class="absolute top-4 left-4 sm:top-6 sm:left-6 h-16 sm:h-24 z-20 animate-logo"
  />

  <!-- TEXT -->
  <div class="absolute bottom-10 left-6 sm:left-10 z-20 max-w-3xl">

    <h1 class="ff-title">
      FAST <span>&</span> FURIOUS
    </h1>

    <p class="ff-subtitle">
      Enter the ultimate street racing universe. Experience every Fast & Furious movie in one cinematic platform built for speed, adrenaline and family.
    </p>

  </div>

</div>

<!-- MOVIES -->
<div class="mb-12">
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5" id="movies"></div>
</div>

<!-- FOOTER -->
<div class="border-t border-white/10 mt-10 pt-6 text-center text-gray-400">

  <div class="flex justify-center gap-6 text-2xl">

    <a href="#" class="hover:text-red-500 transition">
      <i class="fab fa-facebook-f"></i>
    </a>

    <a href="#" class="hover:text-cyan-400 transition">
      <i class="fab fa-twitter"></i>
    </a>

    <a href="https://www.instagram.com/stark_4152/reels" class="hover:text-pink-500 transition">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="hover:text-red-600 transition">
      <i class="fab fa-youtube"></i>
    </a>

  </div>

  <p class="mt-5 text-sm text-gray-500">
    Fast & Furious Universe © 2026
  </p>

</div>

</div>

<!-- MODAL -->
<div id="playbackModal" class="modal-backdrop">

  <div class="modal-card">

    <div class="player-wrapper" id="playerWrapper">

      <video
        id="modalVideo"
        controls
        playsinline
        style="width:100%;height:100%;background:black">
      </video>

      <button id="topCloseBtn">
        <i class="fas fa-times"></i>
      </button>

    </div>

    <div class="player-meta">

      <div>
        <h3 id="modalTitle" class="text-2xl font-bold"></h3>
        <p id="modalDesc" class="text-gray-400 mt-2"></p>
      </div>

      <div class="controls-row">

        <button id="prevBtn" class="btn">
          <i class="fas fa-step-backward"></i>
        </button>

        <button id="playPauseBtn" class="btn">
          <i class="fas fa-play"></i>
        </button>

        <button id="nextBtn" class="btn">
          <i class="fas fa-step-forward"></i>
        </button>

        <button id="fullscreenBtn" class="btn">
          <i class="fas fa-expand"></i>
        </button>

        <button id="muteBtn" class="btn">
          <i class="fas fa-volume-up"></i>
        </button>

        <button id="closeBtn" class="btn">
          <i class="fas fa-times"></i>
        </button>

      </div>

    </div>

  </div>

</div>

<script>

/* =========================
   MOVIES
========================= */

const movies = [

{
title:"The Fast and the Furious-2001",
video:"https://vip.opstream11.com/20220315/2054_7072464f/index.m3u8",
image:"https://i.pinimg.com/736x/39/93/1f/39931fd280f4cefd21d733fa16b6ce38.jpg"
},

{
title:"2 Fast 2 Furious-2003",
video:"https://svz.velonovaenergy.sbs:443/v4/s93/urjh6/index-f2-v1-a1.txt",
image:"https://xl.movieposterdb.com/12_03/2003/322259/xl_322259_aa544bd8.jpg"
},

{
title:"Tokyo Drift-2006",
video:"https://vip.opstream11.com/20220315/2055_65def55f/index.m3u8",
image:"https://i.ebayimg.com/images/g/65EAAOSwxNljonVb/s-l400.jpg"
},

{
title:"Fast & Furious-2009",
video:"https://vip.opstream14.com/20230814/39032_4c99bb73/index.m3u8",
image:"https://m.media-amazon.com/images/M/MV5BM2Y1YzhkNzUtMzhmZC00OTFkLWJjZDktMWYzZmQ0Y2Y5ODcwXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"
},

{
title:"Fast Five-2011",
video:"https://vip.opstream11.com/20220315/2023_093d78a1/index.m3u8",
image:"https://images.moviesanywhere.com/cb3117a22a20def44456d9865ffa3291/2f88efc6-9d0e-42f7-8ab3-cecc274c9d1d.jpg"
},

{
title:"Fast & Furious 6-2013",
video:"https://okqtss1gbbnca8e.meadowpathlearningcenter.space/R7khaR4Jtgqr/hls3/01/00377/7iu4nkqyzog5_h/master.txt",
image:"https://www.tallengestore.com/cdn/shop/products/Fast_Furious_6_-_Paul_Walker_-_Vin_Diesel_-_Dwayne_Johnson_-_Tallenge_Hollywood_Action_Movie_Poster.jpg?v=1582534834"
},

{
title:"Furious 7-2015",
video:"https://stzm.xylonadynamics.cyou:443/v4/ic/hqjvy/index-f2-v1-a1.txt",
image:"https://mir-s3-cdn-cf.behance.net/project_modules/max_1200/45c60411533181.56275de299f7e.jpg"
},

{
title:"The Fate of the Furious-2017",
video:"https://y36m66ikulk1.aurorionarchitects.store/l36wheaa9kc/hls3/01/01203/z00ph84wb87m_h/master.txt",
image:"https://images.moviesanywhere.com/7df30161e9eeb8994575921dd608e796/b239c4f5-952a-4757-a145-8f56f4de07f8.jpg"
},

{
title:"F9: The Fast Saga-2021",
video:"https://bxs5xkxkyi4y.aurorionarchitects.space/xovpsecgijtc/hls3/01/00538/cece5ln9c1y8_h/master.txt",
image:"https://blob.cede.ch/catalog/17408000/17408855_1_92.jpg"
},

{
title:"Fast X-2023",
video:"https://s5r.celestiorstudio.cyou:443/v4/x68/ivatw/index-f2-v1-a1.txt",
image:"https://cdn.kinocheck.com/i/w=1200/302cs4vsno.jpg"
},

{ title: "Fast & Furious Presents: Hobbs & Shaw-2019", video: "https://svz.harmonivia.cyou:443/v4/3vi/r3zf9/index-f2-v1-a1.txt", image: "https://musicart.xboxlive.com/7/34245100-0000-0000-0000-000000000002/504/image.jpg" },

];

/* =========================
   DOM
========================= */

const container=document.getElementById('movies');

const playbackModal=document.getElementById('playbackModal');

const modalVideo=document.getElementById('modalVideo');

const modalTitle=document.getElementById('modalTitle');

const modalDesc=document.getElementById('modalDesc');

const playPauseBtn=document.getElementById('playPauseBtn');

const muteBtn=document.getElementById('muteBtn');

let currentIndex=0;

let currentHls=null;

/* =========================
   RENDER
========================= */

function renderMovies(){

container.innerHTML='';

movies.forEach((movie,index)=>{

const div=document.createElement('div');

div.className='movie-card cursor-pointer';

div.innerHTML=`

<div class="relative overflow-hidden">

<img
src="${movie.image}"
alt="${movie.title}"
class="w-full h-full object-cover movie-poster">

<div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 hover:opacity-100 transition duration-500 flex items-end justify-center pb-6">

<button class="watch-btn">
<i class="fas fa-play mr-2"></i>
WATCH NOW
</button>

</div>

</div>

<div class="p-4">

<h3 class="font-bold text-sm sm:text-base line-clamp-2">
${movie.title}
</h3>

<div class="mt-3 flex items-center justify-between text-xs text-gray-400">

<span>
<i class="fas fa-film mr-1 text-orange-500"></i>
Movie
</span>

<span>
<i class="fas fa-bolt mr-1 text-cyan-400"></i>
HD
</span>

</div>

</div>
`;

div.addEventListener('click',()=>{
openPlayer(index);
});

container.appendChild(div);

});

}

renderMovies();

/* =========================
   PLAYER
========================= */

function isHls(url){
return url.includes('.m3u8') || url.includes('master');
}

function openPlayer(index){

currentIndex=index;

const movie=movies[index];

modalTitle.textContent=movie.title;

modalDesc.textContent="Fast & Furious Universe Streaming";

playbackModal.classList.add('active');

document.body.style.overflow='hidden';

if(currentHls){
currentHls.destroy();
currentHls=null;
}

const src=movie.video;

if(isHls(src)){

if(Hls.isSupported()){

currentHls=new Hls();

currentHls.loadSource(src);

currentHls.attachMedia(modalVideo);

currentHls.on(Hls.Events.MANIFEST_PARSED,function(){

modalVideo.play();

});

}else{

modalVideo.src=src;

modalVideo.play();

}

}else{

modalVideo.src=src;

modalVideo.play();

}

playPauseBtn.innerHTML='<i class="fas fa-pause"></i>';

}

/* =========================
   CONTROLS
========================= */

playPauseBtn.addEventListener('click',()=>{

if(modalVideo.paused){

modalVideo.play();

playPauseBtn.innerHTML='<i class="fas fa-pause"></i>';

}else{

modalVideo.pause();

playPauseBtn.innerHTML='<i class="fas fa-play"></i>';

}

});

document.getElementById('muteBtn').addEventListener('click',()=>{

modalVideo.muted=!modalVideo.muted;

muteBtn.innerHTML=modalVideo.muted
? '<i class="fas fa-volume-mute"></i>'
: '<i class="fas fa-volume-up"></i>';

});

document.getElementById('fullscreenBtn').addEventListener('click',()=>{

if(!document.fullscreenElement){

modalVideo.requestFullscreen();

}else{

document.exitFullscreen();

}

});

document.getElementById('nextBtn').addEventListener('click',()=>{

currentIndex++;

if(currentIndex>=movies.length){
currentIndex=0;
}

openPlayer(currentIndex);

});

document.getElementById('prevBtn').addEventListener('click',()=>{

currentIndex--;

if(currentIndex<0){
currentIndex=movies.length-1;
}

openPlayer(currentIndex);

});

function closeModal(){

playbackModal.classList.remove('active');

modalVideo.pause();

document.body.style.overflow='';

}

document.getElementById('closeBtn').addEventListener('click',closeModal);

document.getElementById('topCloseBtn').addEventListener('click',closeModal);

playbackModal.addEventListener('click',(e)=>{

if(e.target===playbackModal){
closeModal();
}

});

/* =========================
   KEYBOARD
========================= */

document.addEventListener('keydown',(e)=>{

if(!playbackModal.classList.contains('active')) return;

switch(e.key.toLowerCase()){

case ' ':
e.preventDefault();

if(modalVideo.paused){
modalVideo.play();
}else{
modalVideo.pause();
}
break;

case 'escape':
closeModal();
break;

case 'f':
modalVideo.requestFullscreen();
break;

case 'm':
modalVideo.muted=!modalVideo.muted;
break;

}

});

</script>

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>

<style>
html, body {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    overflow-x: hidden;
}

/* Disable image dragging */
img {
    pointer-events: none;
    -webkit-user-drag: none;
}

/* Hide selection */
::selection {
    background: transparent;
}
</style>
