<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>The Lord of the Rings - Cinematic Archive</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Outfit:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary: #d4af37;     /* Ring Gold */
      --accent: #e67e22;      /* Mount Doom Orange */
      --secondary: #0c0f14;   /* Obsidian Shadows */
      --muted: #94a3b8;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at 50% 0%, #1a1510 0%, #07090c 75%);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .movie-card {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: rgba(15, 18, 24, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 175, 55, 0.08);
    }
    
    .movie-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: var(--primary);
      box-shadow: 0 15px 35px rgba(212, 175, 55, 0.15);
    }
    
    .movie-poster-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7, 9, 12, 0.95) 0%, rgba(7, 9, 12, 0) 50%);
      opacity: 0.85;
      transition: opacity 0.3s;
    }

    .movie-card:hover .movie-poster-wrapper::after {
      opacity: 0.4;
    }
    
    .animate-logo {
      animation: float-pulse 4s ease-in-out infinite, glow-logo 2.5s ease-in-out infinite alternate;
    }

    @keyframes float-pulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.02); }
    }

    @keyframes glow-logo {
      0% { filter: drop-shadow(0 0 4px rgba(212, 175, 55, 0.5)) drop-shadow(0 0 12px rgba(230, 126, 34, 0.3)); }
      100% { filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.8)) drop-shadow(0 0 25px rgba(230, 126, 34, 0.5)); }
    }

    /* Custom elegant scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #07090c;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
    
    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    
    /* Illumination modal styles */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(4, 5, 7, 0.96); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
      padding: 12px;
    }
    .modal-backdrop.active { display:flex; }
    
    .modal-card { 
      width: 100%;
      max-width: 1000px;
      border-radius: 16px;
      overflow: hidden;
      background: #0c0f14;
      border: 1px solid rgba(212, 175, 55, 0.15);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
    }

    .player-wrapper { 
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
      background: #000;
    }

    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .player-meta { 
      padding: 20px;
      background: #07090c;
      border-top: 1px solid rgba(212, 175, 55, 0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    /* Vibrant thematic responsive button combinations */
    .btn {
      background: rgba(255, 255, 255, 0.02);
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      flex: 1;
      min-width: 80px;
    }

    .btn-nav { border: 1px solid var(--primary); color: var(--primary); }
    .btn-nav:hover { background: var(--primary); color: #000; box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
    
    .btn-action { border: 1px solid var(--accent); color: var(--accent); }
    .btn-action:hover { background: var(--accent); color: white; box-shadow: 0 0 12px rgba(230, 126, 34, 0.4); }

    .btn-utility { border: 1px solid #14b8a6; color: #14b8a6; }
    .btn-utility:hover { background: #14b8a6; color: #000; }

    .btn-close { border: 1px solid #ef4444; color: #f87171; }
    .btn-close:hover { background: #ef4444; color: white; }

    @media (min-width: 768px) {
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .controls-row {
        flex-wrap: nowrap;
        justify-content: flex-end;
      }
      .btn {
        flex: unset;
        min-width: auto;
      }
    }

    @media (max-width: 480px) {
      .btn span { display: none; }
      .btn { padding: 12px; min-width: 45px; }
      .btn i { margin: 0 !important; font-size: 1.1rem; }
    }

    video:fullscreen, iframe:fullscreen {
      object-fit: contain !important;
      background-color: black;
    }
</style>
</head>
<body class="relative">

<!-- Floating Cosmic Overlay Background Elements -->
<div class="fixed inset-0 overflow-hidden -z-10">
  <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/90"></div>
  <div class="stars"></div>
  <div class="stars2"></div>
</div>

<div class="container mx-auto px-4 py-4 md:py-6 max-w-7xl">
  
  <!-- Dynamic Video Banner Display Panel (Hidden completely on mobile, displays smoothly on desktop) -->
  <div class="hidden md:block relative w-full h-[350px] md:h-[450px] overflow-hidden rounded-2xl border border-yellow-500/10 shadow-2xl mb-10">
    <iframe 
      src="https://www.youtube.com/embed/7lwJOxN_gXc?autoplay=1&mute=1&loop=1&playlist=7lwJOxN_gXc&controls=0&modestbranding=1"
      class="absolute top-0 left-0 w-full h-full pointer-events-none scale-105 object-cover">
    </iframe>
    <div class="absolute inset-0 bg-gradient-to-r from-[#07090c] via-transparent to-transparent"></div>
    <img 
      src="https://brandpalettes.com/wp-content/uploads/2022/05/Lord-of-The-Rings-Logo.png" 
      alt="The Lord of the Rings Logo" 
      class="absolute bottom-6 left-6 h-16 sm:h-22 md:h-28 animate-logo z-10"
    />
  </div>

  <!-- Mobile Clean Header (Ensures immediate visibility of layout grid without needing to scroll) -->
  <div class="block md:hidden text-center my-4">
    <img 
      src="https://brandpalettes.com/wp-content/uploads/2022/05/Lord-of-The-Rings-Logo.png" 
      alt="The Lord of the Rings Logo" 
      class="h-16 mx-auto drop-shadow-[0_0_8px_rgba(212,175,55,0.6)] mb-2"
    />
  </div>

  <!-- Dynamic Section Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-2 mb-6 pb-4 border-b border-yellow-500/10 text-center md:text-left">
    <div>
      <h2 style="font-family: 'Cinzel', serif;" class="text-xl sm:text-2xl md:text-3xl font-bold tracking-wider text-white flex items-center justify-center md:justify-start gap-2">
        <i class="fas fa-ring text-yellow-500"></i> The Legendary Trilogy
      </h2>
      <p class="text-xs sm:text-sm text-slate-400 mt-1">Select an epic saga below to begin high-definition streaming immediately.</p>
    </div>
  </div>

  <!-- Movies Grid (Flawless 2-column layout natively adapted for mobile devices) -->
  <div class="mb-16">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6" id="movies"></div>
  </div>

  <!-- Footer / Social Connections -->
  <div class="border-t border-yellow-500/10 pt-8 pb-6 text-center text-gray-500">
    <div class="flex justify-center gap-6 mb-4 text-lg">
      <a href="#" class="text-gray-400 hover:text-yellow-500 transition"><i class="fab fa-facebook-f"></i></a>
      <a href="#" class="text-gray-400 hover:text-yellow-500 transition"><i class="fab fa-twitter"></i></a>
      <a href="https://www.instagram.com/stark_4152/reels" class="text-gray-400 hover:text-yellow-500 transition"><i class="fab fa-instagram"></i></a>
      <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="text-gray-400 hover:text-yellow-500 transition"><i class="fab fa-youtube"></i></a>
    </div>
    <p class="text-xs tracking-wider uppercase text-yellow-600/60">&copy; Middle-Earth Fan Portal</p>
  </div>
</div>

<!-- Re-designed Fluid Illumination-Logic Modal Player Architecture -->
<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" class="absolute top-4 right-4 z-10 bg-black/80 hover:bg-red-600 text-white rounded-full w-10 h-10 flex items-center justify-center transition shadow-lg">
        <i class="fas fa-times text-lg"></i>
      </button>
    </div>

    <div class="player-meta">
      <div class="meta-left max-w-xl">
        <h3 id="modalTitle" class="text-base sm:text-lg font-bold text-white tracking-wide truncate">Title</h3>
        <p id="modalDesc" class="text-xs text-slate-400 mt-1 line-clamp-2 md:line-clamp-none"></p>
      </div>
      <div class="controls-row">
        <button id="prevBtn" class="btn btn-nav"><i class="fas fa-step-backward"></i><span>Prev</span></button>
        <button id="playPauseBtn" class="btn btn-action"><i class="fas fa-play"></i><span>Play</span></button>
        <button id="nextBtn" class="btn btn-nav"><span>Next</span><i class="fas fa-step-forward"></i></button>
        <button id="fullscreenBtn" class="btn btn-utility"><i class="fas fa-expand"></i><span>Full</span></button>
        <button id="muteBtn" class="btn btn-utility"><i class="fas fa-volume-up"></i><span>Mute</span></button>
        <button id="closeBtn" class="btn btn-close"><i class="fas fa-times"></i><span>Close</span></button>
      </div>
    </div>
  </div>
</div>

<script>
    // Completely expanded data array with detailed descriptions
    const movies = [
      { 
        title: "The Lord of the Rings: The Fellowship of the Ring", 
        video: "https://mega.nz/embed/v75hRTTJ#vS0hfK52HAj6KMpD5eHXXoR8hcRiYQcvIxmTOd2chGo",
        image: "https://image.tmdb.org/t/p/w500/6oom5QYQ2yQTMJIbnvbkBL9cHo6.jpg",
        year: 2001,
        duration: "2h 58m",
        description: "An ancient Ring thought lost for centuries has been found, and given to a small Hobbit named Frodo. When Gandalf discovers the Ring is in fact the One Ring of the Dark Lord Sauron, Frodo must make an epic quest to the Cracks of Doom in order to destroy it."
      },
      { 
        title: "The Lord of the Rings: The Two Towers", 
        video: "https://mega.nz/embed/XzYggbAS#aJG4fAx1mAAxKTVb-eAOTSpUU0Sm2r6oIIebAatKGcA",
        image: "https://image.tmdb.org/t/p/w500/5VTN0pR8gcqV3EPUHHfMGnJYN9L.jpg",
        year: 2002,
        duration: "2h 59m",
        description: "Frodo and Samwise press on toward Mordor with the help of the treacherous Gollum, while Aragorn, Legolas, and Gimli unite with the kingdom of Rohan to take a stand against the rising darkness of Saruman's armies at Helm's Deep."
      },
      { 
        title: "The Lord of the Rings: The Return of the King", 
        video: "https://mega.nz/embed/mjgxyS6b#NYIxanCj4Q-MHpVbIZgTyLVa-snoZD2FdmzHvE8hs0I",
        image: "https://image.tmdb.org/t/p/w500/rCzpDGLbOoPwLjy3OAm5NUPOTrC.jpg",
        year: 2003,
        duration: "3h 21m",
        description: "The final confrontation between the forces of good and evil fighting for control of Middle-earth. Aragorn is revealed as the heir to the ancient kings as he leads the armies of men in a desperate battle to distract Sauron, giving Frodo his final chance to destroy the Ring."
      }
    ];

    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) return;
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || '';

      resetPlayerContainer();
      showModal();

      let src = movie.video;
      if (!src) return;
      const lc = src.toLowerCase();

      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('mega.nz') || lc.includes('openload') || lc.includes('drive.google.com')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isYouTube(src)) {
        let embed = src;
        try {
          if (src.includes('watch') && src.includes('v=')) {
            const v = new URLSearchParams(src.split('?')[1]).get('v');
            if (v) embed = `https://www.youtube.com/embed/${v}`;
          } else if (src.includes('youtu.be/')) {
            const p = src.split('youtu.be/')[1].split(/[?&]/)[0];
            if (p) embed = `https://www.youtube.com/embed/${p}`;
          }
        } catch (e) {}
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(src);
          currentHls.attachMedia(v);
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        }
        return;
      }

      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }
    }

    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
      }
    }
    
    function playNext() {
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
    }
    
    function playPrev() {
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
    }
    
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=>{});
      } else {
        document.exitFullscreen();
      }
    }
    
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i><span>Unmute</span>' : '<i class="fas fa-volume-up"></i><span>Mute</span>';
    }

    function closeModalHandler() {
      if (currentHls) { try { currentHls.destroy(); } catch(e) {} currentHls = null; }
      const v = document.getElementById(modalVideoId);
      if (v) { try { v.pause(); } catch(e){} }
      resetPlayerContainer();
      hideModal();
      playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);

    playbackModal.addEventListener('click', function(e){
      if (e.target === playbackModal) closeModalHandler();
    });

    document.addEventListener('keydown', (e) => {
      if (!playbackModal.classList.contains('active')) return;
      switch (e.key.toLowerCase()) {
        case 'escape': closeModalHandler(); break;
        case ' ': e.preventDefault(); togglePlayPause(); break;
        case 'arrowright': { const v = document.getElementById(modalVideoId); if (v) v.currentTime = Math.max(0, v.currentTime + 10); break; }
        case 'arrowleft': { const v = document.getElementById(modalVideoId); if (v) v.currentTime = Math.max(0, v.currentTime - 10); break; }
        case 'f': toggleFullscreen(); break;
        case 'm': toggleMute(); break;
        case 'n': playNext(); break;
        case 'p': playPrev(); break;
      }
    });

    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 3) * 100}`;
        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-2xl overflow-hidden cursor-pointer flex flex-col justify-between`;
        div.innerHTML = `
          <div class="relative overflow-hidden movie-poster-wrapper aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
            <div class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 transition-opacity duration-300 flex items-center justify-center z-10">
              <span class="w-11 h-11 sm:w-12 sm:h-12 rounded-full bg-yellow-500 text-black flex items-center justify-center font-bold shadow-lg transform scale-90 hover:scale-100 transition-all shadow-yellow-500/40">
                <i class="fas fa-play ml-0.5 text-sm sm:text-base"></i>
              </span>
            </div>
          </div>
          <div class="p-3 sm:p-4 bg-[#0c0f14]">
            <h3 class="font-bold text-xs sm:text-sm md:text-base tracking-wide line-clamp-1 text-white">${movie.title}</h3>
            <div class="flex justify-between items-center mt-2 text-[11px] sm:text-xs text-gray-400">
              <span>${movie.year || ''}</span>
              <span class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 text-[9px] sm:text-[10px] text-yellow-500">${movie.duration || '3h'}</span>
            </div>
          </div>
        `;
        div.addEventListener('click', () => openPlayer(moviesToRender, index));
        container.appendChild(div);
      });
    }

    renderMovies(movies);

    function createStars(containerElement, count, sizeRange, durationRange) {
      if (!containerElement) return;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'absolute rounded-full bg-white';
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.opacity = Math.random() * 0.4 + 0.1;
        star.style.animation = `float ${durationRange[0] + Math.random() * (durationRange[1] - durationRange[0])}s infinite ease-in-out alternate`;
        containerElement.appendChild(star);
      }
    }

    const starsContainer = document.querySelector('.stars');
    const starsContainer2 = document.querySelector('.stars2');
    createStars(starsContainer, 40, [1, 2], [6, 12]);
    createStars(starsContainer2, 20, [2, 3], [10, 18]);

    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes float {
        0% { transform: translateY(0px) translateX(0px); }
        100% { transform: translateY(-15px) translateX(8px); }
      }
    `;
    document.head.appendChild(style);
</script>

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>

<style>
html, body {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    overflow-x: hidden;
}

/* Disable image dragging */
img {
    pointer-events: none;
    -webkit-user-drag: none;
}

/* Hide selection */
::selection {
    background: transparent;
}
</style>
