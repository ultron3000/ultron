<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cloud TV</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    @supports (height: 100dvh) {
      iframe {
        height: 100dvh;
      }
    }
  </style>
</head>
<body>

  <iframe
    src="https://bhoomsports.com/"
    allowfullscreen
    loading="eager">
  </iframe>

</body>
</html>
