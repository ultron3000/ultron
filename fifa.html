  let hlsInstance = null;

  function buildScheduleGrid() {
    const grid = document.getElementById("matchScheduleGrid");
    grid.innerHTML = "";

    fifaMatches.forEach(match => {
      const kickoff = new Date(match.kickoffTime);
      let statusHtml = "";
      let actionButtonHtml = "";
      let customCardClass = "";

      if (match.status === "COMPLETED") {
        statusHtml = `<span class="bg-gray-700 text-white text-xs px-3 py-1 rounded-full font-semibold"><i class="fas fa-history mr-1"></i> FINISHED</span>`;
        actionButtonHtml = `
          <button onclick="launchStream('${match.videoUrl}', '${match.teamA} vs ${match.teamB} (Replay)')" class="w-full mt-4 bg-gray-800 hover:bg-gray-700 text-yellow-400 font-bold py-2.5 rounded-lg text-sm transition flex items-center justify-center gap-2 border border-yellow-400/20">
            <i class="fas fa-play-circle text-xs"></i> WATCH MATCH REPLAY
          </button>`;
      } else if (match.status === "LIVE") {
        customCardClass = "live-glow-card";
        statusHtml = `<span class="bg-red-600 text-white text-xs px-3 py-1 rounded-full font-bold animate-pulse flex items-center gap-1.5"><span class="h-2 w-2 rounded-full bg-white block"></span> LIVE NOW</span>`;

            <i class="fas fa-play text-xs"></i> WATCH LIVE STREAM
          </button>`;
      } else {
        statusHtml = `<span class="bg-blue-600/20 text-blue-400 border border-blue-500/30 text-xs px-3 py-1 rounded-full font-medium"><i class="fas fa-clock mr-1"></i> UPCOMING</span>`;
        actionButtonHtml = `
          <button disabled class="w-full mt-4 bg-gray-800 border border-gray-700 text-gray-500 font-medium py-2.5 rounded-lg text-sm cursor-not-allowed">
            STREAMS COMING SOON
          </button>`;
      }

      const matchCard = `
        <div class="bg-gray-900/60 border border-gray-800 rounded-xl overflow-hidden shadow-xl flex flex-col hover:border-yellow-400/30 transition-all duration-300 ${customCardClass}">
          <div class="relative aspect-video w-full bg-cover bg-center" style="background-image: url('${match.poster}')">

                  <span class="text-sm font-semibold text-white tracking-wide truncate max-w-[100px]">${match.teamA}</span>
                </div>
                <div class="flex flex-col items-center">
                  <span class="text-base font-black ${match.status === 'LIVE' ? 'text-red-500 bg-red-500/10' : 'text-yellow-400 bg-yellow-400/10'} px-3 py-1 rounded tracking-widest">${match.score}</span>
                </div>
                <div class="flex flex-col items-center flex-1 text-center">
                  <img src="${match.flagB}" class="w-10 h-7 object-cover rounded shadow-md border border-gray-800 mb-1" onerror="this.src='https://flagcdn.com/un.svg'" />
                  <span class="text-sm font-semibold text-white tracking-wide truncate max-w-[100px]">${match.teamB}</span>
                </div>
              </div>
              <p class="text-xs text-gray-400 text-center border-t border-gray-800/60 pt-3">
                <i class="far fa-calendar text-yellow-400/70 mr-1"></i> ${kickoff.toLocaleString([], { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
              </p>
            </div>
            ${actionButtonHtml}
          </div>
        </div>`;
        
      grid.innerHTML += matchCard;
    });
  }

  async function launchStream(url, title) {
    if(!url || url === "#") return alert("No video link configured for this match yet.");
    const modal = document.getElementById("playbackModal");
    const video = document.getElementById("modalVideo");
    document.getElementById("modalTitle").innerText = title;
    
    modal.classList.add("active");
    if (typeof shaka !== 'undefined') shaka.polyfill.installAll();

    if (shaka.Player.isBrowserSupported()) {
      if (shakaPlayerInstance) await shakaPlayerInstance.destroy();
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

      shakaPlayerInstance = new shaka.Player(video);
      shakaPlayerInstance.configure({
        streaming: {
          lowLatencyMode: true,
          rebufferingGoal: 2,
          bufferingGoal: 5
        }
      });

      shakaPlayerInstance.addEventListener('error', (event) => {
        console.error('Shaka Player error:', event.detail);
      });

      try {
        await shakaPlayerInstance.load(url);
        video.play().catch(err => console.log("Autoplay context note: ", err));
      } catch (error) {
        console.warn("Shaka failure, shifting layout context to native Hls.js initialization loop", error);
        fallbackToHls(url, video);
      }
    } else {
      fallbackToHls(url, video);
    }
  }

  function fallbackToHls(url, video) {
    if (Hls.isSupported()) {
      if (hlsInstance) hlsInstance.destroy();
      hlsInstance = new Hls({ maxMaxBufferLength: 10, enableWorker: true, lowLatencyMode: true });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.addEventListener('loadedmetadata', () => video.play());
    }
  }

  async function closePlayer() {
    const modal = document.getElementById("playbackModal");
    const video = document.getElementById("modalVideo");
    
    modal.classList.remove("active");
    video.pause();
    
    if (shakaPlayerInstance) {
      await shakaPlayerInstance.destroy();
      shakaPlayerInstance = null;
    }
    if (hlsInstance) {
      hlsInstance.destroy();
      hlsInstance = null;
    }
    video.src = "";
  }

  window.onload = buildScheduleGrid;
</script>

document.addEventListener("keydown", function (e) {

    // F12

        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>

html, body {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    overflow-x: hidden;
}

/* Disable image dragging */
img {
    pointer-events: none;
    -webkit-user-drag: none;
}

/* Hide selection */
::selection {
    background: transparent;
}
</style>
