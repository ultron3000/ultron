<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Hotel Transylvania</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --primary: #c084fc;     /* Ghostly Neon Purple */
      --accent: #f97316;      /* Spooky Pumpkin Orange */
      --secondary: #0b071e;   /* Deep Vampire Midnight */
      --muted: #94a3b8;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at 50% 0%, #1e113c 0%, #060410 75%);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .movie-card {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: rgba(18, 10, 36, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(192, 132, 252, 0.1);
    }
    
    .movie-card:hover {
      transform: translateY(-10px) scale(1.03);
      border-color: var(--accent);
      box-shadow: 0 15px 30px rgba(249, 115, 22, 0.25);
    }
    
    .movie-poster-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(6, 4, 16, 0.95) 0%, rgba(6, 4, 16, 0) 60%);
      opacity: 0.85;
      transition: opacity 0.3s;
    }

    .movie-card:hover .movie-poster-wrapper::after {
      opacity: 0.4;
    }
    
    .animate-logo {
      animation: float-pulse 4s ease-in-out infinite, glow-logo 2.5s ease-in-out infinite alternate;
    }

    @keyframes float-pulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.02); }
    }

    @keyframes glow-logo {
      0% { filter: drop-shadow(0 0 5px rgba(192, 132, 252, 0.6)) drop-shadow(0 0 15px rgba(249, 115, 22, 0.3)); }
      100% { filter: drop-shadow(0 0 15px rgba(192, 132, 252, 0.8)) drop-shadow(0 0 30px rgba(249, 115, 22, 0.6)); }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #060410;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
    
    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    /* Illumination modal styles */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(3, 2, 8, 0.96); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
      padding: 12px;
    }
    .modal-backdrop.active { display:flex; }
    
    .modal-card { 
      width: 100%;
      max-width: 1000px;
      border-radius: 16px;
      overflow: hidden;
      background: #0b071e;
      border: 1px solid rgba(192, 132, 252, 0.15);
      box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
    }

    .player-wrapper { 
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
      background: #000;
    }

    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .player-meta { 
      padding: 20px;
      background: #060410;
      border-top: 1px solid rgba(192, 132, 252, 0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    /* Vibrant thematic custom button rules */
    .btn {
      background: rgba(255, 255, 255, 0.02);
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      flex: 1;
      min-width: 80px;
    }

    .btn-nav { border: 1px solid var(--primary); color: var(--primary); }
    .btn-nav:hover { background: var(--primary); color: #000; box-shadow: 0 0 10px rgba(192, 132, 252, 0.4); }
    
    .btn-action { border: 1px solid var(--accent); color: var(--accent); }
    .btn-action:hover { background: var(--accent); color: white; box-shadow: 0 0 12px rgba(249, 115, 22, 0.5); }

    .btn-utility { border: 1px solid #a855f7; color: #c084fc; }
    .btn-utility:hover { background: #a855f7; color: white; }

    .btn-close { border: 1px solid #ef4444; color: #f87171; }
    .btn-close:hover { background: #ef4444; color: white; }

    @media (min-width: 768px) {
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .controls-row {
        flex-wrap: nowrap;
        justify-content: flex-end;
      }
      .btn {
        flex: unset;
        min-width: auto;
      }
    }

    @media (max-width: 480px) {
      .btn span { display: none; }
      .btn { padding: 12px; min-width: 45px; }
      .btn i { margin: 0 !important; font-size: 1.1rem; }
    }

    /* Video Fullscreen Mode Configurations */
    video:fullscreen, iframe:fullscreen {
      object-fit: contain !important;
      background-color: black;
    }
  </style>
</head>

<script>
    // Completely Restored Core Movies Array Datastore
    const movies = [
      { title: "Hotel Transylvania", video: "https://mega.nz/embed/CtJTnD6a#1ZEnE7CNBLs8QkWdw9OJhNwG2h6lVxIcfmepdJZeTx4", image: "https://ih1.redbubble.net/image.3223251000.0401/flat,750x,075,f-pad,750x1000,f8f8f8.jpg", category: "feature", year: 2012, runtime: "1h 31m" },
      { title: "Hotel Transylvania 2", video: "00", image: "https://wallpapersok.com/images/thumbnail/hotel-transylvania-2-movie-poster-1y20yiyca8eqleek.jpg", category: "sequel", year: 2015, runtime: "1h 29m" },
      { title: "Hotel Transylvania 3: Summer Vacation", video: "00", image: "https://m.media-amazon.com/images/I/815ZZwPNoDL._AC_UF1000,1000_QL80_.jpg", category: "sequel", year: 2018, runtime: "1h 37m" },
      { title: "Hotel Transylvania: Transformania", video: "https://mega.nz/embed/nooyWZLY#hpDLVMAlPaQVaHqI-To3dUwjqyfeZAza6n5T3QAmjMI", image: "https://image.tmdb.org/t/p/original/cxUohYPyCU6NFEFSPCSkj5YAWGr.jpg", category: "sequel", year: 2022, runtime: "1h 27m" },
      { title: "Hotel Transylvania: Puppy!", video: "00", image: "https://m.media-amazon.com/images/M/MV5BMTY3MTE1MjE4Ml5BMl5BanBnXkFtZTgwMjEyMjI0MjI@._V1_.jpg", category: "short", year: 2017, runtime: "5m" },
      { title: "Monster Pets: A Hotel Transylvania Short", video: "00", image: "https://m.media-amazon.com/images/S/pv-target-images/19babaaa676f43f396922c248bc6a810f2f04f2c1b806a369414e4db5dec8599.jpg", category: "short", year: 2021, runtime: "6m" }
    ];

    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) return;
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = `${movie.title} (${movie.year || 'N/A'}) - Hotel Transylvania Official Release. Stream Runtime: ${movie.runtime || 'N/A'}`;

      resetPlayerContainer();
      showModal();

      let src = movie.video;
      if (!src) return;
      const lc = src.toLowerCase();

      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('mega.nz') || lc.includes('openload') || lc.includes('drive.google.com')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isYouTube(src)) {
        let embed = src;
        try {
          if (src.includes('watch') && src.includes('v=')) {
            const v = new URLSearchParams(src.split('?')[1]).get('v');
            if (v) embed = `https://www.youtube.com/embed/${v}`;
          } else if (src.includes('youtu.be/')) {
            const p = src.split('youtu.be/')[1].split(/[?&]/)[0];
            if (p) embed = `https://www.youtube.com/embed/${p}`;
          }
        } catch (e) {}
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }

      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(src);
          currentHls.attachMedia(v);
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        }
        return;
      }

      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
        return;
      }
    }

    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i><span>Pause</span>';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
      }
    }
    
    function playNext() {
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
    }
    
    function playPrev() {
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
    }
    
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=>{});
      } else {
        document.exitFullscreen();
      }
    }
    
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i><span>Unmute</span>' : '<i class="fas fa-volume-up"></i><span>Mute</span>';
    }

    function closeModalHandler() {
      if (currentHls) { try { currentHls.destroy(); } catch(e) {} currentHls = null; }
      const v = document.getElementById(modalVideoId);
      if (v) { try { v.pause(); } catch(e){} }
      resetPlayerContainer();
      hideModal();
      playPauseBtn.innerHTML = '<i class="fas fa-play"></i><span>Play</span>';
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);

    playbackModal.addEventListener('click', function(e){
      if (e.target === playbackModal) closeModalHandler();
    });

    // Keyboard Key Binding Control Engine
    document.addEventListener('keydown', (e) => {
      if (!playbackModal.classList.contains('active')) return;
      switch (e.key.toLowerCase()) {
        case 'escape': closeModalHandler(); break;
        case ' ': e.preventDefault(); togglePlayPause(); break;
        case 'f': toggleFullscreen(); break;
        case 'm': toggleMute(); break;
        case 'n': playNext(); break;
        case 'p': playPrev(); break;
      }
    });

    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 4) * 100}`;
        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-2xl overflow-hidden cursor-pointer flex flex-col justify-between`;
        div.innerHTML = `
          <div class="relative overflow-hidden movie-poster-wrapper aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
            <div class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 transition-opacity duration-300 flex items-center justify-center z-10">
              <span class="w-12 h-12 rounded-full bg-purple-500 text-white flex items-center justify-center font-bold shadow-lg transform scale-90 hover:scale-100 transition-all shadow-purple-500/50">
                <i class="fas fa-play ml-0.5"></i>
              </span>
            </div>
          </div>
          <div class="p-3 sm:p-4 bg-[#0b071e]">
            <h3 class="font-bold text-sm sm:text-base tracking-wide line-clamp-1 text-white">${movie.title}</h3>
            <div class="flex justify-between items-center mt-2 text-xs text-gray-400">
              <span>${movie.year || ''}</span>
              <span class="px-1.5 py-0.5 rounded bg-purple-500/10 border border-purple-500/20 text-[10px] text-orange-400">${movie.runtime || ''}</span>
            </div>
          </div>
        `;
        div.addEventListener('click', () => openPlayer(moviesToRender, index));
        container.appendChild(div);
      });
    }

    renderMovies(movies);

    function createStars(containerElement, count, sizeRange, durationRange) {
      if (!containerElement) return;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'absolute rounded-full bg-white';
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.opacity = Math.random() * 0.4 + 0.1;
        star.style.animation = `float ${durationRange[0] + Math.random() * (durationRange[1] - durationRange[0])}s infinite ease-in-out alternate`;
        containerElement.appendChild(star);
      }
    }

    const starsContainer = document.querySelector('.stars');
    const starsContainer2 = document.querySelector('.stars2');
    createStars(starsContainer, 40, [1, 2], [6, 12]);
    createStars(starsContainer2, 20, [2, 3], [10, 18]);

    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes float {
        0% { transform: translateY(0px) translateX(0px); }
        100% { transform: translateY(-15px) translateX(8px); }
      }
    `;
    document.head.appendChild(style);
</script>

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>

html, body {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    overflow-x: hidden;
}

/* Disable image dragging */
img {
    pointer-events: none;
    -webkit-user-drag: none;
}

/* Hide selection */
::selection {
    background: transparent;
}
</style>
