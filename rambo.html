<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Rambo Cinematic Universe</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Impact&family=Poppins:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary: #dc2626; /* Blood Red */
      --primary-hover: #b91c1c;
      --bg-dark: #0a0e14; /* Deep Gunmetal Black */
      --card-bg: #141b24; /* Tactical Plate Gray */
      --accent-green: #3f6212; /* Military Olive */
      --muted: #9ca3af;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #0a0e14 0%, #1c1917 50%, #0a0e14 100%);
      color: #e5e7eb;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .military-font {
      font-family: 'Impact', 'Arial Black', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    
    .movie-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }
    
    .movie-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 12px 30px rgba(220, 38, 38, 0.25);
      border-color: rgba(220, 38, 38, 0.4);
    }
    
    .movie-poster {
      aspect-ratio: 2/3;
      transition: transform 0.5s ease;
    }
    
    .movie-card:hover .movie-poster {
      transform: scale(1.04);
    }
    
    /* Custom war-themed scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #0a0e14;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-hover);
    }
    
    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s ease forwards;
    }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    
    /* Responsive Modal Backdrop */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(0,0,0,0.92); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
      padding: 0;
      backdrop-filter: blur(4px);
    }
    .modal-backdrop.active { display:flex; }
    
    .modal-card { 
      width: 100%;
      height: 100%;
      max-width: 1024px;
      max-height: 100vh;
      border-radius: 0;
      overflow-y: auto;
      background: #0f141c;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
    }
    
    .player-wrapper { 
      position: relative;
      flex: 1;
      min-height: 45vh;
      background: #000;
    }
    
    #topCloseBtn { 
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 50;
      background: rgba(220, 38, 38, 0.85);
      color: white;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    #topCloseBtn:hover {
      background: rgb(220, 38, 38);
      transform: scale(1.1);
    }
    
    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
      color: #f3f4f6;
      background: #0f141c;
      border-top: 2px solid rgba(220, 38, 38, 0.3);
    }
    .player-meta .meta-left { 
      width: 100%;
    }
    .player-meta h3 { 
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: #ffffff;
    }
    .player-meta p { 
      margin: 8px 0 0 0;
      color: #9ca3af;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    /* Distinct Visual Button Palettes */
    .btn {
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      flex: 1;
      min-width: calc(33.33% - 6px);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .btn-nav { background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; }
    .btn-nav:hover { background: #3f3f46; }
    
    .btn-play { background: #dc2626; color: #ffffff; border: 1px solid #ef4444; font-weight: 600; }
    .btn-play:hover { background: #b91c1c; }
    
    .btn-expand { background: #4b5563; color: #f9fafb; border: 1px solid #6b7280; }
    .btn-expand:hover { background: #374151; }
    
    .btn-volume { background: #d97706; color: #ffffff; border: 1px solid #f59e0b; }
    .btn-volume:hover { background: #b45309; }
    
    .btn-dismiss { background: #1f2937; color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    .btn-dismiss:hover { background: #dc2626; color: #ffffff; }

    /* Responsive Design rules */
    @media (min-width: 768px) {
      .modal-card {
        width: 90%;
        height: auto;
        border-radius: 10px;
        max-height: 90vh;
        overflow: hidden;
      }
      .player-wrapper {
        padding-bottom: 54%;
        height: 0;
        flex: none;
      }
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
      }
      .player-meta .meta-left {
        max-width: 50%;
      }
      .controls-row {
        width: auto;
        flex-wrap: nowrap;
        justify-content: flex-end;
        gap: 10px;
      }
      .btn {
        flex: none;
        min-width: 100px;
        padding: 10px 16px;
      }
      #topCloseBtn {
        opacity: 0.7;
      }
      .player-wrapper:hover #topCloseBtn {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .btn {
        padding: 12px 6px;
        font-size: 11px;
      }
    }
</style>
</head>
<body>

<!-- Combat Grid Backdrop Elements -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none opacity-20">
  <div class="absolute inset-0 bg-[radial-gradient(#262626_1px,transparent_1px)] [background-size:16px_16px]"></div>
</div>

<div class="container mx-auto px-4 py-6 max-w-7xl">

  <!-- War-Themed Cinematic Hero Section -->
  <div class="relative w-full h-[240px] sm:h-[350px] md:h-[460px] rounded-2xl overflow-hidden mb-10 shadow-2xl border border-stone-800">
    <!-- Embedded Dynamic Trailer Background -->
    <iframe 
      src="https://www.youtube.com/embed/Fu8-R4Al0Wc?autoplay=1&mute=1&loop=1&playlist=Fu8-R4Al0Wc&controls=0&modestbranding=1&showinfo=0&rel=0"
      frameborder="0" 
      allow="autoplay; fullscreen" 
      class="absolute top-0 left-0 w-full h-full object-cover scale-110 pointer-events-none select-none">
    </iframe>

    <!-- Dark Tactical Overlay Gradient -->
    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0e14] via-[#0a0e14]/50 to-transparent"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-[#0a0e14] via-transparent to-transparent"></div>

    <!-- Floating Franchise Branding Plate -->
    <div class="absolute bottom-6 left-6 md:left-10 z-10 flex flex-col max-w-md items-start">
      <img 
        src="https://upload.wikimedia.org/wikipedia/en/thumb/5/54/Rambo_franchise_logo.png/330px-Rambo_franchise_logo.png" 
        alt="Rambo Franchise Logo" 
        class="h-14 sm:h-20 md:h-28 object-contain animate-logo mb-2"
      />
      <p class="text-xs sm:text-sm font-semibold tracking-widest text-red-500 bg-black/60 px-3 py-1 rounded border border-red-900/40 uppercase">
        <i class="fas fa-crosshairs mr-1 text-xs"></i> Cinematic Universe
      </p>
    </div>
  </div>

  <style>
    /* Premium Tactical Silhouette Glow Effect */
    .animate-logo {
      animation: float-pulse 4s ease-in-out infinite, glow-logo 3s ease-in-out infinite alternate;
    }
    @keyframes float-pulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes glow-logo {
      0% { filter: drop-shadow(0 0 2px rgba(220,38,38,0.4)) drop-shadow(0 0 4px rgba(0,0,0,0.8)); }
      50% { filter: drop-shadow(0 0 10px rgba(220,38,38,0.85)) drop-shadow(0 0 14px rgba(220,38,38,0.4)); }
      100% { filter: drop-shadow(0 0 2px rgba(220,38,38,0.4)) drop-shadow(0 0 4px rgba(0,0,0,0.8)); }
    }
  </style>

  <!-- Section Header -->
  <div class="flex items-center gap-3 mb-6 border-b border-stone-800 pb-3">
    <div class="w-2 h-7 bg-red-600 rounded-sm"></div>
    <h2 class="text-xl sm:text-2xl font-bold military-font tracking-wide text-white">Select Operations Briefing</h2>
  </div>

  <!-- Movies Grid Layer: 2-columns on mobile, neatly scales higher up -->
  <div class="mb-14">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-5 gap-4 sm:gap-6" id="movies"></div>
  </div>

  <!-- Footer / Social Media Channels -->
  <div class="border-t border-stone-800 mt-12 pt-6 text-center text-stone-500 text-sm">
    <p class="mb-4 text-stone-400">Follow the Rambo Legacy Networks</p>
    <div class="flex justify-center gap-6 text-lg">
      <a href="#" class="text-stone-400 hover:text-red-500 transition-colors"><i class="fab fa-facebook-f"></i></a>
      <a href="#" class="text-stone-400 hover:text-red-500 transition-colors"><i class="fab fa-twitter"></i></a>
      <a href="https://www.instagram.com/stark_4152/reels" class="text-stone-400 hover:text-red-500 transition-colors"><i class="fab fa-instagram"></i></a>
      <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="text-stone-400 hover:text-red-500 transition-colors"><i class="fab fa-youtube"></i></a>
    </div>
    <p class="mt-6 text-xs text-stone-600">&copy; 2026 Rambo Hub. All Mission Protocols Standardized.</p>
  </div>
</div>

<!-- Custom High-Fidelity Tactical Modal Window Player -->
<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <!-- Media target injection module -->
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" title="Close Mission Viewer">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="player-meta">
      <div class="meta-left">
        <h3 id="modalTitle">Operation Title</h3>
        <p id="modalDesc"></p>
      </div>
      <div class="controls-row">
        <button id="prevBtn" class="btn btn-nav"><i class="fas fa-step-backward"></i><span>Prev</span></button>
        <button id="playPauseBtn" class="btn btn-play"><i class="fas fa-play"></i><span>Play</span></button>
        <button id="nextBtn" class="btn btn-nav"><span>Next</span><i class="fas fa-step-forward"></i></button>
        <button id="fullscreenBtn" class="btn btn-expand"><i class="fas fa-expand"></i><span>Size</span></button>
        <button id="muteBtn" class="btn btn-volume"><i class="fas fa-volume-up"></i><span>Audio</span></button>
        <button id="closeBtn" class="btn btn-dismiss"><i class="fas fa-power-off"></i><span>Exit</span></button>
      </div>
    </div>
  </div>
</div>

<script>
    /******************************
     * Movies Database Array
     ******************************/
    const movies = [
      { 
        title: "First Blood", 
        year: 1982,
        video: "https://mega.nz/embed/hm0HTJDZ#OjYxj2CZT2dCFRGZegtpSomyoA4_UJ88W8MdYcl2wVg", 
        image: "https://artofethanpro.com/cdn/shop/products/FB_WebShop.jpg?v=1679946052",
        tags: ["action", "drama", "1980s"],
        description: "John Rambo, a Vietnam veteran, must rely on his combat and survival senses against the abusive law enforcement of a small town.",
        rating: 4.8,
        duration: "93 min"
      },
      { 
        title: "Rambo: First Blood Part II", 
        year: 1985,
        video: "https://mega.nz/embed/tnlwzDDB#857stRT70vaGVUE0vCgJMkiyqBQvRo8-ArArOA8IquM", 
        image: "https://alternativemovieposters.com/wp-content/uploads/2020/08/OscarMartinez_Rambo2.jpg",
        tags: ["action", "war", "1980s"],
        description: "Rambo is released from prison by the government for a top-secret covert mission to the last place on Earth he'd want to return - the jungles of Vietnam.",
        rating: 4.5,
        duration: "96 min"
      },
      { 
        title: "Rambo III", 
        year: 1988,
        video: "https://mega.nz/embed/V2V0RALR#xgL_55WqbfOqKsfvfKkRKdPd412DBL19sS4qlE42ym0", 
        image: "https://cloudfront-eu-central-1.images.arcpublishing.com/diarioas/MW7CIK2DMZGGBGMQTU7MOUCZ4I.jpg",
        tags: ["action", "war", "1980s"],
        description: "Rambo goes to Afghanistan to rescue his mentor and friend Colonel Trautman from the Soviets.",
        rating: 4.3,
        duration: "102 min"
      },
      { 
        title: "Rambo", 
        year: 2008,
        video: "https://mega.nz/embed/SoI1kDbQ#WqxfKlWTdWrVqHNwu5Cl5HgoHSD5L9E6DlIabRIOiUg", 
        image: "https://images.sr.roku.com/idType/roku/context/global/id/ec09db9d818d59428b6f7ed6819ac2c2/images/gracenote/assets/p173465_d_v8_aa.jpg/magic/396x0/filters:quality(70)",
        tags: ["action", "war", "2000s"],
        description: "In Thailand, John Rambo joins a group of mercenaries to venture into war-torn Burma, and rescue a group of Christian aid workers who were kidnapped by the ruthless local infantry unit.",
        rating: 4.6,
        duration: "92 min"
      },
      { 
        title: "Rambo: Last Blood", 
        year: 2019,
        video: "https://mega.nz/embed/EnsEwSiR#_auNL5QpKyOHE_U57iC_wXb4zrLrSSQw7282Qgjieao", 
        image: "https://play-lh.googleusercontent.com/v8OwCzJT_jV5ubJK_mffryr3-dtR0If3n7a5sURXiFdNV7VmXPWFBmt7rOtZicfCI7lMFnC8VXjN0LVQOFo=w240-h480-rw",
        tags: ["action", "thriller", "2010s"],
        description: "Rambo must confront his past and unearth his ruthless combat skills to exact revenge in a final mission.",
        rating: 4.2,
        duration: "89 min"
      }
    ];

    /******************************
     * DOM elements reference setup
     ******************************/
    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    /******************************
     * Stream validation routing engine
     ******************************/
    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || /index.*\.txt/i.test(url) || url.includes('manifest') || url.includes('master');
    }
    function isYouTube(url) {
      if (!url) return false;
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('youtube-nocookie.com') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    /******************************
     * Playback Core Pipeline
     ******************************/
    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) {
        console.warn('Invalid request parameters');
        return;
      }
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];
      if (!movie) return;

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || '';

      resetPlayerContainer();
      showModal();

      let src = (typeof movie.video === 'object' && movie.video !== null) 
        ? (movie.video.high || movie.video.medium || movie.video.low || Object.values(movie.video)[0]) 
        : movie.video;

      if (!src) {
        setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=`, 400);
        return;
      }

      const lc = src.toLowerCase();

      // Cloud/Third-Party Iframe check
      if (lc.includes('streamtape.com') || lc.includes('dood') || lc.includes('vidcdn') || lc.includes('ok.ru') || lc.includes('mega.nz') || lc.includes('openload') || lc.includes('drive.google.com')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
        return;
      }

      // YouTube Engine
      if (isYouTube(src)) {
        let embed = src;
        try {
          if (src.includes('watch') && src.includes('v=')) {
            const v = new URLSearchParams(src.split('?')[1]).get('v');
            if (v) embed = `https://www.youtube.com/embed/${v}`;
          } else if (src.includes('youtu.be/')) {
            const p = src.split('youtu.be/')[1].split(/[?&]/)[0];
            if (p) embed = `https://www.youtube.com/embed/${p}`;
          }
        } catch (e) {}
        playerWrapper.innerHTML = `<iframe src="${embed}?autoplay=1&modestbranding=1&rel=0" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
        return;
      }

      // Live HLS Stream parser
      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) return;
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          try {
            currentHls.loadSource(src);
            currentHls.attachMedia(v);
          } catch (e) { console.warn('HLS initialization anomaly', e); }
          currentHls.on(Hls.Events.MANIFEST_PARSED, function() {
            v.play().catch(()=>{});
            playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
          });
          currentHls.on(Hls.Events.ERROR, function(event, data) {
            if (data && data.fatal) {
              try { currentHls.destroy(); } catch(e){}
              currentHls = null;
              setTimeout(()=> window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`, 500);
            }
          });
        } else if (v.canPlayType && v.canPlayType('application/vnd.apple.mpegurl')) {
          v.src = src;
          v.play().catch(()=>{});
          playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
        } else {
          window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`;
        }
        return;
      }

      // MP4 Default
      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        if (!v) return;
        v.src = src;
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
        return;
      }

      window.location.href = `player.html?title=${encodeURIComponent(movie.title||'')}&video=${encodeURIComponent(src||'')}`;
    }

    /******************************
     * Core Controls Handling
     ******************************/
    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause mr-2"></i><span>Pause</span>';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play mr-2"></i><span>Play</span>';
      }
    }
    function playNext() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return;
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
    }
    function playPrev() {
      if (!currentFiltered || currentFiltered.length === 0) currentFiltered = movies.slice();
      if (currentIndex == null) return;
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
    }
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el).catch(()=>{});
      } else {
        document.exitFullscreen();
      }
    }
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-mute"></i><span>Muted</span>' : '<i class="fas fa-volume-up"></i><span>Audio</span>';
    }

    function closeModalHandler() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      const v = document.getElementById(modalVideoId);
      if (v) {
        try { v.pause(); } catch(e){}
      }
      resetPlayerContainer();
      hideModal();
      currentIndex = null;
      currentFiltered = [];
      playPauseBtn.innerHTML = '<i class="fas fa-play mr-2"></i><span>Play</span>';
    }

    /******************************
     * Wire Event Listeners
     ******************************/
    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);

    playbackModal.addEventListener('click', function(e){
      if (e.target === playbackModal) closeModalHandler();
    });

    document.addEventListener('keydown', (e) => {
      if (!playbackModal.classList.contains('active')) return;
      switch (e.key.toLowerCase()) {
        case 'escape': closeModalHandler(); break;
        case ' ': e.preventDefault(); togglePlayPause(); break;
        case 'f': toggleFullscreen(); break;
        case 'm': toggleMute(); break;
      }
    });

    /******************************
     * Media Component Generation
     ******************************/
    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index % 4) * 100}`;

        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-xl overflow-hidden bg-[#141b24] cursor-pointer relative group flex flex-col justify-between`;
        div.innerHTML = `
          <div class="relative overflow-hidden bg-black aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center p-2">
              <button class="bg-red-600 hover:bg-red-700 text-white font-bold text-xs sm:text-sm py-2 px-4 rounded shadow-lg transition transform translate-y-2 group-hover:translate-y-0 duration-300 uppercase tracking-wider">
                <i class="fas fa-crosshairs mr-1.5"></i> Launch
              </button>
            </div>
          </div>
          <div class="p-3 sm:p-4 bg-[#141b24]">
            <h3 class="font-bold text-sm sm:text-base tracking-wide text-white truncate">${movie.title}</h3>
            <div class="flex justify-between items-center mt-1 text-xs text-stone-400">
              <span class="bg-stone-800 px-1.5 py-0.5 rounded">${movie.year}</span>
              <span class="text-stone-500"><i class="far fa-clock mr-1 text-[10px]"></i>${movie.duration}</span>
            </div>
          </div>
        `;

        div.addEventListener('click', () => {
          openPlayer(moviesToRender, index);
        });

        container.appendChild(div);
      });
    }

    // Initialize grid layout build
    renderMovies(movies);
</script>

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>
