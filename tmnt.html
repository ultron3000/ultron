<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>TMNT: The Sewer Vault</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- HLS.js for HLS playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.1/dist/hls.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@300;400;500;600;700;900&display=swap');
    
    :root {
      --primary: #22c55e; /* Mutagen Green */
      --secondary: #a855f7; /* Foot Clan Purple */
      --accent: #ef4444; /* Raphael Red */
      --muted: #9CA3AF;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #050b06 0%, #0c0812 100%);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .movie-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
    }
    
    .movie-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 25px -5px rgba(34, 197, 94, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
    }
    
    .header-glow {
      font-family: 'Permanent Marker', cursive;
      text-shadow: 0 0 15px rgba(34, 197, 94, 0.8);
      letter-spacing: 0.05em;
    }
    
    .movie-poster {
      aspect-ratio: 2/3;
      transition: transform 0.5s ease;
    }
    
    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }

    /* === NINJA TURTLE CHARACTER POPUP SYSTEM === */
    /* Hidden below the banner line by default */
    .character-leo {
      position: absolute;
      bottom: -180px;
      left: 3%;
      height: 160px;
      z-index: 25;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.8));
    }

    .character-raph {
      position: absolute;
      bottom: -180px;
      right: 3%;
      height: 160px;
      z-index: 25;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.8));
    }

    /* Trigger Popups on Banner Container Hover */
    .video-banner-container:hover .character-leo {
      bottom: 5px;
      transform: scale(1.18) rotate(-4deg);
    }

    .video-banner-container:hover .character-raph {
      bottom: 5px;
      transform: scale(1.18) rotate(4deg);
    }

    /* Responsive scaling for turtles */
    @media (min-width: 640px) {
      .character-leo, .character-raph {
        height: 200px;
        bottom: -220px;
      }
      .video-banner-container:hover .character-leo { bottom: 10px; }
      .video-banner-container:hover .character-raph { bottom: 10px; }
    }

    @media (min-width: 768px) {
      .character-leo, .character-raph {
        height: 260px;
        bottom: -280px;
      }
      .video-banner-container:hover .character-leo { bottom: 15px; }
      .video-banner-container:hover .character-raph { bottom: 15px; }
    }

    @media (min-width: 1024px) {
      .character-leo, .character-raph {
        height: 320px;
        bottom: -340px;
      }
      .video-banner-container:hover .character-leo { bottom: 20px; }
      .video-banner-container:hover .character-raph { bottom: 20px; }
    }

    /* Mutagen Logo pulse animation */
    @keyframes pulseMutagen {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.5)); }
      50% { transform: scale(1.06); filter: drop-shadow(0 0 25px rgba(34, 197, 94, 0.9)); }
    }
    .animate-logo {
      animation: pulseMutagen 4s ease-in-out infinite;
    }
    
    /* Custom mutagen green scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #060a06;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #4ade80;
    }
    
    /* Grid Fade Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.6s ease forwards;
    }
    
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    
    /* Media Player Engine styles */
    .modal-backdrop { 
      position:fixed; 
      inset:0; 
      background: rgba(0,0,0,0.96); 
      display:none; 
      align-items:center; 
      justify-content:center; 
      z-index:9999; 
    }
    .modal-backdrop.active { display:flex; }
    .modal-card { 
      width: 100%;
      height: 100%;
      max-width: 980px;
      max-height: 90vh;
      border-radius: 0;
      overflow: hidden;
      background: #080a08;
      box-shadow: 0 30px 80px rgba(34, 197, 94, 0.15);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .player-wrapper { 
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }
    #topCloseBtn { 
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: all 0.2s ease;
    }
    #topCloseBtn:hover {
      background: var(--primary);
      color: #000;
      transform: scale(1.1);
    }
    .player-wrapper video, 
    .player-wrapper iframe { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .player-meta { 
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      color: #ddd;
      background: #080a08;
      border-top: 1px solid rgba(34, 197, 94, 0.2);
    }
    .player-meta .meta-left { 
      width: 100%;
    }
    .player-meta h3 { 
      margin: 0;
      font-size: 1.125rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: white;
    }
    .player-meta p { 
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .controls-row { 
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    /* Tactical Sewer Buttons */
    .btn {
      background: rgba(34, 197, 94, 0.03);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: var(--primary);
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      min-width: 60px;
      flex: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover { 
      background: var(--primary); 
      color: #050b06;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.45);
      transform: translateY(-1px);
    }
    .btn i {
      font-size: 0.95rem;
      transition: transform 0.2s ease;
    }
    .btn:hover i {
      transform: scale(1.1);
    }

    /* Responsive Media Modal adjustments */
    @media (min-width: 768px) {
      .modal-card {
        width: 92%;
        height: auto;
        border-radius: 12px;
        max-height: 80vh;
      }
      .player-wrapper {
        padding-bottom: 56.25%;
        height: 0;
      }
      .player-meta {
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
      }
      .player-meta .meta-left {
        max-width: 65%;
      }
      .controls-row {
        flex-wrap: nowrap;
        justify-content: flex-end;
      }
      .btn {
        flex: 0;
        min-width: auto;
        padding: 8px 14px;
      }
      #topCloseBtn {
        opacity: 0;
      }
      .player-wrapper:hover #topCloseBtn {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .btn {
        padding: 10px;
        font-size: 0;
      }
      .btn i {
        font-size: 1.1rem;
        margin: 0 !important;
      }
    }

    /* Desktop modal rendering correction */
    @media (min-width: 768px) {
      .player-wrapper {
        padding-bottom: 0 !important;
        height: auto !important;
        max-height: 60vh !important;
        position: relative !important;
      }
      .player-wrapper video,
      .player-wrapper iframe {
        height: 100% !important;
        max-height: 60vh !important;
        position: relative !important;
      }
      .player-meta {
        position: relative !important;
        z-index: 100 !important;
        background: #080a08 !important;
        padding-top: 10px !important;
      }
      .controls-row {
        display: flex !important;
        flex-wrap: wrap !important;
        justify-content: center !important;
        gap: 12px !important;
      }
      .btn {
        min-width: 105px !important;
        padding: 10px 18px !important;
        flex: unset !important;
      }
      .modal-card {
        max-height: 85vh !important;
        overflow: visible !important;
      }
    }
</style>
</head>
<body class="relative">

<!-- Radioactive Ash particles layer -->
<div class="fixed inset-0 overflow-hidden -z-10">
  <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/95"></div>
  <div class="stars"></div>
</div>

<div class="container mx-auto px-4 py-8 max-w-7xl">

  <!-- Mutagenic Sewer Video Banner Container -->
  <div class="video-banner-container relative w-full h-[280px] sm:h-[350px] md:h-[400px] lg:h-[480px] overflow-hidden rounded-2xl border border-green-900/40 shadow-2xl mb-12">
    
    <!-- Youtube Mutagen Stream Backdrop -->
    <iframe 
      src="https://www.youtube.com/embed/VZP5MId9vS4?autoplay=1&mute=1&loop=1&playlist=OlV6yqXtXZ8&controls=0&modestbranding=1"
      frameborder="0" 
      allow="autoplay; fullscreen" 
      class="absolute top-0 left-0 w-full h-full scale-105 pointer-events-none object-cover">
    </iframe>
    
    <!-- Mutagen Vignette Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent pointer-events-none"></div>

    <!-- Official TMNT Logo Vector Overlay -->
    <div class="absolute top-4 left-4 z-20">
      <img 
        src="https://imamovienerd.wordpress.com/wp-content/uploads/2014/09/tmnt-2007-animated-feature.jpg?w=554" 
        alt="TMNT Logo" 
        class="h-10 sm:h-16 md:h-20 lg:h-24 animate-logo filter drop-shadow-[0_0_15px_rgba(34,197,94,0.6)]"
        onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/5/51/Toy_Story_logo.jpg'"
      />
    </div>

    <!-- Character Popups: sliding upwards when parent is hovered -->
    <!-- Leonardo (Left) -->
    <img 
      src="https://cdn.europosters.eu/image/750/23298.jpg" 
      class="character-leo object-contain" 
      alt="Leonardo"
      onerror="this.src='https://image.tmdb.org/t/p/w500/uF636W3pQfT3a16j6N1T8oQZ77h.jpg'"
    />
    
    <!-- Raphael (Right) -->
    <img 
      src="https://cdn.europosters.eu/image/750/23295.jpg" 
      class="character-raph object-contain" 
      alt="Raphael"
      onerror="this.src='https://image.tmdb.org/t/p/w500/y6zP9E8pL97Y9O38oQgT1i7E91D.jpg'"
    />

    <!-- Ambient banner footer text -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-30 text-center w-full max-w-lg px-4 hidden sm:block">
      <span class="text-[#22c55e] font-bold tracking-widest text-xs uppercase block mb-1">Rise From the Sewers</span>
      <h2 class="text-xl md:text-2xl font-black uppercase text-white tracking-wider header-glow">Cowabunga!</h2>
    </div>

  </div>

  <!-- Movies Grid -->
  <div class="mb-12">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 justify-center" id="movies"></div>
  </div>

  <!-- Footer / Social Links -->
  <div class="border-t border-gray-800 mt-8 pt-6 text-center text-gray-500">
    <a href="#" class="text-gray-400 hover:text-[#22c55e] transition px-3"><i class="fab fa-facebook-f"></i></a>
    <a href="#" class="text-gray-400 hover:text-[#22c55e] transition px-3"><i class="fab fa-twitter"></i></a>
    <a href="https://www.instagram.com/stark_4152/reels" class="text-gray-400 hover:text-[#22c55e] transition px-3"><i class="fab fa-instagram"></i></a>
    <a href="https://www.youtube.com/channel/UCD9dGWVkAjrdm3D_7gkbi2g" class="text-gray-400 hover:text-[#22c55e] transition px-3"><i class="fab fa-youtube"></i></a>
  </div>
</div>

<!-- === Sewer media playback Engine === -->
<div id="playbackModal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="player-wrapper" id="playerWrapper">
      <video id="modalVideo" controls playsinline style="width:100%;height:100%;background:#000"></video>
      <button id="topCloseBtn" class="absolute top-4 right-4 z-10 bg-black/70 hover:bg-[#22c55e] text-white rounded-full w-10 h-10 flex items-center justify-center transition">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <div class="player-meta">
      <div class="meta-left">
        <h3 id="modalTitle">Mutagen Core Stream</h3>
        <p id="modalDesc" class="text-sm"></p>
      </div>
      <div class="controls-row">
        <button id="prevBtn" class="btn"><i class="fas fa-arrow-left-long"></i>Prev</button>
        <button id="playPauseBtn" class="btn"><i class="fas fa-play-circle"></i>Play</button>
        <button id="nextBtn" class="btn">Next<i class="fas fa-arrow-right-long"></i></button>
        <button id="fullscreenBtn" class="btn"><i class="fas fa-compress-arrows-alt"></i>Expand</button>
        <button id="muteBtn" class="btn"><i class="fas fa-volume-high"></i>Audio</button>
        <button id="closeBtn" class="btn"><i class="fas fa-rectangle-xmark text-red-500"></i>Exit</button>
      </div>
    </div>
  </div>
</div>

<script>
    /**********************************************
     * Ninja Turtles 3-Movie Playlist Engine
     **********************************************/
    const movies = [
         { 
          title: "TMNT", 
          video: "https://mega.nz/embed/your_link_here_2", 
          image: "https://m.media-amazon.com/images/S/pv-target-images/376abfcdeabe758783e55284819eb8e1757775d6d443e553881295c327261e84.png", 
          category: "other", 
          year: 2007,
          description: "In this acclaimed animated entry, the four brothers must overcome their family divisions to defeat a tech industrialist utilizing ancient monoliths to release a horde of centuries-old monsters."
        },
        { 
          title: "Teenage Mutant Ninja Turtles", 
          video: "https://mega.nz/embed/your_link_here_1", 
          image: "https://i.pinimg.com/736x/d7/69/00/d76900aafeda404ac70a52f16572dfec.jpg", 
          category: "other", 
          year: 2014,
          description: "When a kingpin threatens New York City, a group of mutated turtle warriors must emerge from the shadows to protect their home, joining forces with reporter April O'Neil to take down the Foot Clan."
        },
        { 
          title: "TMNT: Out of the Shadows", 
          video: "https://mega.nz/embed/your_link_here_3", 
          image: "https://image.tmdb.org/t/p/w780/euVaCiCWz3AALcQXHT6aUqdGUo6.jpg", 
          category: "other", 
          year: 2016,
          description: "The Turtles return to save the city from a dangerous new threat after Shredder escapes custody and teams up with mad scientist Baxter Stockman, unleashing the brute mutants Bebop and Rocksteady."
        }
    ];

    /******************************
     * DOM elements setup
     ******************************/
    const playbackModal = document.getElementById('playbackModal');
    const playerWrapper = document.getElementById('playerWrapper');
    const modalVideoId = 'modalVideo';
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const muteBtn = document.getElementById('muteBtn');

    let currentHls = null;
    let currentFiltered = [];
    let currentIndex = null;

    /******************************
     * Core Player Mechanics
     ******************************/
    function isMP4(url) { return /\.mp4($|\?)/i.test((url||'')); }
    function isHls(url) {
      if (!url) return false;
      return url.includes('.m3u8') || url.includes('index-') || url.includes('manifest');
    }
    function isYouTube(url) {
      return url.includes('youtube.com') || url.includes('youtu.be') || url.includes('/embed/');
    }

    function resetPlayerContainer() {
      if (currentHls) {
        try { currentHls.destroy(); } catch(e) {}
        currentHls = null;
      }
      playerWrapper.innerHTML = `<video id="${modalVideoId}" controls playsinline style="width:100%;height:100%;background:#000"></video>`;
    }

    function showModal() {
      playbackModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function hideModal() {
      playbackModal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function openPlayer(list, index) {
      if (!Array.isArray(list) || list.length === 0 || index == null || index < 0 || index >= list.length) return;
      currentFiltered = list;
      currentIndex = index;
      const movie = list[index];

      modalTitle.textContent = movie.title || '';
      modalDesc.textContent = movie.description || '';

      resetPlayerContainer();
      showModal();

      let src = movie.video;
      const lc = (src || '').toLowerCase();

      if (lc.includes('mega.nz') || lc.includes('drive.google.com') || lc.includes('ok.ru') || lc.includes('streamtape')) {
        playerWrapper.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause-circle"></i>Pause';
        return;
      }

      if (isYouTube(src)) {
        playerWrapper.innerHTML = `<iframe src="${src}?autoplay=1&modestbranding=1" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        playPauseBtn.innerHTML = '<i class="fas fa-pause-circle"></i>Pause';
        return;
      }

      if (isHls(src)) {
        const v = document.getElementById(modalVideoId);
        if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(src);
          currentHls.attachMedia(v);
          currentHls.on(Hls.Events.MANIFEST_PARSED, () => { v.play().catch(()=>{}); });
        }
        return;
      }

      if (isMP4(src)) {
        const v = document.getElementById(modalVideoId);
        v.src = src;
        v.play().catch(()=>{});
        return;
      }
    }

    function togglePlayPause() {
      const v = document.getElementById(modalVideoId);
      if (!v || !v.src) return;
      if (v.paused) {
        v.play().catch(()=>{});
        playPauseBtn.innerHTML = '<i class="fas fa-pause-circle"></i>Pause';
      } else {
        v.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play-circle"></i>Play';
      }
    }
    function playNext() {
      if (currentIndex < currentFiltered.length - 1) openPlayer(currentFiltered, currentIndex + 1);
    }
    function playPrev() {
      if (currentIndex > 0) openPlayer(currentFiltered, currentIndex - 1);
    }
    function toggleFullscreen() {
      const el = document.getElementById(modalVideoId) || playerWrapper.querySelector('iframe');
      if (!el) return;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || playerWrapper.requestFullscreen).call(el);
        fullscreenBtn.innerHTML = '<i class="fas fa-compress-arrows-alt"></i>Shrink';
      } else {
        document.exitFullscreen();
        fullscreenBtn.innerHTML = '<i class="fas fa-compress-arrows-alt"></i>Expand';
      }
    }
    function toggleMute() {
      const v = document.getElementById(modalVideoId);
      if (!v) return;
      v.muted = !v.muted;
      muteBtn.innerHTML = v.muted ? '<i class="fas fa-volume-xmark text-red-500"></i>Muted' : '<i class="fas fa-volume-high"></i>Audio';
    }

    function closeModalHandler() {
      resetPlayerContainer();
      hideModal();
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    muteBtn.addEventListener('click', toggleMute);
    document.getElementById('closeBtn').addEventListener('click', closeModalHandler);
    document.getElementById('topCloseBtn').addEventListener('click', closeModalHandler);
    playbackModal.addEventListener('click', (e) => { if (e.target === playbackModal) closeModalHandler(); });

    /******************************
     * UI Grid Engine Rendering
     ******************************/
    const container = document.getElementById('movies');

    function renderMovies(moviesToRender) {
      container.innerHTML = '';
      moviesToRender.forEach((movie, index) => {
        const delayClass = `delay-${(index + 1) * 100}`;
        const div = document.createElement('div');
        div.className = `movie-card animate-fade-in ${delayClass} rounded-xl overflow-hidden bg-gray-950 border border-green-950 hover:border-[#22c55e] cursor-pointer relative group w-full max-w-[200px] mx-auto`;
        div.innerHTML = `
          <div class="relative overflow-hidden aspect-[2/3]">
            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover movie-poster">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
              <button class="bg-[#22c55e] hover:bg-green-400 text-gray-950 font-black py-2 px-4 rounded-lg w-full text-xs tracking-wide uppercase transition transform hover:scale-105 shadow-lg shadow-green-500/20">
                <i class="fas fa-play mr-2"></i> Stream

        star.style.height = `${size}px`;
        star.style.opacity = Math.random() * 0.15 + 0.05;
        star.style.animation = `float ${durationRange[0] + Math.random() * (durationRange[1] - durationRange[0])}s infinite ease-in-out alternate`;
        container.appendChild(star);
      }
    }
    const starsContainer = document.querySelector('.stars');
    if (starsContainer) createStars(starsContainer, 35, [1, 3], [8, 16]);

    style.innerHTML = `@keyframes float { 0% { transform: translateY(0); } 100% { transform: translateY(-15px) translateX(8px); } }`;

<!-- Disable DevTools + View Source Protection -->
<script src="https://cdn.jsdelivr.net/npm/disable-devtool@latest"></script>

<script>
/* =========================
   Mobile Detection
========================= */
const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

/* =========================
   Disable DevTools
========================= */
DisableDevtool({
    disable: true,
    disableMenu: true,
    clearLog: true,
    disableSelect: true,
    disableCopy: true,
    disableCut: true,
    disablePaste: true,

    /* FIXED */
    disableMobile: false,

    interval: 100,

    ondevtoolopen: function () {

        /* ONLY DESKTOP */
        if (!isMobile) {
            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }
    }
});

/* =========================
   Block View Source Shortcuts
========================= */
document.addEventListener("keydown", function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    // Ctrl+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j") {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
        return false;
    }

    // Ctrl+P
    if (e.ctrlKey && e.key.toLowerCase() === "p") {
        e.preventDefault();
        return false;
    }

    // Ctrl+A
    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();
        return false;
    }

    // Ctrl+C
    if (e.ctrlKey && e.key.toLowerCase() === "c") {
        e.preventDefault();
        return false;
    }

    // Ctrl+X
    if (e.ctrlKey && e.key.toLowerCase() === "x") {
        e.preventDefault();
        return false;
    }

    // Ctrl+V
    if (e.ctrlKey && e.key.toLowerCase() === "v") {
        e.preventDefault();
        return false;
    }
});

/* =========================
   Disable Right Click
========================= */
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Dragging
========================= */
document.addEventListener("dragstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Selection
========================= */
document.addEventListener("selectstart", function (e) {
    e.preventDefault();
});

/* =========================
   Disable Copy Actions
========================= */
["copy", "cut", "paste"].forEach(function(evt) {

    document.addEventListener(evt, function(e) {
        e.preventDefault();
    });

});

/* =========================
   Detect DevTools Window
   (Desktop ONLY - FIXED)
========================= */
if (!isMobile) {

    setInterval(function () {

        const widthThreshold =
            window.outerWidth - window.innerWidth > 220;

        const heightThreshold =
            window.outerHeight - window.innerHeight > 220;

        if (widthThreshold || heightThreshold) {

            document.body.innerHTML = "";
            window.location.replace("about:blank");
        }

    }, 1500);

}

/* =========================
   Disable Console
========================= */
(function () {

    console.clear();

    function block() {
        return false;
    }

    console.log = block;
    console.warn = block;
    console.error = block;
    console.info = block;
    console.debug = block;
    console.table = block;

})();

/* =========================
   Block "view-source:"
========================= */
if (window.location.href.startsWith("view-source:")) {

    document.body.innerHTML = "";
    window.location.replace("about:blank");

}

/* =========================
   Prevent iframe inspection
========================= */
if (window.top !== window.self) {

    try {
        window.top.location = window.self.location;
    } catch (e) {}

}
</script>
